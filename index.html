<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام المالي المتطور - إدارة العملاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- إضافة مكتبات للتقارير -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <!-- إضافة أيقونات متحركة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }
        
        body {
            background-color: #030712;
            color: #f3f4f6;
            transition: all 0.3s ease;
        }

        /* الوضع الفاتح */
        body.light-mode {
            background-color: #f3f4f6;
            color: #111827;
        }

        body.light-mode .bg-gray-950 { background-color: #f9fafb; }
        body.light-mode .bg-gray-900 { background-color: #ffffff; }
        body.light-mode .bg-gray-800 { background-color: #f3f4f6; }
        body.light-mode .border-gray-800 { border-color: #e5e7eb; }
        body.light-mode .text-gray-100 { color: #111827; }
        body.light-mode .text-gray-400 { color: #6b7280; }
        body.light-mode .text-gray-500 { color: #9ca3af; }

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        /* إخفاء أزرار increase/decrease في input number */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* أنيميشن متقدم */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal-overlay {
            animation: fadeIn 0.2s ease-out;
        }
        
        .modal-content {
            animation: slideIn 0.3s ease-out;
        }

        .stat-card {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .client-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .client-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 30px -12px rgba(16, 185, 129, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            transition: transform 0.3s ease;
            border: 1px solid #374151;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #065f46; border-color: #10b981; }
        .toast.error { background: #991b1b; border-color: #ef4444; }
        .toast.info { background: #1e3a8a; border-color: #3b82f6; }

        .floating-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            border: none;
        }

        .floating-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        .floating-menu {
            position: fixed;
            bottom: 100px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 99;
        }

        .floating-menu-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1f2937;
            border: 1px solid #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: scale(0);
            animation: floatIn 0.3s forwards;
        }

        @keyframes floatIn {
            to { transform: scale(1); }
        }

        .floating-menu-item:hover {
            transform: scale(1.1);
            background: #10b981;
        }

        .floating-menu-item:nth-child(1) { animation-delay: 0.1s; }
        .floating-menu-item:nth-child(2) { animation-delay: 0.2s; }
        .floating-menu-item:nth-child(3) { animation-delay: 0.3s; }
        .floating-menu-item:nth-child(4) { animation-delay: 0.4s; }

        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1f2937;
            border: 1px solid #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fbbf24;
            cursor: pointer;
            z-index: 101;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(180deg);
            background: #10b981;
            color: white;
        }

        .filter-btn.active {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }

        .quick-tab.active {
            background-color: #10b981 !important;
            color: white !important;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">

<!-- زر تغيير الثيم -->
<div class="theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon"></i>
</div>

<!-- القائمة العائمة -->
<div class="floating-btn" onclick="toggleFloatingMenu()">
    <i class="fas fa-plus"></i>
</div>

<div id="floating-menu" class="floating-menu hidden">
    <div class="floating-menu-item" onclick="exportToExcel()" title="تصدير Excel">
        <i class="fas fa-file-excel"></i>
    </div>
    <div class="floating-menu-item" onclick="exportToPDF()" title="تصدير PDF">
        <i class="fas fa-file-pdf"></i>
    </div>
    <div class="floating-menu-item" onclick="printReport()" title="طباعة">
        <i class="fas fa-print"></i>
    </div>
    <div class="floating-menu-item" onclick="backupData()" title="نسخ احتياطي">
        <i class="fas fa-download"></i>
    </div>
</div>

<!-- شريط التنقل -->
<nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 backdrop-blur-sm bg-opacity-90">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex space-x-8 space-x-reverse">
                <button onclick="showPage('dashboard')" 
                        class="inline-flex items-center px-3 py-2 text-sm font-medium transition-all nav-link relative group" 
                        id="nav-dashboard">
                    <span class="relative">
                        البيان الرئيسي
                        <span class="absolute bottom-0 left-0 w-full h-0.5 bg-emerald-400 transform scale-x-0 transition-transform group-hover:scale-x-100"></span>
                    </span>
                </button>
                <button onclick="showPage('add')" 
                        class="inline-flex items-center px-3 py-2 text-sm font-medium transition-all nav-link text-gray-300 hover:text-gray-100 group" 
                        id="nav-add">
                    <span class="relative">
                        إضافة / بحث
                        <span class="absolute bottom-0 left-0 w-full h-0.5 bg-emerald-400 transform scale-x-0 transition-transform group-hover:scale-x-100"></span>
                    </span>
                </button>
                <button onclick="showPage('reports')" 
                        class="inline-flex items-center px-3 py-2 text-sm font-medium transition-all nav-link text-gray-300 hover:text-gray-100 group" 
                        id="nav-reports">
                    <span class="relative">
                        التقارير
                        <span class="absolute bottom-0 left-0 w-full h-0.5 bg-emerald-400 transform scale-x-0 transition-transform group-hover:scale-x-100"></span>
                    </span>
                </button>
            </div>
            <div class="flex items-center">
                <h1 class="text-xl font-bold bg-gradient-to-l from-emerald-400 to-teal-400 bg-clip-text text-transparent">
                    <i class="fas fa-chart-line ml-2"></i>
                    النظام المالي المتطور
                </h1>
            </div>
        </div>
    </div>
</nav>

<main class="py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- صفحة البيان الرئيسي -->
        <div id="dashboard-page" class="page">
            <!-- شريط التقدم -->
            <div class="mb-6 flex items-center gap-4 overflow-x-auto pb-2">
                <div class="flex items-center gap-2 bg-gray-900/50 px-4 py-2 rounded-xl border border-gray-800">
                    <i class="fas fa-chart-pie text-emerald-400"></i>
                    <span class="text-sm text-gray-400">نظرة عامة</span>
                </div>
                <div class="flex items-center gap-2 bg-gray-900/50 px-4 py-2 rounded-xl border border-gray-800">
                    <i class="fas fa-users text-amber-400"></i>
                    <span class="text-sm text-gray-400" id="live-clients-count">0 عملاء</span>
                </div>
                <div class="flex items-center gap-2 bg-gray-900/50 px-4 py-2 rounded-xl border border-gray-800">
                    <i class="fas fa-exchange-alt text-rose-400"></i>
                    <span class="text-sm text-gray-400" id="live-transactions-count">0 معاملة</span>
                </div>
            </div>

            <!-- بطاقات الإحصائيات -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="stats-cards">
                <!-- تملأ بواسطة JavaScript -->
            </div>

            <!-- شريط البحث المتقدم -->
            <div class="mb-8">
                <div class="relative group">
                    <input type="text" 
                           id="dashboard-search"
                           oninput="searchInDashboard(this.value)"
                           placeholder="ابحث عن عميل بالاسم أو رقم الجوال..." 
                           class="w-full bg-gray-900 border-2 border-gray-800 rounded-2xl py-5 px-6 pr-14 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-emerald-600 focus:ring-4 focus:ring-emerald-600/20 transition-all group-hover:border-gray-700">
                    <i class="fas fa-search absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-600 group-hover:text-emerald-400 transition-colors"></i>
                </div>
                
                <!-- فلاتر سريعة -->
                <div class="flex gap-2 mt-3 overflow-x-auto pb-2">
                    <button onclick="filterClients('all')" class="filter-btn px-4 py-2 bg-emerald-600 text-white rounded-xl text-sm transition-all hover:bg-emerald-700">الكل</button>
                    <button onclick="filterClients('له')" class="filter-btn px-4 py-2 bg-amber-900/30 text-amber-400 rounded-xl text-sm transition-all hover:bg-amber-900/50 border border-amber-800/30">له</button>
                    <button onclick="filterClients('عليه')" class="filter-btn px-4 py-2 bg-emerald-900/30 text-emerald-400 rounded-xl text-sm transition-all hover:bg-emerald-900/50 border border-emerald-800/30">عليه</button>
                    <button onclick="filterClients('صفر')" class="filter-btn px-4 py-2 bg-gray-800 text-gray-400 rounded-xl text-sm transition-all hover:bg-gray-700">متوازن</button>
                </div>
            </div>

            <!-- قائمة العملاء -->
            <div>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold flex items-center gap-2">
                        <i class="fas fa-users text-emerald-400"></i>
                        قائمة العملاء
                    </h2>
                    <span class="text-sm bg-gray-900 px-4 py-2 rounded-xl border border-gray-800" id="clients-count">
                        <i class="fas fa-user ml-1"></i>
                        0
                    </span>
                </div>
                <div id="clients-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- تملأ بواسطة JavaScript -->
                </div>
            </div>
        </div>

        <!-- صفحة إضافة/بحث -->
        <div id="add-page" class="page hidden">
            <div class="max-w-3xl mx-auto">
                <!-- شريط التبويبات السريعة -->
                <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
                    <button onclick="showAddSection('add')" class="quick-tab active px-6 py-3 bg-emerald-600 text-white rounded-xl transition-all">
                        <i class="fas fa-user-plus ml-2"></i>
                        إضافة عميل
                    </button>
                    <button onclick="showAddSection('search')" class="quick-tab px-6 py-3 bg-gray-900 text-gray-400 rounded-xl border border-gray-800 hover:bg-gray-800 transition-all">
                        <i class="fas fa-search ml-2"></i>
                        بحث متقدم
                    </button>
                    <button onclick="showAddSection('bulk')" class="quick-tab px-6 py-3 bg-gray-900 text-gray-400 rounded-xl border border-gray-800 hover:bg-gray-800 transition-all">
                        <i class="fas fa-file-import ml-2"></i>
                        إضافة متعددة
                    </button>
                </div>

                <!-- قسم إضافة عميل -->
                <div id="add-section" class="section">
                    <div class="bg-gradient-to-br from-gray-900 to-gray-950 rounded-2xl border border-gray-800 p-8">
                        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                            <i class="fas fa-user-plus text-emerald-400"></i>
                            إضافة عميل جديد
                        </h2>
                        
                        <div class="space-y-6">
                            <div id="add-error" class="bg-rose-900/20 border border-rose-800 rounded-xl p-4 text-rose-400 hidden items-center gap-2">
                                <i class="fas fa-exclamation-circle"></i>
                                <span></span>
                            </div>
                            <div id="add-success" class="bg-emerald-900/20 border border-emerald-800 rounded-xl p-4 text-emerald-400 hidden items-center gap-2">
                                <i class="fas fa-check-circle"></i>
                                <span></span>
                            </div>

                            <div class="group">
                                <label class="block text-sm font-medium text-gray-400 mb-2">
                                    <i class="fas fa-user ml-1"></i>
                                    اسم العميل <span class="text-rose-500">*</span>
                                </label>
                                <input type="text" 
                                       id="client-name"
                                       class="w-full bg-gray-900 border-2 border-gray-800 rounded-xl py-4 px-6 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-emerald-600 focus:ring-4 focus:ring-emerald-600/20 transition-all group-hover:border-gray-700"
                                       placeholder="أدخل الاسم الكامل">
                            </div>

                            <div class="group">
                                <label class="block text-sm font-medium text-gray-400 mb-2">
                                    <i class="fas fa-phone ml-1"></i>
                                    رقم الجوال (اختياري)
                                </label>
                                <input type="tel" 
                                       id="client-phone"
                                       class="w-full bg-gray-900 border-2 border-gray-800 rounded-xl py-4 px-6 text-gray-100 placeholder-gray-600 focus:outline-none focus:border-emerald-600 focus:ring-4 focus:ring-emerald-600/20 transition-all group-hover:border-gray-700"
                                       placeholder="01xxxxxxxx"
                                       dir="ltr">
                            </div>

                            <button onclick="addNewClient()"
                                    class="btn-primary w-full text-white py-4 px-6 rounded-xl text-lg font-medium">
                                <i class="fas fa-save ml-2"></i>
                                إضافة العميل
                            </button>
                        </div>
                    </div>
                </div>

                <!-- قسم البحث المتقدم -->
                <div id="search-section" class="section hidden">
                    <div class="bg-gradient-to-br from-gray-900 to-gray-950 rounded-2xl border border-gray-800 p-8">
                        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                            <i class="fas fa-search text-emerald-400"></i>
                            بحث متقدم
                        </h2>
                        
                        <div class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-2">بحث بالاسم</label>
                                    <input type="text" 
                                           id="search-name"
                                           oninput="advancedSearch()"
                                           class="w-full bg-gray-900 border border-gray-800 rounded-xl py-3 px-4"
                                           placeholder="اسم العميل">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-400 mb-2">بحث بالرقم</label>
                                    <input type="text" 
                                           id="search-phone"
                                           oninput="advancedSearch()"
                                           class="w-full bg-gray-900 border border-gray-800 rounded-xl py-3 px-4"
                                           placeholder="رقم الجوال">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-2">تصفية حسب</label>
                                <select id="search-status" onchange="advancedSearch()" class="w-full bg-gray-900 border border-gray-800 rounded-xl py-3 px-4">
                                    <option value="all">جميع العملاء</option>
                                    <option value="له">له علينا</option>
                                    <option value="عليه">عليه لنا</option>
                                    <option value="صفر">متوازن</option>
                                </select>
                            </div>

                            <div id="advanced-results" class="space-y-2 max-h-96 overflow-y-auto">
                                <!-- نتائج البحث المتقدم -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- قسم الإضافة المتعددة -->
                <div id="bulk-section" class="section hidden">
                    <div class="bg-gradient-to-br from-gray-900 to-gray-950 rounded-2xl border border-gray-800 p-8">
                        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                            <i class="fas fa-file-import text-emerald-400"></i>
                            إضافة عملاء متعددين
                        </h2>
                        
                        <div class="space-y-6">
                            <textarea id="bulk-names" rows="5" 
                                      class="w-full bg-gray-900 border border-gray-800 rounded-xl py-3 px-4"
                                      placeholder="أدخل الأسماء سطراً بسطر&#10;أحمد محمد&#10;سارة خالد&#10;محمد علي"></textarea>
                            
                            <button onclick="addBulkClients()" 
                                    class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition-all">
                                <i class="fas fa-users ml-2"></i>
                                إضافة الكل
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- صفحة التقارير -->
        <div id="reports-page" class="page hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- تقرير العملاء -->
                <div class="bg-gradient-to-br from-gray-900 to-gray-950 rounded-2xl border border-gray-800 p-8">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-file-alt text-emerald-400"></i>
                        تقارير العملاء
                    </h2>
                    
                    <div class="space-y-4">
                        <button onclick="exportClientsReport('excel')" 
                                class="w-full bg-gray-800 hover:bg-gray-700 text-right px-6 py-4 rounded-xl transition-all flex items-center justify-between group">
                            <span class="flex items-center gap-3">
                                <i class="fas fa-file-excel text-2xl text-green-500"></i>
                                <span>تقرير العملاء Excel</span>
                            </span>
                            <i class="fas fa-download text-gray-500 group-hover:text-green-500 transition-colors"></i>
                        </button>
                        
                        <button onclick="exportClientsReport('pdf')" 
                                class="w-full bg-gray-800 hover:bg-gray-700 text-right px-6 py-4 rounded-xl transition-all flex items-center justify-between group">
                            <span class="flex items-center gap-3">
                                <i class="fas fa-file-pdf text-2xl text-red-500"></i>
                                <span>تقرير العملاء PDF</span>
                            </span>
                            <i class="fas fa-download text-gray-500 group-hover:text-red-500 transition-colors"></i>
                        </button>
                        
                        <button onclick="printReport()" 
                                class="w-full bg-gray-800 hover:bg-gray-700 text-right px-6 py-4 rounded-xl transition-all flex items-center justify-between group">
                            <span class="flex items-center gap-3">
                                <i class="fas fa-print text-2xl text-blue-500"></i>
                                <span>طباعة التقرير</span>
                            </span>
                            <i class="fas fa-print text-gray-500 group-hover:text-blue-500 transition-colors"></i>
                        </button>
                    </div>
                </div>

                <!-- تقرير المعاملات -->
                <div class="bg-gradient-to-br from-gray-900 to-gray-950 rounded-2xl border border-gray-800 p-8">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-history text-amber-400"></i>
                        تقارير المعاملات
                    </h2>
                    
                    <div class="space-y-4">
                        <div class="mb-4">
                            <label class="block text-sm text-gray-400 mb-2">اختر الفترة</label>
                            <select id="report-period" class="w-full bg-gray-800 border border-gray-700 rounded-xl py-3 px-4">

<!-- عنصر التنبيهات -->
<div id="toast" class="toast hidden"></div>

<script>
    // ==================== إدارة التخزين ====================
    const STORAGE_KEY = 'financial-crm-data-eg';
    
    // بيانات افتراضية
    const defaultData = {
        clients: [
            {
                id: '1',
                name: 'أحمد محمد',
                phone: '0123456789',
                createdAt: new Date().toISOString(),
                transactions: [
                    {
                        id: 't1',
                        date: new Date(Date.now() - 86400000 * 2).toISOString(),
                        type: 'out',
                        amount: 5000,
                        responsible: 'المدير',
                        note: 'دفعة مقدمة',
                        runningBalance: 5000
                    },
                    {
                        id: 't2',
                        date: new Date(Date.now() - 86400000).toISOString(),
                        type: 'in',
                        amount: 2000,
                        responsible: 'المحاسب',
                        note: 'استلام دفعة',
                        runningBalance: 3000
                    }
                ]
            },
            {
                id: '2',
                name: 'سارة خالد',
                phone: '0112345678',
                createdAt: new Date().toISOString(),
                transactions: [
                    {
                        id: 't3',
                        date: new Date().toISOString(),
                        type: 'in',
                        amount: 10000,
                        responsible: 'المدير',
                        note: 'استثمار',
                        runningBalance: -10000
                    }
                ]
            }
        ]
    };

    // متغيرات عامة
    let currentPage = 'dashboard';
    let currentClientId = null;
    let deleteCallback = null;
    let currentTransactionType = 'out';
    let currentFilter = 'all';
    let floatingMenuOpen = false;
    let theme = 'dark';

    // ==================== دوال المساعدة ====================
    function loadData() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                return JSON.parse(saved);
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultData));
            return defaultData;
        } catch (error) {
            console.error('خطأ في تحميل البيانات:', error);
            return defaultData;
        }
    }

    function saveData(data) {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateLiveStats();
            return true;
        } catch (error) {
            console.error('خطأ في حفظ البيانات:', error);
            showToast('حدث خطأ في حفظ البيانات', 'error');
            return false;
        }
    }

    function showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast show ${type}`;
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
        const icon = document.querySelector('.theme-toggle i');
        icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        showToast(`تم التبديل إلى الوضع ${theme === 'dark' ? 'الداكن' : 'الفاتح'}`, 'info');
    }

    function toggleFloatingMenu() {
        const menu = document.getElementById('floating-menu');
        floatingMenuOpen = !floatingMenuOpen;
        if (floatingMenuOpen) {
            menu.classList.remove('hidden');
        } else {
            menu.classList.add('hidden');
        }
    }

    function updateLiveStats() {
        const data = loadData();
        const totalClients = data.clients.length;
        const totalTransactions = data.clients.reduce((sum, c) => sum + c.transactions.length, 0);
        
        document.getElementById('live-clients-count').textContent = totalClients + ' عميل';
        document.getElementById('live-transactions-count').textContent = totalTransactions + ' معاملة';
    }

    // ==================== دوال العملاء ====================
    function getClientSummary(client) {
        const totalForClient = client.transactions
            .filter(t => t.type === 'out')
            .reduce((sum, t) => sum + t.amount, 0);
        
        const totalOnClient = client.transactions
            .filter(t => t.type === 'in')
            .reduce((sum, t) => sum + t.amount, 0);
        
        const netBalance = totalForClient - totalOnClient;
        
        let status = 'صفر';
        if (netBalance > 0) status = 'له';
        else if (netBalance < 0) status = 'عليه';
        
        return { totalForClient, totalOnClient, netBalance, status };
    }

    function getAllClientsSummary(clients) {
        const totalForAll = clients.reduce((sum, c) => sum + getClientSummary(c).totalForClient, 0);
        const totalOnAll = clients.reduce((sum, c) => sum + getClientSummary(c).totalOnClient, 0);
        const netTotal = totalForAll - totalOnAll;
        
        return { totalForAll, totalOnAll, netTotal };
    }

    function formatMoney(amount) {
        return amount.toLocaleString() + ' جنيه';
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('ar-EG', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // ==================== إدارة الصفحات ====================
    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(`${page}-page`).classList.remove('hidden');
        
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('text-emerald-400');
            link.classList.add('text-gray-300', 'hover:text-gray-100');
        });
        document.getElementById(`nav-${page}`).classList.remove('text-gray-300', 'hover:text-gray-100');
        document.getElementById(`nav-${page}`).classList.add('text-emerald-400');
        
        currentPage = page;
        
        if (page === 'dashboard') {
            renderDashboard();
        } else if (page === 'add') {
            clearAddForm();
        } else if (page === 'reports') {
            renderAdvancedStats();
        }
    }

    function showAddSection(section) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(section + '-section').classList.remove('hidden');
        
        document.querySelectorAll('.quick-tab').forEach(tab => {
            tab.classList.remove('active', 'bg-emerald-600', 'text-white');
            tab.classList.add('bg-gray-900', 'text-gray-400');
        });
        
        // تحديد التبويب النشط
        const buttons = document.querySelectorAll('.quick-tab');
        if (section === 'add') buttons[0].classList.add('active', 'bg-emerald-600', 'text-white');
        else if (section === 'search') buttons[1].classList.add('active', 'bg-emerald-600', 'text-white');
        else if (section === 'bulk') buttons[2].classList.add('active', 'bg-emerald-600', 'text-white');
    }

    // ==================== صفحة البيان ====================
    function renderDashboard() {
        const data = loadData();
        const clients = data.clients;
        const summary = getAllClientsSummary(clients);
        
        document.getElementById('stats-cards').innerHTML = `
            <div class="stat-card bg-gradient-to-br from-emerald-900/50 to-emerald-950/50 rounded-xl p-6 border border-emerald-800/30">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-emerald-400 text-sm font-medium">إجمالي ما لنا</h3>
                    <i class="fas fa-arrow-down text-emerald-400"></i>
                </div>
                <p class="text-3xl font-bold text-emerald-300">${formatMoney(summary.totalOnAll)}</p>
                <p class="text-xs text-emerald-600 mt-2">المبالغ المستلمة من العملاء</p>
            </div>
            <div class="stat-card bg-gradient-to-br from-amber-900/50 to-amber-950/50 rounded-xl p-6 border border-amber-800/30">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-amber-400 text-sm font-medium">إجمالي ما لهم</h3>
                    <i class="fas fa-arrow-up text-amber-400"></i>
                </div>
                <p class="text-3xl font-bold text-amber-300">${formatMoney(summary.totalForAll)}</p>
                <p class="text-xs text-amber-600 mt-2">المبالغ المدفوعة للعملاء</p>
            </div>
            <div class="stat-card bg-gradient-to-br from-rose-900/50 to-rose-950/50 rounded-xl p-6 border border-rose-800/30">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-rose-400 text-sm font-medium">الفرق</h3>
                    <i class="fas fa-balance-scale text-rose-400"></i>
                </div>
                <p class="text-3xl font-bold text-rose-300">${formatMoney(Math.abs(summary.totalForAll - summary.totalOnAll))}</p>
                <p class="text-xs text-rose-600 mt-2">الفرق بين ما لنا وما لهم</p>
            </div>
            <div class="stat-card bg-gradient-to-br from-blue-900/50 to-blue-950/50 rounded-xl p-6 border border-blue-800/30">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-blue-400 text-sm font-medium">صافي الرصيد</h3>
                    <i class="fas fa-chart-line text-blue-400"></i>
                </div>
                <p class="text-3xl font-bold text-blue-300">${formatMoney(Math.abs(summary.netTotal))}</p>
                <p class="text-xs text-blue-600 mt-2">
                    ${summary.netTotal >= 0 ? '✅ لنا على العملاء' : '⚠️ علينا للعملاء'}
                </p>
            </div>
        `;

        document.getElementById('clients-count').innerHTML = `<i class="fas fa-user ml-1"></i>${clients.length}`;
        renderClientsList(clients);
        updateLiveStats();
    }

    function renderClientsList(clients) {
        const grid = document.getElementById('clients-grid');
        
        if (clients.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full text-center py-16 bg-gray-900/30 rounded-2xl border border-gray-800">
                    <i class="fas fa-users text-5xl text-gray-700 mb-4"></i>
                    <p class="text-gray-500 text-lg">لا يوجد عملاء بعد</p>
                    <button onclick="showPage('add')" class="inline-block mt-4 px-6 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 transition-colors">
                        <i class="fas fa-user-plus ml-2"></i>
                        إضافة أول عميل
                    </button>
                </div>
            `;
            return;
        }

        let filteredClients = clients;
        if (currentFilter !== 'all') {
            filteredClients = clients.filter(c => getClientSummary(c).status === currentFilter);
        }

        grid.innerHTML = filteredClients.map(client => {
            const summary = getClientSummary(client);
            return `
                <div onclick="viewClient('${client.id}')" class="client-card bg-gray-900/50 hover:bg-gray-900 rounded-xl p-6 border border-gray-800">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-semibold text-gray-100">
                                <i class="fas fa-user-circle text-emerald-400 ml-2"></i>
                                ${client.name}
                            </h3>
                            ${client.phone ? `<p class="text-sm text-gray-500 mt-1"><i class="fas fa-phone ml-1"></i>${client.phone}</p>` : ''}
                        </div>
                        <div class="px-3 py-1 rounded-full text-sm flex items-center gap-1 ${
                            summary.status === 'له' ? 'bg-amber-900/30 text-amber-400' :
                            summary.status === 'عليه' ? 'bg-emerald-900/30 text-emerald-400' :
                            'bg-gray-800 text-gray-400'
                        }">
                            <i class="fas ${summary.status === 'له' ? 'fa-arrow-up' : summary.status === 'عليه' ? 'fa-arrow-down' : 'fa-equals'}"></i>
                            ${summary.status}
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-800/30 rounded-lg p-3">
                            <p class="text-xs text-gray-500 mb-1">له</p>
                            <p class="text-lg font-medium text-amber-400">${formatMoney(summary.totalForClient)}</p>
                        </div>
                        <div class="bg-gray-800/30 rounded-lg p-3">
                            <p class="text-xs text-gray-500 mb-1">عليه</p>
                            <p class="text-lg font-medium text-emerald-400">${formatMoney(summary.totalOnClient)}</p>
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-4 border-t border-gray-800">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-500">الصافي</span>
                            <span class="text-lg font-bold ${
                                summary.netBalance > 0 ? 'text-amber-400' :
                                summary.netBalance < 0 ? 'text-emerald-400' :
                                'text-gray-400'
                            }">
                                ${summary.netBalance > 0 ? '+' : ''}${formatMoney(summary.netBalance)}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterClients(filter) {
        currentFilter = filter;
        
        // تحديث شكل الأزرار
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active', 'bg-emerald-600', 'text-white');
            btn.classList.add('bg-gray-800', 'text-gray-400');
        });
        
        // تحديد الزر النشط
        const buttons = document.querySelectorAll('.filter-btn');
        if (filter === 'all') {
            buttons[0].classList.add('active', 'bg-emerald-600', 'text-white');
            buttons[0].classList.remove('bg-gray-800', 'text-gray-400');
        } else if (filter === 'له') {
            buttons[1].classList.add('active', 'bg-emerald-600', 'text-white');
            buttons[1].classList.remove('bg-amber-900/30', 'text-amber-400');
        } else if (filter === 'عليه') {
            buttons[2].classList.add('active', 'bg-emerald-600', 'text-white');
            buttons[2].classList.remove('bg-emerald-900/30', 'text-emerald-400');
        } else if (filter === 'صفر') {

    function addNewClient() {
        const nameInput = document.getElementById('client-name');
        const phoneInput = document.getElementById('client-phone');
        const errorDiv = document.getElementById('add-error');
        const successDiv = document.getElementById('add-success');
        
        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');
        
        if (!name) {
            errorDiv.querySelector('span').textContent = 'الرجاء إدخال اسم العميل';
            errorDiv.classList.remove('hidden');
            return;
        }
        
        const data = loadData();
        
        if (data.clients.some(c => c.name.toLowerCase() === name.toLowerCase())) {
            errorDiv.querySelector('span').textContent = 'هذا الاسم موجود مسبقاً، الرجاء استخدام اسم آخر';
            errorDiv.classList.remove('hidden');
            return;
        }
        
        const newClient = {
            id: Date.now().toString(),
            name: name,
            phone: phone || undefined,
            transactions: [],
            createdAt: new Date().toISOString()
        };
        
        data.clients.push(newClient);
        
        if (saveData(data)) {
            successDiv.querySelector('span').textContent = `تم إضافة العميل ${name} بنجاح`;
            successDiv.classList.remove('hidden');
            nameInput.value = '';
            phoneInput.value = '';
            
            showToast(`تم إضافة العميل ${name} بنجاح`, 'success');
            
            setTimeout(() => {
                viewClient(newClient.id);
            }, 1000);
        }
    }

    function addBulkClients() {
        const names = document.getElementById('bulk-names').value.split('\n').filter(n => n.trim());
        const appData = loadData();
        let added = 0;
        
        names.forEach(name => {
            const trimmedName = name.trim();
            if (trimmedName && !appData.clients.some(c => c.name === trimmedName)) {
                appData.clients.push({
                    id: Date.now() + Math.random().toString(),
                    name: trimmedName,
                    transactions: [],
                    createdAt: new Date().toISOString()
                });
                added++;
            }
        });
        
        if (added > 0) {
            saveData(appData);
            showToast(`تم إضافة ${added} عميل بنجاح`, 'success');
            document.getElementById('bulk-names').value = '';
        } else {
            showToast('لم يتم إضافة أي عملاء (قد تكون الأسماء مكررة)', 'error');
        }
    }

    function setTransactionType(type) {

        const inBtn = document.getElementById('transaction-type-in');
        
        if (type === 'out') {
            outBtn.className = 'py-3 px-4 rounded-xl text-sm font-medium transition-all bg-amber-600 text-white shadow-lg shadow-amber-600/20';
            inBtn.className = 'py-3 px-4 rounded-xl text-sm font-medium transition-all bg-gray-800 text-gray-400 hover:bg-gray-700';
        } else {
            outBtn.className = 'py-3 px-4 rounded-xl text-sm font-medium transition-all bg-gray-800 text-gray-400 hover:bg-gray-700';
            inBtn.className = 'py-3 px-4 rounded-xl text-sm font-medium transition-all bg-emerald-600 text-white shadow-lg shadow-emerald-600/20';
        }
    }

    function saveTransaction() {
        const amount = parseFloat(document.getElementById('transaction-amount').value);
        const responsible = document.getElementById('transaction-responsible').value.trim();
        const note = document.getElementById('transaction-note').value.trim();
        
        if (isNaN(amount) || amount <= 0) {
            showToast('الرجاء إدخال مبلغ صحيح', 'error');
            return;
        }
        
        if (!responsible) {
            showToast('الرجاء إدخال اسم المسؤول', 'error');
            return;
        }
        
        const data = loadData();
        const clientIndex = data.clients.findIndex(c => c.id === currentClientId);
        
        if (clientIndex === -1) return;
        
        const client = data.clients[clientIndex];
        
        const lastBalance = client.transactions.length > 0 
            ? client.transactions[client.transactions.length - 1].runningBalance 
            : 0;
        
        const newRunningBalance = currentTransactionType === 'out' 
            ? lastBalance + amount 
            : lastBalance - amount;
        
        const newTransaction = {
            id: Date.now().toString(),
            date: new Date().toISOString(),
            type: currentTransactionType,
            amount: amount,
            responsible: responsible,
            note: note,
            runningBalance: newRunningBalance
        };
        
        client.transactions.push(newTransaction);
        
        if (saveData(data)) {
            closeTransactionModal();
            viewClient(currentClientId);
            showToast('تم إضافة المعاملة بنجاح', 'success');
        }
    }

    function deleteTransaction(transactionId) {
        document.getElementById('delete-message').innerHTML = 'هل أنت متأكد من حذف هذه المعاملة؟';
        document.getElementById('delete-modal').classList.remove('hidden');
        deleteCallback = () => {
            const data = loadData();
            const clientIndex = data.clients.findIndex(c => c.id === currentClientId);
            
            if (clientIndex === -1) return;
            
            const client = data.clients[clientIndex];
            
            client.transactions = client.transactions.filter(t => t.id !== transactionId);
            
            let runningBalance = 0;
            client.transactions = client.transactions.map(t => {
                if (t.type === 'out') {
                    runningBalance += t.amount;
                } else {
                    runningBalance -= t.amount;
                }
                return { ...t, runningBalance };
            });
            
            if (saveData(data)) {
                closeDeleteModal();
                viewClient(currentClientId);
                showToast('تم حذف المعاملة بنجاح', 'success');
            }
        };
    }

    function closeDeleteModal() {
        document.getElementById('delete-modal').classList.add('hidden');
        deleteCallback = null;
    }

    function confirmDelete() {
        if (deleteCallback) {
            deleteCallback();
        }
    }

                new Date(t.date).toLocaleDateString('ar-EG'),
                t.type === 'out' ? 'تسليم' : 'استلام',
                t.amount.toLocaleString(),
                t.responsible,
                t.note || '-'
            ]);
            
            doc.autoTable({
                startY: 30,
                head: [['التاريخ', 'النوع', 'المبلغ', 'المسؤول', 'ملاحظات']],
                body: transactionsData,
                theme: 'striped'
            });
        }
        
        doc.save(`تقرير_${client.name}_${new Date().toLocaleDateString('ar-EG')}.pdf`);
        showToast('تم تصدير تقرير العميل', 'success');
    }

    function backupData() {
        const data = loadData();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_${new Date().toLocaleDateString('ar-EG')}.json`;
        a.click();
        showToast('تم إنشاء نسخة احتياطية', 'success');
    }

    function renderAdvancedStats() {
        const data = loadData();
        const totalClients = data.clients.length;
        const totalTransactions = data.clients.reduce((sum, c) => sum + c.transactions.length, 0);
        const clientsWithDebt = data.clients.filter(c => getClientSummary(c).status === 'عليه').length;
        const clientsWithCredit = data.clients.filter(c => getClientSummary(c).status === 'له').length;
        const balanced = data.clients.filter(c => getClientSummary(c).status === 'صفر').length;
        
        document.getElementById('advanced-stats').innerHTML = `
            <div class="bg-gray-800/50 rounded-xl p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-900/30 flex items-center justify-center">
                        <i class="fas fa-chart-pie text-blue-400"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-400">توزيع العملاء</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-400">له علينا</span>
                        <span class="text-amber-400 font-bold">${clientsWithCredit}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-400">عليه لنا</span>
                        <span class="text-emerald-400 font-bold">${clientsWithDebt}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-400">متوازن</span>
                        <span class="text-gray-400 font-bold">${balanced}</span>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-800/50 rounded-xl p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-purple-900/30 flex items-center justify-center">
                        <i class="fas fa-calculator text-purple-400"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-400">معدل المعاملات</p>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-3xl font-bold text-purple-400">${(totalTransactions / totalClients || 0).toFixed(1)}</p>
                    <p class="text-sm text-gray-500">معدل المعاملات لكل عميل</p>
                </div>
            </div>
            
            <div class="bg-gray-800/50 rounded-xl p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-amber-900/30 flex items-center justify-center">
                        <i class="fas fa-clock text-amber-400"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-400">آخر نشاط</p>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-sm text-amber-400">${getLastActivity()}</p>
                </div>
            </div>
        `;
    }

    function getLastActivity() {
        const data = loadData();
        let lastDate = null;
        
        data.clients.forEach(client => {
            client.transactions.forEach(t => {
                const date = new Date(t.date);
                if (!lastDate || date > lastDate) {
                    lastDate = date;
                }
            });
        });
        
        return lastDate ? formatDate(lastDate) : 'لا توجد معاملات';
    }

    // ==================== التهيئة ====================
    document.addEventListener('DOMContentLoaded', () => {
        renderDashboard();
        updateLiveStats();
        
        // تعيين الأزرار النشطة
        document.querySelectorAll('.filter-btn')[0].classList.add('active', 'bg-emerald-600', 'text-white');
        
        // إغلاق القائمة العائمة عند النقر خارجها
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.floating-btn') && !e.target.closest('.floating-menu')) {
                document.getElementById('floating-menu').classList.add('hidden');
                floatingMenuOpen = false;
            }
        });
    });
</script>

</body>
</html>
