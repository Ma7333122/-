<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الخبير المحاسبي - النسخة الذهبية v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ========== النظام المتغيرات المتقدمة - ألوان مريحة للعين ========== */
        :root {
            --primary: #4f8ef7;
            --primary-dark: #3a7af4;
            --primary-light: #7aa9ff;
            --primary-bg: rgba(79, 142, 247, 0.12);
            --secondary: #9b59b6;
            --secondary-bg: rgba(155, 89, 182, 0.12);
            --success: #2ecc71;
            --success-bg: rgba(46, 204, 113, 0.12);
            --danger: #e74c3c;
            --danger-bg: rgba(231, 76, 60, 0.12);
            --warning: #f39c12;
            --warning-bg: rgba(243, 156, 18, 0.12);
            
            /* ألوان مريحة للعين - نسخة داكنة محسنة */
            --bg-gradient-1: #121624;
            --bg-gradient-2: #1a1f2f;
            --bg-body: #141a26;
            --bg-card: rgba(26, 32, 44, 0.95);
            --bg-card-alt: #1e2537;
            --bg-sidebar: #1a1f2d;
            --text-main: #e2e8f0;
            --text-muted: #a0aec0;
            --text-dim: #718096;
            --border: rgba(255, 255, 255, 0.03);
            --border-light: rgba(255, 255, 255, 0.06);
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.7);
            --shadow-glow: 0 0 20px rgba(79, 142, 247, 0.2);
            
            --radius-sm: 10px;
            --radius: 18px;
            --radius-lg: 28px;
            
            --sidebar-width: 290px;
            --header-height: 80px;
            
            --font: 'Cairo', sans-serif;
        }

        /* الوضع الفاتح - ألوان مريحة للعين */
        [data-theme="light"] {
            --bg-gradient-1: #f0f5fa;
            --bg-gradient-2: #e4ecf5;
            --bg-body: #f5f9ff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-alt: #f0f5ff;
            --bg-sidebar: #ffffff;
            --text-main: #2d3748;
            --text-muted: #4a5568;
            --text-dim: #718096;
            --border: rgba(0, 0, 0, 0.04);
            --border-light: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text-main);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
            transition: background 0.4s, color 0.4s;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-card-alt); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; opacity: 0.5; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        /* ========== القائمة الجانبية ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1100;
            transition: transform 0.5s ease;
            backdrop-filter: blur(10px);
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.2);
        }

        .sidebar-brand {
            padding: 30px 25px;
            border-bottom: 1px solid var(--border);
        }

        .brand-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .brand-sub {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 25px 15px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            padding: 8px 20px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            margin: 3px 8px;
            border-radius: var(--radius);
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-item:hover {
            background: var(--bg-card-alt);
            color: var(--text-main);
            transform: translateX(-5px);
        }

        .nav-item.active {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .nav-item i {
            width: 24px;
            font-size: 18px;
        }

        .nav-badge {
            margin-right: auto;
            background: var(--primary);
            color: white;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            opacity: 0.9;
        }

        .sidebar-footer {
            padding: 25px;
            border-top: 1px solid var(--border);
        }

        .developer-card {
            background: var(--bg-card-alt);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .dev-name {
            font-weight: 800;
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .dev-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            width: 100%;
            opacity: 0.9;
        }

        .dev-contact:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: var(--bg-card-alt);
            border-radius: var(--radius);
            margin-top: 15px;
        }

        .theme-toggle button {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }

        .theme-toggle button:hover,
        .theme-toggle button.active {
            background: var(--primary);
            color: white;
        }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            height: var(--header-height);
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .menu-toggle {
            display: none;
            width: 50px;
            height: 50px;
            align-items: center;
            justify-content: center;
            background: var(--bg-card-alt);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 22px;
            transition: 0.3s;
        }

        .menu-toggle:hover {
            background: var(--primary);
            color: white;
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box {
            position: relative;
            width: 280px;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-main);
            font-family: var(--font);
            font-size: 14px;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            scroll-behavior: smooth;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            opacity: 0.9;
        }

        .btn:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-ghost {
            background: var(--bg-card-alt);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }

        /* ========== البطاقات الإحصائية ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 25px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
            direction: ltr;
            display: inline-block;
        }

        .stat-change {
            font-size: 12px;
            color: var(--success);
        }

        /* ========== البطاقات والجداول ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            padding: 18px 20px;
            text-align: right;
            background: var(--primary-bg);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 500;
        }

        tr:hover td {
            background: var(--bg-card);
        }

        .clickable {
            cursor: pointer;
            color: var(--primary);
            font-weight: 700;
        }

        .clickable:hover {
            text-decoration: underline;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* ========== النماذج ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            font-family: var(--font);
            font-size: 14px;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        .form-select {
            cursor: pointer;
        }

        /* ========== النوافذ المنبثقة ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-card {
            background: var(--bg-card);
            padding: 35px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.4s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .modal-close {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        /* ========== الإشعارات ========== */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .toast-item {
            padding: 14px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast-item.success { background: var(--success); }
        .toast-item.error { background: var(--danger); }
        .toast-item.info { background: var(--primary); }

        /* ========== شاشة الدخول ========== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 50px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .login-logo {
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            margin: 0 auto 30px;
            opacity: 0.9;
        }

        .login-title {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 35px;
            color: var(--primary);
        }

        .login-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-card-alt);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-main);
            margin-bottom: 20px;
            font-size: 15px;
            transition: 0.3s;
        }

        .login-input:focus {
            border-color: var(--primary);
        }

        .login-button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            opacity: 0.9;
        }

        .login-button:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .login-error {
            background: var(--danger-bg);
            color: var(--danger);
            padding: 15px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--danger);
            display: none;
        }

        /* ========== التجاوب ========== */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                transform: translateX(100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(3px);
                z-index: 1050;
            }
            
            .sidebar-overlay.active {
                display: block;
            }
            
            .menu-toggle {
                display: flex;
            }
            
            .search-box {
                width: 180px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 20px;
            }
            
            .header-title {
                font-size: 18px;
            }
            
            .scroll-area {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ========== أدوات مساعدة ========== */
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .font-mono { font-family: 'Courier New', monospace; }
        .direction-ltr { direction: ltr; display: inline-block; }
        .w-100 { width: 100%; }
        .mt-3 { margin-top: 15px; }
        .mb-2 { margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-crown"></i>
        </div>
        <h1 class="login-title">الخبير المحاسبي</h1>
        <div id="loginError" class="login-error"></div>
        <form onsubmit="Auth.login(event)">
            <input type="text" id="username" class="login-input" placeholder="اسم المستخدم" value="admin" autofocus>
            <input type="password" id="password" class="login-input" placeholder="كلمة المرور" value="admin123">
            <button type="submit" class="login-button">
                <i class="fas fa-lock-open"></i>
                دخول آمن
            </button>
        </form>
        <div style="text-align: center; margin-top: 25px; color: var(--text-dim);">
            <i class="fas fa-code"></i> مطور: محمد أحمد فؤاد | 
            <i class="fab fa-whatsapp"></i> 01010421571
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" class="app-container" style="display: none;">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="UI.toggleSidebar(false)"></div>

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-title">الخبير المحاسبي</div>
            <div class="brand-sub">النسخة الذهبية v10.0</div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">القائمة الرئيسية</div>
                <div class="nav-item active" id="nav-dashboard" onclick="Router.navigate('dashboard')">

<script>
// ========== النظام الأساسي ==========

// ========== قاعدة البيانات ==========
const Database = {
    data: {
        clients: [],
        settings: {
            username: 'admin',
            password: 'admin123',
            theme: 'dark',
            companyName: 'شركتي'
        },
        statistics: {
            lastBackup: null,
            totalTransactions: 0,
            totalAmount: 0,
            createdAt: new Date().toISOString()
        }
    },

    init() {
        const saved = localStorage.getItem('elite_accounting_v10');
        if (saved) {
            try {
                this.data = JSON.parse(saved);
            } catch (e) {
                console.error('خطأ في تحميل البيانات');
                this.resetToDefault();
            }
        } else {
            this.resetToDefault();
        }
        this.updateBadges();
    },

    resetToDefault() {
        this.data = {
            clients: [],
            settings: {
                username: 'admin',
                password: 'admin123',
                theme: 'dark',
                companyName: 'شركتي'
            },
            statistics: {
                lastBackup: null,
                totalTransactions: 0,
                totalAmount: 0,
                createdAt: new Date().toISOString()
            }
        };
    },

    save() {
        localStorage.setItem('elite_accounting_v10', JSON.stringify(this.data));
        this.updateBadges();
    },

    updateBadges() {
        const dashboardBadge = document.getElementById('dashboardBadge');
        const clientsBadge = document.getElementById('clientsBadge');
        const transactionsBadge = document.getElementById('transactionsBadge');
        
        if (dashboardBadge) dashboardBadge.textContent = this.data.clients.length;
        if (clientsBadge) clientsBadge.textContent = this.data.clients.length;
        
        const totalTx = this.data.clients.reduce((sum, c) => sum + (c.transactions?.length || 0), 0);
        if (transactionsBadge) transactionsBadge.textContent = totalTx;
    },

    getClient(id) {
        return this.data.clients.find(c => c.id === id);
    },

    // إضافة عميل جديد مع تفاصيل له/عليه
    addClient(client) {
        const newClient = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 8),
            name: client.name || '',
            phone: client.phone || '',
            address: client.address || '',
            notes: client.notes || '',
            transactions: [],
            createdAt: new Date().toISOString(),
            balance: 0,
            // تفاصيل إضافية
            totalFor: 0, // إجمالي له
            totalAgainst: 0 // إجمالي عليه
        };
        
        // إذا تم إدخال مبلغ له
        if (client.amountFor && parseFloat(client.amountFor) > 0) {
            const amount = parseFloat(client.amountFor) || 0;
            newClient.totalFor = amount;
            newClient.balance = amount;
            newClient.transactions.push({
                id: Date.now().toString() + 'a',
                type: 'له',
                amount: amount,
                date: new Date().toISOString().split('T')[0],
                notes: 'رصيد افتتاحي (له)',
                createdAt: new Date().toISOString()
            });
        }
        
        // إذا تم إدخال مبلغ عليه
        if (client.amountAgainst && parseFloat(client.amountAgainst) > 0) {
            const amount = parseFloat(client.amountAgainst) || 0;
            newClient.totalAgainst = amount;
            newClient.balance = (newClient.balance || 0) - amount;
            newClient.transactions.push({
                id: Date.now().toString() + 'b',
                type: 'عليه',
                amount: amount,
                date: new Date().toISOString().split('T')[0],
                notes: 'رصيد افتتاحي (عليه)',
                createdAt: new Date().toISOString()
            });
        }
        
        this.data.clients.push(newClient);
        this.save();
        return newClient;
    },

    updateClient(id, updates) {
        const client = this.getClient(id);
        if (client) {
            Object.assign(client, updates);
            this.save();
            return true;
        }
        return false;
    },

    deleteClient(id) {
        this.data.clients = this.data.clients.filter(c => c.id !== id);
        this.save();
    },

    addTransaction(clientId, transaction) {
        const client = this.getClient(clientId);
        if (!client) return false;

        const amount = parseFloat(transaction.amount) || 0;
        if (amount === 0) {
            UI.toast('المبلغ لا يمكن أن يكون صفر', 'error');
            return false;
        }

        const tx = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 10),
            type: transaction.type || 'له',
            amount: amount,
            date: transaction.date || new Date().toISOString().split('T')[0],
            notes: transaction.notes || '',
            createdAt: new Date().toISOString()
        };

        client.transactions = client.transactions || [];
        client.transactions.push(tx);
        
        this.updateClientBalance(clientId);
        this.save();
        return true;
    },

    deleteTransaction(clientId, transactionId) {
        const client = this.getClient(clientId);
        if (!client) return false;

        client.transactions = (client.transactions || []).filter(t => t.id !== transactionId);
        this.updateClientBalance(clientId);
        this.save();
        return true;
    },

    updateClientBalance(clientId) {
        const client = this.getClient(clientId);
        if (!client || !client.transactions) return;

        let totalFor = 0, totalAgainst = 0;
        
        client.transactions.forEach(t => {
            const amount = parseFloat(t.amount) || 0;
            if (t.type === 'له') totalFor += amount;
            else totalAgainst += amount;
        });

        client.totalFor = totalFor;
        client.totalAgainst = totalAgainst;
        client.balance = totalFor - totalAgainst;
    },

    getClientSummary(clientId) {
        const client = this.getClient(clientId);
        if (!client) return { balance: 0, totalFor: 0, totalAgainst: 0, count: 0 };

        return {
            balance: client.balance || 0,
            totalFor: client.totalFor || 0,
            totalAgainst: client.totalAgainst || 0,
            count: client.transactions?.length || 0
        };
    },

    getRunningBalance(clientId) {
        const client = this.getClient(clientId);
        if (!client || !client.transactions) return [];

        let running = 0;
        return (client.transactions || [])
            .slice()
            .sort((a, b) => new Date(a.date) - new Date(b.date) || a.createdAt.localeCompare(b.createdAt))
            .map(t => {
                const amount = parseFloat(t.amount) || 0;
                if (t.type === 'له') running += amount;
                else running -= amount;
                return { ...t, running };
            });
    },

    getStatistics() {
        const stats = {
            totalClients: this.data.clients.length,
            totalTransactions: 0,
            totalFor: 0,
            totalAgainst: 0,
            netBalance: 0,
            debtors: 0,
            creditors: 0,
            totalAmount: 0
        };

        this.data.clients.forEach(client => {
            const summary = this.getClientSummary(client.id);
            stats.totalTransactions += summary.count;
            stats.totalFor += summary.totalFor;
            stats.totalAgainst += summary.totalAgainst;
            if (summary.balance > 0) stats.creditors++;
            else if (summary.balance < 0) stats.debtors++;
        });

        stats.netBalance = stats.totalFor - stats.totalAgainst;
        stats.totalAmount = stats.totalFor + stats.totalAgainst;
        return stats;
    },

    getAllTransactions() {
        const transactions = [];
        this.data.clients.forEach(client => {
            (client.transactions || []).forEach(tx => {
                transactions.push({
                    ...tx,
                    clientName: client.name,
                    clientId: client.id,
                    clientPhone: client.phone
                });
            });
        });
        return transactions.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt.localeCompare(a.createdAt));
    }
};

        if (username === settings.username && password === settings.password) {

const Router = {
    currentView: 'dashboard',
    params: null,

    navigate(view, params = null) {
        this.currentView = view;
        this.params = params;
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        
        const navMap = {
            'dashboard': 'nav-dashboard',
            'clients': 'nav-clients',
            'transactions': 'nav-transactions',
            'reports': 'nav-reports'
        };
        
        const navId = navMap[view];
        if (navId) {
            const navElement = document.getElementById(navId);
            if (navElement) navElement.classList.add('active');
        }
        
        if (window.innerWidth <= 1024) {
            UI.toggleSidebar(false);
        }
        
        this.render();
    },

    render() {
        const area = document.getElementById('viewArea');
        const title = document.getElementById('viewTitle');
        
        if (!area) return;
        
        area.innerHTML = '';
        
        const titles = {
            'dashboard': 'لوحة التحكم',
            'clients': 'إدارة العملاء',
            'transactions': 'المعاملات',
            'reports': 'التقارير',
            'clientDetail': 'تفاصيل العميل'
        };
        
        title.textContent = titles[this.currentView] || 'الخبير المحاسبي';
        
        switch(this.currentView) {
            case 'dashboard':
                Views.dashboard().then(html => area.innerHTML = html);
                break;
            case 'clients':
                Views.clients().then(html => area.innerHTML = html);
                break;
            case 'transactions':
                Views.transactions().then(html => area.innerHTML = html);
                break;
            case 'reports':
                Views.reports().then(html => area.innerHTML = html);
                break;
            case 'clientDetail':
                if (this.params) {
                    const client = Database.getClient(this.params);
                    if (client) {
                        Views.clientDetail(client).then(html => area.innerHTML = html);
                    } else {
                        Router.navigate('clients');
                        UI.toast('العميل غير موجود', 'error');
                    }
                }
                break;
            default:
                Views.dashboard().then(html => area.innerHTML = html);
        }
    }
};

// ========== نظام التصدير لإكسل ==========
const Excel = {
    formatWorksheet(ws) {
        const range = XLSX.utils.decode_range(ws['!ref']);
        for (let R = range.s.r; R <= range.e.r; ++R) {
            for (let C = range.s.c; C <= range.e.c; ++C) {
                const cell = ws[XLSX.utils.encode_cell({ r: R, c: C })];
                if (cell && cell.t === 'n') {
                    cell.z = '#,##0.00 ج.م';
                }
            }
        }
    },

    exportFullReport() {
        const wb = XLSX.utils.book_new();
        const date = Utils.formatDate(new Date()).replace(/\//g, '-');
        const company = Database.data.settings.companyName || 'الخبير المحاسبي';
        
        // ورقة ملخص العملاء
        const summaryData = [
            [company], ['تقرير ملخص العملاء'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'الاسم', 'الهاتف', 'المعاملات', 'له', 'عليه', 'الرصيد', 'الحالة']
        ];
        
        Database.data.clients.forEach((client, index) => {
            const s = Database.getClientSummary(client.id);
            summaryData.push([
                index + 1, client.name, client.phone || '—', s.count,
                s.totalFor, s.totalAgainst, s.balance,
                s.balance > 0 ? 'دائن' : s.balance < 0 ? 'مدين' : 'متوازن'
            ]);
        });
        
        const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
        this.formatWorksheet(wsSummary);
        XLSX.utils.book_append_sheet(wb, wsSummary, 'ملخص العملاء');
        
        // ورقة جميع المعاملات
        const txData = [
            [company], ['تقرير جميع المعاملات'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'التاريخ', 'العميل', 'النوع', 'المبلغ', 'البيان', 'الهاتف']
        ];
        
        Database.getAllTransactions().forEach((tx, index) => {
            txData.push([
                index + 1, tx.date, tx.clientName, tx.type, tx.amount, tx.notes || '—', tx.clientPhone || '—'
            ]);
        });
        
        const wsTx = XLSX.utils.aoa_to_sheet(txData);
        this.formatWorksheet(wsTx);
        XLSX.utils.book_append_sheet(wb, wsTx, 'المعاملات');
        
        XLSX.writeFile(wb, `تقرير_شامل_${date}.xlsx`);
        UI.toast('تم تصدير التقرير الشامل', 'success');
    },

    exportClientTransactions(clientId) {
        const client = Database.getClient(clientId);
        if (!client) return;
        
        const summary = Database.getClientSummary(clientId);
        const running = Database.getRunningBalance(clientId);
        const date = Utils.formatDate(new Date()).replace(/\//g, '-');
        
        const data = [
            [Database.data.settings.companyName], [`كشف حساب: ${client.name}`], [`هاتف: ${client.phone || '—'}`], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['ملخص الحساب'], ['له', 'عليه', 'الرصيد', 'المعاملات'],
            [summary.totalFor, summary.totalAgainst, summary.balance, summary.count], [],
            ['تفاصيل المعاملات'], ['م', 'التاريخ', 'البيان', 'له', 'عليه', 'الرصيد']
        ];
        
        running.forEach((tx, i) => {
            data.push([
                i + 1, tx.date, tx.notes || '—',
                tx.type === 'له' ? tx.amount : '—',
                tx.type === 'عليه' ? tx.amount : '—',
                tx.running
            ]);
        });
        
        const ws = XLSX.utils.aoa_to_sheet(data);
        this.formatWorksheet(ws);
        
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, client.name);
        XLSX.writeFile(wb, `كشف_${client.name}_${date}.xlsx`);
        UI.toast('تم تصدير كشف الحساب', 'success');
    },

    exportAllTransactions() {
        const txs = Database.getAllTransactions();
        const date = Utils.formatDate(new Date()).replace(/\//g, '-');
        
        const data = [
            [Database.data.settings.companyName], ['جميع المعاملات'], [`تاريخ: ${Utils.formatDate(new Date())}`], [`الإجمالي: ${txs.length}`], [],
            ['م', 'التاريخ', 'العميل', 'النوع', 'المبلغ', 'البيان', 'الهاتف']
        ];
        
        txs.forEach((tx, i) => {
            data.push([i + 1, tx.date, tx.clientName, tx.type, tx.amount, tx.notes || '—', tx.clientPhone || '—']);
        });
        
        const total = txs.reduce((s, tx) => s + tx.amount, 0);
        data.push([], ['الإجمالي', '', '', '', total, '', '']);
        
        const ws = XLSX.utils.aoa_to_sheet(data);
        this.formatWorksheet(ws);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'المعاملات');
        XLSX.writeFile(wb, `جميع_المعاملات_${date}.xlsx`);
        UI.toast('تم تصدير المعاملات', 'success');
    },

    exportTopDebtors() {
        const data = [[Database.data.settings.companyName], ['أكبر المديونيات'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'العميل', 'المبلغ', 'المعاملات', 'الهاتف']];
        
        Database.data.clients
            .map(c => ({ ...c, s: Database.getClientSummary(c.id) }))
            .filter(c => c.s.balance < 0)
            .sort((a, b) => a.s.balance - b.s.balance)
            .forEach((c, i) => {
                data.push([i + 1, c.name, Math.abs(c.s.balance), c.s.count, c.phone || '—']);
            });
        
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'أكبر المديونيات');
        XLSX.writeFile(wb, `اكبر_المديونيات_${Utils.formatDate(new Date()).replace(/\//g, '-')}.xlsx`);
        UI.toast('تم تصدير التقرير', 'success');
    },

    exportTopCreditors() {
        const data = [[Database.data.settings.companyName], ['أكبر الدائنين'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'العميل', 'المبلغ', 'المعاملات', 'الهاتف']];
        
        Database.data.clients
            .map(c => ({ ...c, s: Database.getClientSummary(c.id) }))
            .filter(c => c.s.balance > 0)
            .sort((a, b) => b.s.balance - a.s.balance)
            .forEach((c, i) => {
                data.push([i + 1, c.name, c.s.balance, c.s.count, c.phone || '—']);
            });
        
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'أكبر الدائنين');
        XLSX.writeFile(wb, `اكبر_الدائنين_${Utils.formatDate(new Date()).replace(/\//g, '-')}.xlsx`);
        UI.toast('تم تصدير التقرير', 'success');
    },

    exportClientSummary() {
        const data = [[Database.data.settings.companyName], ['ملخص العملاء'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'الاسم', 'الهاتف', 'له', 'عليه', 'الرصيد', 'الحالة']];
        
        Database.data.clients.forEach((c, i) => {
            const s = Database.getClientSummary(c.id);
            data.push([i + 1, c.name, c.phone || '—', s.totalFor, s.totalAgainst, s.balance,
                s.balance > 0 ? 'دائن' : s.balance < 0 ? 'مدين' : 'متوازن']);
        });
        
        const ws = XLSX.utils.aoa_to_sheet(data);
        this.formatWorksheet(ws);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'ملخص العملاء');
        XLSX.writeFile(wb, `ملخص_العملاء_${Utils.formatDate(new Date()).replace(/\//g, '-')}.xlsx`);
        UI.toast('تم تصدير الملخص', 'success');
    },

    showExportOptions() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'exportModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">خيارات التصدير</div>
                    <button class="modal-close" onclick="document.getElementById('exportModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="btn btn-success" onclick="Excel.exportFullReport(); document.getElementById('exportModal').remove()">
                        <i class="fas fa-file-excel"></i> تقرير شامل
                    </button>
                    <button class="btn btn-primary" onclick="Excel.exportClientSummary(); document.getElementById('exportModal').remove()">
                        <i class="fas fa-file-excel"></i> ملخص العملاء
                    </button>
                    <button class="btn btn-warning" onclick="Excel.exportAllTransactions(); document.getElementById('exportModal').remove()">
                        <i class="fas fa-file-excel"></i> جميع المعاملات
                    </button>
                    <button class="btn btn-danger" onclick="Excel.exportTopDebtors(); document.getElementById('exportModal').remove()">
                        <i class="fas fa-file-excel"></i> أكبر المديونيات
                    </button>
                    <button class="btn btn-success" onclick="Excel.exportTopCreditors(); document.getElementById('exportModal').remove()">
                        <i class="fas fa-file-excel"></i> أكبر الدائنين
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }
};

        e.preventDefault();
        const name = document.getElementById('clientName').value.trim();
        if (!name) return this.toast('أدخل الاسم', 'error');
        
        // قراءة المبالغ (تلقائياً 0 إذا لم يتم الإدخال)
        const amountFor = parseFloat(document.getElementById('clientAmountFor').value) || 0;
        const amountAgainst = parseFloat(document.getElementById('clientAmountAgainst').value) || 0;
        
        Database.addClient({
            name,
            phone: document.getElementById('clientPhone').value,
            address: document.getElementById('clientAddress').value,
            notes: document.getElementById('clientNotes').value,
            amountFor: amountFor,
            amountAgainst: amountAgainst
        });
        
        document.getElementById('addClientModal').remove();
        this.toast('تم إضافة العميل', 'success');
        Router.render();
    },

    showAddMultipleClients() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'multipleClientsModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">👥 إضافة عدة عملاء</div>
                    <button class="modal-close" onclick="document.getElementById('multipleClientsModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">أسماء العملاء (اسم في كل سطر)</label>
                    <textarea id="bulkClientNames" class="form-control" rows="8" placeholder="محمد أحمد&#10;علي حسن&#10;فاطمة محمد"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">رقم هاتف افتراضي (اختياري)</label>
                    <input type="text" id="bulkPhone" class="form-control" placeholder="نفس الرقم للجميع">
                </div>
                <button class="btn btn-primary w-100" onclick="UI.saveMultipleClients()">حفظ الجميع</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveMultipleClients() {
        const names = document.getElementById('bulkClientNames').value.split('\n').map(n => n.trim()).filter(n => n);
        if (!names.length) return this.toast('أدخل أسماء', 'error');
        
        const phone = document.getElementById('bulkPhone').value;
        names.forEach(name => Database.addClient({ name, phone, notes: 'إضافة دفعة' }));
        document.getElementById('multipleClientsModal').remove();
        this.toast(`تم إضافة ${names.length} عميل`, 'success');
        Router.render();
    },

    showAddTransaction(clientId = null) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'addTxModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">💰 إضافة معاملة</div>
                    <button class="modal-close" onclick="document.getElementById('addTxModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <form onsubmit="UI.saveTransaction(event)">
                    <div class="form-group">
                        <label class="form-label">العميل</label>
                        <select id="txClient" class="form-select" ${clientId ? 'disabled' : ''} required>
                            <option value="">اختر العميل</option>
                            ${Database.data.clients.map(c => `<option value="${c.id}" ${clientId === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">النوع</label>
                        <select id="txType" class="form-select">
                            <option value="له">له (قبض)</option>
                            <option value="عليه">عليه (صرف)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">المبلغ</label>
                        <input type="number" id="txAmount" class="form-control" step="0.01" min="0.01" required>
                        <small style="color: var(--text-dim);">يجب أن يكون المبلغ أكبر من صفر</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">التاريخ</label>
                        <input type="date" id="txDate" class="form-control" value="${new Date().toISOString().split('T')[0]}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">البيان</label>
                        <input type="text" id="txNotes" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">حفظ المعاملة</button>
                </form>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveTransaction(e) {
        e.preventDefault();
        const clientId = document.getElementById('txClient').value;
        if (!clientId) return this.toast('اختر العميل', 'error');
        
        const amount = parseFloat(document.getElementById('txAmount').value);
        if (!amount || amount <= 0) return this.toast('أدخل مبلغ صحيح أكبر من صفر', 'error');
        
        Database.addTransaction(clientId, {
            type: document.getElementById('txType').value,
            amount,
            date: document.getElementById('txDate').value,
            notes: document.getElementById('txNotes').value
        });
        
        document.getElementById('addTxModal').remove();
        this.toast('تم إضافة المعاملة', 'success');
        Router.render();
    },

    showEditClient(clientId) {
        const client = Database.getClient(clientId);
        if (!client) return;
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'editClientModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">✏️ تعديل عميل</div>
                    <button class="modal-close" onclick="document.getElementById('editClientModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <form onsubmit="UI.updateClient(event, '${clientId}')">
                    <div class="form-group">
                        <label class="form-label">الاسم</label>
                        <input type="text" id="editName" class="form-control" value="${client.name}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">الهاتف</label>
                        <input type="text" id="editPhone" class="form-control" value="${client.phone || ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">العنوان</label>
                        <input type="text" id="editAddress" class="form-control" value="${client.address || ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">ملاحظات</label>
                        <textarea id="editNotes" class="form-control">${client.notes || ''}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">تحديث</button>
                </form>
            </div>
        `;
        document.body.appendChild(modal);
    },

    updateClient(e, clientId) {
        e.preventDefault();
        Database.updateClient(clientId, {
            name: document.getElementById('editName').value,
            phone: document.getElementById('editPhone').value,
            address: document.getElementById('editAddress').value,
            notes: document.getElementById('editNotes').value
        });
        document.getElementById('editClientModal').remove();
        this.toast('تم التحديث', 'success');
        Router.render();
    },

    deleteClient(clientId) {
        if (confirm('حذف العميل نهائياً؟')) {
            Database.deleteClient(clientId);
            this.toast('تم الحذف', 'success');
            Router.navigate('clients');
        }
    },

    deleteTransaction(clientId, txId) {
        if (confirm('حذف المعاملة؟')) {
            Database.deleteTransaction(clientId, txId);
            this.toast('تم الحذف', 'success');
            Router.render();
        }
    },

    showSettings() {
        const s = Database.data.settings;
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'settingsModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">⚙️ الإعدادات</div>
                    <button class="modal-close" onclick="document.getElementById('settingsModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">اسم الشركة</label>
                    <input type="text" id="companyName" class="form-control" value="${s.companyName || ''}">
                </div>
                <div class="form-group">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" id="newUsername" class="form-control" value="${s.username}">
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="text" id="newPassword" class="form-control" value="${s.password}">
                </div>
                <button class="btn btn-primary w-100" onclick="UI.saveSettings()">حفظ</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveSettings() {
        Database.data.settings.companyName = document.getElementById('companyName').value;
        Database.data.settings.username = document.getElementById('newUsername').value;
        Database.data.settings.password = document.getElementById('newPassword').value;
        Database.save();
        document.getElementById('settingsModal').remove();
        this.toast('تم حفظ الإعدادات', 'success');
    },

    showDeveloperInfo() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'devModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">👨‍💻 المطور</div>
                    <button class="modal-close" onclick="document.getElementById('devModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div style="text-align: center;">
                    <div style="width: 100px; height: 100px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                        <i class="fas fa-user-cog" style="font-size: 50px; color: white;"></i>
                    </div>
                    <h3>محمد أحمد فؤاد</h3>
                    <p style="color: var(--text-muted);">مطور برمجيات</p>
                    <div style="margin: 20px 0;">
                        <p><i class="fas fa-phone" style="color: var(--success);"></i> 01010421571</p>
                        <p><i class="fab fa-whatsapp" style="color: #25D366;"></i> 01010421571</p>
                        <p><i class="fas fa-code"></i> الإصدار: 10.0</p>
                    </div>
                    <button class="btn btn-success w-100" onclick="Utils.contactDev()">
                        <i class="fab fa-whatsapp"></i> تواصل عبر واتساب
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    },

    showBackupOptions() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'backupModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">💾 النسخ الاحتياطي</div>
                    <button class="modal-close" onclick="document.getElementById('backupModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <button class="btn btn-primary w-100 mb-2" onclick="UI.createBackup(); document.getElementById('backupModal').remove()">
                    <i class="fas fa-download"></i> إنشاء نسخة
                </button>
                <button class="btn btn-success w-100 mb-2" onclick="UI.restoreBackup()">
                    <i class="fas fa-upload"></i> استعادة نسخة
                </button>
                <button class="btn btn-danger w-100" onclick="UI.resetData(); document.getElementById('backupModal').remove()">
                    <i class="fas fa-trash"></i> إعادة تعيين
                </button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    createBackup() {
        const data = JSON.stringify(Database.data, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `نسخة_احتياطية_${Utils.formatDate(new Date()).replace(/\//g, '-')}.json`;
        a.click();
        Database.data.statistics.lastBackup = new Date().toISOString();
        Database.save();
        this.toast('تم إنشاء النسخة', 'success');
    },

    restoreBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.clients) {
                        Database.data = data;
                        Database.save();
                        document.getElementById('backupModal')?.remove();
                        this.toast('تمت الاستعادة', 'success');
                        Router.render();
                    }
                } catch {
                    this.toast('ملف غير صالح', 'error');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    },

    resetData() {
        if (confirm('⚠️ حذف كل البيانات نهائياً؟')) {
            Database.resetToDefault();
            Database.save();
            this.toast('تم إعادة التعيين', 'success');
            Router.render();
        }
    }
};

// ========== أدوات مساعدة ==========
const Utils = {
    formatMoneyEnglish(amount) {
        return parseFloat(amount || 0).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }) + ' EGP';
    },

    formatDate(date) {
        try {
            return new Date(date).toLocaleDateString('ar-EG');
        } catch {
            return date;
        }
    },

    contactDev() {
        window.open('https://wa.me/201010421571', '_blank');
    }
};

    }
    
    const savedTheme = localStorage.getItem('elite_theme');
    if (savedTheme) UI.setTheme(savedTheme);
};
