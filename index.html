<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="نظام احترافي لإدارة حسابات العملاء والمديونيات - تطوير محمد أحمد فؤاد - واتساب: 01010421571">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --font: 'Cairo', sans-serif;
  --font-mono: 'Courier New', monospace;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;

  /* DARK (default) */
  --bg:        #0f1117;
  --bg2:       #161923;
  --card:      #1a1f2e;
  --card2:     #1f2535;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #f0f2f8;
  --text2:     #8892a4;
  --text3:     #555f6e;

  --primary:      #4f8ef7;
  --primary-bg:   rgba(79,142,247,0.12);
  --primary-dark: #3a7af4;

  --success:     #3dd68c;
  --success-bg:  rgba(61,214,140,0.10);
  --danger:      #f75f5f;
  --danger-bg:   rgba(247,95,95,0.10);
  --warning:     #f5a623;
  --warning-bg:  rgba(245,166,35,0.10);
  --info:        #38bdf8;
  --info-bg:     rgba(56,189,248,0.10);

  --sidebar-w: 260px;
  --header-h:  60px;

  --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
  --shadow:    0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}
html[data-theme="light"] {
  --bg:        #f0f2f8;
  --bg2:       #e6e9f2;
  --card:      #ffffff;
  --card2:     #f5f7fc;
  --border:    rgba(0,0,0,0.07);
  --border2:   rgba(0,0,0,0.12);
  --text:      #0f1117;
  --text2:     #556070;
  --text3:     #a0aab5;

  --primary:      #2563eb;
  --primary-bg:   rgba(37,99,235,0.08);
  --primary-dark: #1d4ed8;

  --success:     #16a34a;
  --success-bg:  rgba(22,163,74,0.08);
  --danger:      #dc2626;
  --danger-bg:   rgba(220,38,38,0.08);
  --warning:     #d97706;
  --warning-bg:  rgba(217,119,6,0.08);
  --info:        #0284c7;
  --info-bg:     rgba(2,132,199,0.08);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow:    0 4px 16px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body {
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  line-height:1.6;
  transition:background 0.3s, color 0.3s;
  overflow:hidden;
}
input, textarea, select, button { font-family:inherit; font-size:inherit; }
a { color:inherit; text-decoration:none; }
button { cursor:pointer; border:none; outline:none; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--text3); border-radius:99px; }

/* ============================================================
   LAYOUT
   ============================================================ */
.app { display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
.sidebar {
  width:var(--sidebar-w);
  background:var(--card);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  flex-shrink:0;
  z-index:50;
  transition:transform 0.3s;
}
.sidebar-brand {
  padding:20px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.brand-icon {
  width:38px; height:38px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.brand-text { font-weight:800; font-size:13px; line-height:1.3; }
.brand-sub { font-size:10px; color:var(--text2); }
.sidebar-nav { flex:1; padding:12px 8px; overflow-y:auto; }
.nav-section { margin-bottom:20px; }
.nav-section-label { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; padding:4px 10px 8px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all 0.15s;
  color:var(--text2); font-size:13px; font-weight:500;
  position:relative; user-select:none;
}
.nav-item:hover { background:var(--card2); color:var(--text); }
.nav-item.active { background:var(--primary-bg); color:var(--primary); font-weight:700; }
.nav-item .nav-icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
.nav-badge {
  margin-right:auto;
  background:var(--primary-bg); color:var(--primary);
  font-size:10px; font-weight:700; padding:1px 7px;
  border-radius:99px;
}
.sidebar-footer {
  padding:16px;
  border-top:1px solid var(--border);
  font-size:12px;
  line-height:1.6;
}
.developer-info {
  background:var(--bg);
  border-radius:var(--radius-md);
  padding:12px;
  margin-bottom:10px;
}
.developer-name {
  font-weight:700;
  color:var(--primary);
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:8px;
}
.developer-whatsapp {
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--success);
  font-size:11px;
  word-break:break-all;
}
.whatsapp-number {
  font-family:var(--font-mono);
  background:var(--card2);
  padding:4px 8px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
}
.theme-toggle {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--border);
}
.theme-toggle button {
  background:var(--card2);
  border:1px solid var(--border);
  color:var(--text2);
  width:30px;
  height:30px;
  border-radius:var(--radius-sm);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all 0.15s;
}
.theme-toggle button:hover {
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
.theme-toggle button.active {
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}

/* Main */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header {
  height:var(--header-h);
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; flex-shrink:0;
  gap:12px;
}
.header-title { font-weight:700; font-size:16px; }
.header-actions { display:flex; align-items:center; gap:8px; }
.mobile-menu-btn {
  display:none;
  width:36px; height:36px;
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text2);
  font-size:18px;
  cursor:pointer;
}
.mobile-menu-btn:hover { background:var(--primary); color:#fff; }
.content { flex:1; overflow-y:auto; padding:24px; }
.content-inner { max-width:1200px; margin:0 auto; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:8px 16px; border-radius:var(--radius-sm);
  font-weight:600; font-size:13px; transition:all 0.15s;
  white-space:nowrap; user-select:none;
}
.btn:active { transform:scale(0.97); }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); box-shadow:0 4px 14px rgba(79,142,247,0.35); }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { opacity:0.9; box-shadow:0 4px 14px rgba(61,214,140,0.35); }
.btn-danger  { background:var(--danger); color:#fff; }
.btn-danger:hover  { opacity:0.9; }
.btn-ghost {
  background:var(--card2); color:var(--text2);
  border:1px solid var(--border2);
}
.btn-ghost:hover { background:var(--border); color:var(--text); }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-xs { padding:3px 8px; font-size:11px; border-radius:6px; }
.btn-icon {
  width:36px; height:36px; padding:0;
  background:var(--card2); color:var(--text2);
  border:1px solid var(--border); border-radius:var(--radius-sm);
}
.btn-icon:hover { background:var(--border); color:var(--text); }

/* ============================================================
   STAT CARDS
   ============================================================ */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:18px 20px;
  cursor:default; transition:all 0.2s;
}
.stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.stat-card .stat-label { font-size:11px; color:var(--text2); font-weight:500; margin-bottom:8px; }
.stat-card .stat-value { font-size:26px; font-weight:800; font-family:var(--font-mono); line-height:1; }
.stat-card .stat-sub   { font-size:11px; color:var(--text3); margin-top:6px; }
.stat-card .stat-icon  { font-size:24px; margin-bottom:10px; }
.stat-card.primary .stat-value { color:var(--primary); }
.stat-card.success .stat-value { color:var(--success); }
.stat-card.danger  .stat-value { color:var(--danger); }
.stat-card.warning .stat-value { color:var(--warning); }

/* ============================================================
   SEARCH BAR
   ============================================================ */
.search-wrap {
  position:relative; display:flex; align-items:center;
  background:var(--card); border:1px solid var(--border2);
  border-radius:var(--radius-md); overflow:hidden;
  transition:all 0.2s;
}
.search-wrap:focus-within { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-bg); }
.search-icon { padding:0 12px; color:var(--text3); font-size:14px; flex-shrink:0; }
.search-input {
  flex:1; border:none; background:transparent; color:var(--text);
  padding:10px 0; font-family:var(--font); font-size:13px; outline:none;
}
.search-input::placeholder { color:var(--text3); }
.search-clear {
  width:28px; height:28px; border:none; background:none;
  color:var(--text3); font-size:14px; cursor:pointer;
  display:none; align-items:center; justify-content:center;
  border-radius:6px; margin-left:6px; flex-shrink:0;
}
.search-clear:hover { background:var(--card2); color:var(--text); }

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); overflow:hidden;
}
.table-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; border-bottom:1px solid var(--border);
}
.table-title { font-weight:700; font-size:14px; }
.table-count { font-size:11px; color:var(--text2); }
table { width:100%; border-collapse:collapse; }
th {
  padding:10px 14px; text-align:right;
  font-size:11px; font-weight:600; color:var(--text3);
  background:var(--card2); border-bottom:1px solid var(--border);
  letter-spacing:0.3px;
}
th:first-child { border-radius:0; }
td {
  padding:12px 14px; border-bottom:1px solid var(--border);
  vertical-align:middle; font-size:13px; transition:background 0.1s;
}
tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--card2); }
.td-name { font-weight:600; cursor:pointer; }
.td-name:hover { color:var(--primary); }
.td-balance { font-family:var(--font-mono); font-weight:700; font-size:14px; }
.td-actions { display:flex; gap:6px; justify-content:flex-end; }

/* Status Badge */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:99px;
  font-size:11px; font-weight:700;
}
.badge-success { background:var(--success-bg); color:var(--success); border:1px solid rgba(61,214,140,0.2); }
.badge-danger  { background:var(--danger-bg);  color:var(--danger);  border:1px solid rgba(247,95,95,0.2); }
.badge-neutral { background:var(--card2); color:var(--text2); border:1px solid var(--border); }

/* ============================================================
   FORM
   ============================================================ */
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:6px; }
.form-input, .form-select, .form-textarea {
  width:100%; background:var(--card2); border:1px solid var(--border2);
  border-radius:var(--radius-sm); padding:10px 12px; color:var(--text);
  outline:none; transition:all 0.2s; font-family:var(--font); font-size:13px;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-bg);
  background:var(--card);
}
.form-select { cursor:pointer; }
.form-select option { background:var(--card); color:var(--text); }
.form-textarea { resize:vertical; min-height:80px; }
.form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-error { font-size:11px; color:var(--danger); margin-top:4px; }
.form-hint  { font-size:11px; color:var(--text3); margin-top:4px; }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  z-index:200; padding:16px;
  animation:fadeIn 0.15s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.modal {
  background:var(--card); border:1px solid var(--border2);
  border-radius:var(--radius-xl); padding:28px;
  width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:slideUp 0.2s ease;
}
.modal-lg { max-width:640px; }
.modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.modal-title { font-size:16px; font-weight:700; }
.modal-close {
  width:32px; height:32px; background:none; border:none;
  color:var(--text3); font-size:20px; cursor:pointer;
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.modal-close:hover { background:var(--card2); color:var(--danger); }

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:20px;
}
.card-sm { border-radius:var(--radius-md); padding:14px 16px; }

/* Summary Banner (Client Detail) */
.summary-banner {
  background:linear-gradient(135deg,var(--card) 0%,var(--bg2) 100%);
  border:1px solid var(--border2);
  border-radius:var(--radius-xl); padding:24px 28px;
  margin-bottom:24px;
}
.summary-title { font-size:13px; color:var(--text2); margin-bottom:4px; }
.summary-val { font-size:36px; font-weight:900; font-family:var(--font-mono); line-height:1; }
.summary-status { font-size:13px; font-weight:600; margin-top:8px; }
.summary-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-top:16px; }
.summary-stat { text-align:center; padding:12px; background:var(--bg); border-radius:var(--radius-md); border:1px solid var(--border); }
.summary-stat .s-label { font-size:11px; color:var(--text3); margin-bottom:4px; }
.summary-stat .s-val   { font-size:18px; font-weight:800; font-family:var(--font-mono); }

/* Transaction List */
.tx-list { display:flex; flex-direction:column; gap:6px; }
.tx-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  background:var(--card2); border-radius:var(--radius-md);
  border:1px solid var(--border); cursor:pointer; transition:all 0.15s;
}
.tx-item:hover { border-color:var(--border2); box-shadow:var(--shadow-sm); }
.tx-dot {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px;
}
.tx-dot.in  { background:var(--success-bg); }
.tx-dot.out { background:var(--danger-bg); }
.tx-body { flex:1; min-width:0; }
.tx-type  { font-size:12px; font-weight:600; }
.tx-type.in  { color:var(--success); }
.tx-type.out { color:var(--danger); }
.tx-notes { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-amount  { font-family:var(--font-mono); font-weight:700; font-size:15px; }
.tx-amount.in  { color:var(--success); }
.tx-amount.out { color:var(--danger); }
.tx-date   { font-size:11px; color:var(--text3); }
.tx-running { font-size:11px; color:var(--text2); font-family:var(--font-mono); }
.tx-actions { display:flex; gap:4px; flex-shrink:0; }

/* Empty state */
.empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 20px; gap:12px;
  color:var(--text3); text-align:center;
}
.empty-state .empty-icon { font-size:40px; opacity:0.5; }
.empty-state .empty-title { font-size:15px; font-weight:600; color:var(--text2); }
.empty-state .empty-sub { font-size:12px; color:var(--text3); }

/* ============================================================
   TOAST
   ============================================================ */
.toast-container {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  z-index:9999; display:flex; flex-direction:column; gap:8px;
  pointer-events:none;
}
.toast-item {
  display:flex; align-items:center; gap:10px;
  padding:12px 20px; border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg); font-size:13px; font-weight:600;
  pointer-events:auto; animation:slideUp 0.25s ease;
  min-width:260px; max-width:400px;
}
.toast-item.success { background:#16a34a; color:#fff; }
.toast-item.error   { background:#dc2626; color:#fff; }
.toast-item.info    { background:var(--primary); color:#fff; }
.toast-item.warning { background:var(--warning); color:#fff; }

/* ============================================================
   PRINT STYLES
   ============================================================ */
@media print {
  body { background:#fff !important; color:#000 !important; font-size:12pt; overflow:visible; }
  .sidebar, .header, .print-hide, .btn, button { display:none !important; }
  .main, .content, .app { overflow:visible !important; height:auto !important; }
  .card, .table-wrap, .summary-banner { box-shadow:none !important; border:1px solid #ddd !important; }
  .stat-card { border:1px solid #ddd !important; }
  .stats-grid { grid-template-columns:repeat(4,1fr) !important; }
  .tx-actions { display:none !important; }
  .badge { border:1px solid #ccc !important; }
  thead th { background:#f5f5f5 !important; color:#000 !important; }
  tbody tr:hover td { background:transparent !important; }
  .print-break-before { page-break-before:always; }
  .content { padding:0 !important; }
  * { animation:none !important; transition:none !important; }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:900px) {
  .sidebar { position:fixed; right:-100%; top:0; bottom:0; transition:right 0.3s; z-index:100; }
  .sidebar.open { right:0; box-shadow:var(--shadow-lg); }
  .mobile-menu-btn { display:flex; align-items:center; justify-content:center; }
  .stats-grid { grid-template-columns:1fr 1fr; }
  .form-grid-2 { grid-template-columns:1fr; }
  .summary-grid { grid-template-columns:1fr 1fr; }
}
@media(max-width:600px) {
  .stats-grid { grid-template-columns:1fr; }
  .content { padding:12px; }
  .modal { padding:20px 16px; }
  .summary-grid { grid-template-columns:1fr; }
  .table-responsive { overflow-x:auto; }
  td, th { white-space:nowrap; }
}

/* Misc helpers */
.section-title { font-size:14px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
.gap-2 { gap:8px; }
.flex { display:flex; align-items:center; }
.justify-between { justify-content:space-between; }
.divider { border:none; border-top:1px solid var(--border); margin:12px 0; }
.avatar {
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:14px; color:#fff; flex-shrink:0;
}
.page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-size:20px; font-weight:800; }
.page-sub   { font-size:12px; color:var(--text2); margin-top:2px; }
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Sidebar Overlay (mobile) -->

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">📊</div>
      <div class="brand-text">
        <div>نظام الحسابات</div>

    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">القوائم الرئيسية</div>
        <div class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">🏠</span> لوحة التحكم

        </div>
        <div class="nav-item" id="nav-clients" onclick="navigate('clients')">

          <span class="nav-badge" id="nav-badge-clients">0</span>

        <div class="nav-item" id="nav-transactions" onclick="navigate('transactions')">
          <span class="nav-icon">💰</span> المعاملات

        <div class="nav-item" id="nav-reports" onclick="navigate('reports')">
          <span class="nav-icon">📈</span> التقارير
          <span class="nav-badge" id="nav-badge-reports">جديد</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">الإعدادات</div>
        <div class="nav-item" id="nav-settings" onclick="navigate('settings')">
          <span class="nav-icon">⚙️</span> الإعدادات
        </div>
        <div class="nav-item" id="nav-backup" onclick="navigate('backup')">
          <span class="nav-icon">💾</span> النسخ الاحتياطي
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="developer-info">
        <div class="developer-name">
          <span>👨‍💻</span> محمد أحمد فؤاد
        </div>
        <div class="developer-whatsapp">
          <span>📱</span>
          <span class="whatsapp-number" onclick="copyToClipboard('01010421571')">01010421571</span>
        </div>
        <div style="font-size:10px; color:var(--text3); margin-top:8px; text-align:center;">
          واتساب متاح للدعم الفني
        </div>
      </div>
      <div class="theme-toggle">
        <span>🌙 الوضع</span>
        <div style="display:flex; gap:4px;">
          <button onclick="setTheme('dark')" id="theme-dark" class="active">🌙</button>
          <button onclick="setTheme('light')" id="theme-light">☀️</button>
        </div>
      </div>
      <div style="text-align:center; margin-top:12px; font-size:10px;">
        © 2024 جميع الحقوق محفوظة
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <!-- HEADER -->
    <header class="header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()" id="mobileMenuBtn">☰</button>
      <div class="header-title" id="headerTitle">لوحة التحكم</div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" onclick="showAddClientModal()">
          <span>➕</span> عميل جديد
        </button>
        <button class="btn btn-ghost btn-sm" onclick="showAddTransactionModal()">
          <span>💰</span> معاملة جديدة
        </button>
        <button class="btn btn-ghost btn-icon" onclick="refreshData()" title="تحديث">
          <span>🔄</span>
        </button>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="content" id="contentArea">
      <!-- Dynamic content will be loaded here -->
    </div>
  </main>
</div>

<script>
// ============================================================
// التهيئة والمتغيرات العامة
// ============================================================
let clients = [];
let transactions = [];
let currentView = 'dashboard';
let selectedClientId = null;

// تحميل البيانات من localStorage
function loadData() {
  try {
    const savedClients = localStorage.getItem('finance_clients');
    const savedTransactions = localStorage.getItem('finance_transactions');
    
    clients = savedClients ? JSON.parse(savedClients) : [];
    transactions = savedTransactions ? JSON.parse(savedTransactions) : [];
    
    // تحديث البادجات
    updateBadges();
  } catch (e) {
    console.error('خطأ في تحميل البيانات:', e);
    clients = [];
    transactions = [];
  }
}

// حفظ البيانات
function saveData() {
  localStorage.setItem('finance_clients', JSON.stringify(clients));
  localStorage.setItem('finance_transactions', JSON.stringify(transactions));
  updateBadges();
}

// تحديث البادجات
function updateBadges() {
  document.getElementById('nav-badge-dashboard').textContent = clients.length || '0';
  document.getElementById('nav-badge-clients').textContent = clients.length || '0';
  document.getElementById('nav-badge-transactions').textContent = transactions.length || '0';
}

// ============================================================
// دالة نسخ النص
// ============================================================
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('تم نسخ الرقم: ' + text, 'success');
  }).catch(() => {
    showToast('فشل نسخ الرقم', 'error');
  });
}

// ============================================================
// إظهار وإخفاء السايدبار (للموبايل)
// ============================================================
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  
  sidebar.classList.toggle('open');
  
  if (sidebar.classList.contains('open')) {
    overlay.style.display = 'block';
  } else {
    overlay.style.display = 'none';
  }
}

// ============================================================
// التنقل بين الصفحات
// ============================================================
function navigate(view) {
  currentView = view;
  
  // تحديث العنوان
  const titles = {
    'dashboard': 'لوحة التحكم',
    'clients': 'العملاء',
    'transactions': 'المعاملات',
    'reports': 'التقارير',
    'settings': 'الإعدادات',
    'backup': 'النسخ الاحتياطي'
  };
  document.getElementById('headerTitle').textContent = titles[view] || 'نظام الحسابات';
  
  // تحديث النشاط في القائمة
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
  });
  document.getElementById(`nav-${view}`).classList.add('active');
  
  // إخفاء السايدبار في الموبايل
  if (window.innerWidth <= 900) {
    toggleSidebar();
  }
  
  // عرض المحتوى المناسب
  renderView(view);
}

// ============================================================
// عرض المحتوى حسب الصفحة
// ============================================================
function renderView(view) {
  const contentArea = document.getElementById('contentArea');
  
  switch(view) {
    case 'dashboard':
      contentArea.innerHTML = renderDashboard();
      break;
    case 'clients':
      contentArea.innerHTML = renderClients();
      break;
    case 'transactions':
      contentArea.innerHTML = renderTransactions();
      break;
    case 'reports':
      contentArea.innerHTML = renderReports();
      break;
    case 'settings':
      contentArea.innerHTML = renderSettings();
      break;
    case 'backup':
      contentArea.innerHTML = renderBackup();
      break;
    default:
      contentArea.innerHTML = renderDashboard();
  }
}

// ============================================================
// عرض لوحة التحكم
// ============================================================
function renderDashboard() {
  const totalClients = clients.length;
  const totalTransactions = transactions.length;
  
  // حساب إجمالي الديون
  let totalDebt = 0;
  clients.forEach(client => {
    totalDebt += client.balance || 0;
  });
  
  // حساب إجمالي المعاملات
  let totalIn = 0;
  let totalOut = 0;
  transactions.forEach(tx => {
    if (tx.type === 'in') totalIn += tx.amount;
    else totalOut += tx.amount;
  });
  
  // آخر 5 معاملات
  const recentTransactions = [...transactions].reverse().slice(0, 5);
  
  return `
    <div class="content-inner">
      <div class="stats-grid">
        <div class="stat-card primary">
          <div class="stat-icon">👥</div>
          <div class="stat-label">إجمالي العملاء</div>
          <div class="stat-value">${totalClients}</div>
          <div class="stat-sub">عميل نشط</div>
        </div>
        <div class="stat-card success">
          <div class="stat-icon">💰</div>
          <div class="stat-label">إجمالي الوارد</div>
          <div class="stat-value">${totalIn.toLocaleString()} ج</div>
          <div class="stat-sub">معاملات واردة</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-icon">💸</div>
          <div class="stat-label">إجمالي المنصرف</div>
          <div class="stat-value">${totalOut.toLocaleString()} ج</div>
          <div class="stat-sub">معاملات صادرة</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-icon">📊</div>
          <div class="stat-label">صافي الرصيد</div>
          <div class="stat-value">${(totalIn - totalOut).toLocaleString()} ج</div>
          <div class="stat-sub">${totalIn - totalOut >= 0 ? 'إيجابي' : 'سلبي'}</div>
        </div>
      </div>
      
      <div style="display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-top:20px;">
        <div class="card">
          <div class="flex justify-between" style="margin-bottom:16px;">
            <div class="section-title">📋 آخر المعاملات</div>
            <button class="btn btn-ghost btn-xs" onclick="navigate('transactions')">عرض الكل</button>
          </div>
          ${recentTransactions.length > 0 ? `
            <div class="tx-list">
              ${recentTransactions.map(tx => {
                const client = clients.find(c => c.id === tx.clientId);
                return `
                  <div class="tx-item" onclick="viewClient(${tx.clientId})">
                    <div class="tx-dot ${tx.type}">${tx.type === 'in' ? '↑' : '↓'}</div>
                    <div class="tx-body">
                      <div class="flex justify-between">
                        <span class="tx-type ${tx.type}">${tx.type === 'in' ? 'قبض' : 'صرف'}</span>
                        <span class="tx-amount ${tx.type}">${tx.amount.toLocaleString()} ج</span>
                      </div>
                      <div class="flex justify-between">
                        <span class="tx-notes">${client ? client.name : 'عميل غير معروف'} • ${tx.notes || 'بدون ملاحظات'}</span>
                        <span class="tx-date">${new Date(tx.date).toLocaleDateString('ar-EG')}</span>
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          ` : `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <div class="empty-title">لا توجد معاملات</div>
              <div class="empty-sub">قم بإضافة أول معاملة الآن</div>
              <button class="btn btn-primary btn-sm" onclick="showAddTransactionModal()" style="margin-top:12px;">
                <span>➕</span> إضافة معاملة
              </button>
            </div>
          `}
        </div>
        
        <div class="card">
          <div class="section-title">📊 إحصائيات سريعة</div>
          <div style="display:flex; flex-direction:column; gap:12px;">
            <div class="summary-stat">
              <div class="s-label">العملاء المدينة</div>
              <div class="s-val" style="color:var(--danger)">${clients.filter(c => c.balance > 0).length}</div>
            </div>
            <div class="summary-stat">
              <div class="s-label">العملاء الدائنة</div>
              <div class="s-val" style="color:var(--success)">${clients.filter(c => c.balance < 0).length}</div>
            </div>
            <div class="summary-stat">
              <div class="s-label">العملاء المتوازنين</div>
              <div class="s-val" style="color:var(--text2)">${clients.filter(c => c.balance === 0).length}</div>
            </div>
          </div>
          <div class="divider"></div>
          <div class="developer-info" style="background:var(--primary-bg);">
            <div style="text-align:center; font-size:12px;">
              <div>📱 للدعم الفني: 01010421571</div>
              <div style="font-size:10px; margin-top:4px;">واتساب - محمد أحمد فؤاد</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// عرض العملاء
// ============================================================
function renderClients() {
  return `
    <div class="content-inner">
      <div class="page-header">
        <div>
          <div class="page-title">👥 العملاء</div>
          <div class="page-sub">إدارة حسابات العملاء والمديونيات</div>
        </div>
        <button class="btn btn-primary" onclick="showAddClientModal()">
          <span>➕</span> إضافة عميل جديد
        </button>
      </div>
      
      <div class="search-wrap" style="margin-bottom:20px;">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="بحث عن عميل..." id="clientSearch" oninput="searchClients()">
        <button class="search-clear" id="clientSearchClear" onclick="clearClientSearch()">✕</button>
      </div>
      
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-title">قائمة العملاء</span>
          <span class="table-count">إجمالي: ${clients.length}</span>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>الاسم</th>
                <th>رقم الهاتف</th>
                <th>العنوان</th>
                <th>الرصيد</th>
                <th>آخر معاملة</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="clientsTableBody">
              ${renderClientsRows()}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderClientsRows() {
  if (clients.length === 0) {
    return `
      <tr>
        <td colspan="6">
          <div class="empty-state">
            <div class="empty-icon">👥</div>
            <div class="empty-title">لا يوجد عملاء</div>
            <div class="empty-sub">قم بإضافة أول عميل الآن</div>
          </div>
        </td>
      </tr>
    `;
  }
  
  return clients.map(client => {
    const lastTx = transactions
      .filter(t => t.clientId === client.id)
      .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    
    return `
      <tr>
        <td class="td-name" onclick="viewClient(${client.id})">${client.name}</td>
        <td>${client.phone || '—'}</td>
        <td>${client.address || '—'}</td>
        <td class="td-balance" style="color:${client.balance > 0 ? 'var(--danger)' : client.balance < 0 ? 'var(--success)' : 'var(--text2)'}">
          ${client.balance.toLocaleString()} ج
        </td>
        <td>${lastTx ? new Date(lastTx.date).toLocaleDateString('ar-EG') : '—'}</td>
        <td class="td-actions">
          <button class="btn btn-ghost btn-xs" onclick="showEditClientModal(${client.id})">✏️</button>
          <button class="btn btn-ghost btn-xs" onclick="showAddTransactionForClient(${client.id})">💰</button>
          <button class="btn btn-ghost btn-xs" onclick="viewClient(${client.id})">👁️</button>
          <button class="btn btn-ghost btn-xs" onclick="deleteClient(${client.id})">🗑️</button>
        </td>
      </tr>
    `;
  }).join('');
}

// ============================================================
// عرض المعاملات
// ============================================================
function renderTransactions() {
  return `
    <div class="content-inner">
      <div class="page-header">
        <div>
          <div class="page-title">💰 المعاملات</div>
          <div class="page-sub">سجل جميع المعاملات المالية</div>
        </div>
        <button class="btn btn-primary" onclick="showAddTransactionModal()">
          <span>➕</span> إضافة معاملة
        </button>
      </div>
      
      <div class="search-wrap" style="margin-bottom:20px;">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="بحث عن معاملة..." id="transactionSearch" oninput="searchTransactions()">
        <button class="search-clear" id="transactionSearchClear" onclick="clearTransactionSearch()">✕</button>
      </div>
      
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-title">سجل المعاملات</span>
          <span class="table-count">إجمالي: ${transactions.length}</span>
        </div>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>التاريخ</th>
                <th>العميل</th>
                <th>النوع</th>
                <th>المبلغ</th>
                <th>الملاحظات</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="transactionsTableBody">
              ${renderTransactionsRows()}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderTransactionsRows() {
  if (transactions.length === 0) {
    return `
      <tr>
        <td colspan="6">
          <div class="empty-state">
            <div class="empty-icon">💰</div>
            <div class="empty-title">لا توجد معاملات</div>
            <div class="empty-sub">قم بإضافة أول معاملة الآن</div>
          </div>
        </td>
      </tr>
    `;
  }
  
  return [...transactions].reverse().map(tx => {
    const client = clients.find(c => c.id === tx.clientId);
    return `
      <tr>
        <td>${new Date(tx.date).toLocaleDateString('ar-EG')}</td>
        <td class="td-name" onclick="viewClient(${tx.clientId})">${client ? client.name : 'عميل غير معروف'}</td>
        <td>
          <span class="badge ${tx.type === 'in' ? 'badge-success' : 'badge-danger'}">
            ${tx.type === 'in' ? '↑ قبض' : '↓ صرف'}
          </span>
        </td>
        <td class="td-balance" style="color:${tx.type === 'in' ? 'var(--success)' : 'var(--danger)'}">
          ${tx.amount.toLocaleString()} ج
        </td>
        <td>${tx.notes || '—'}</td>
        <td class="td-actions">
          <button class="btn btn-ghost btn-xs" onclick="deleteTransaction(${tx.id})">🗑️</button>
        </td>
      </tr>
    `;
  }).join('');
}

// ============================================================
// عرض التقارير
// ============================================================
function renderReports() {
  return `
    <div class="content-inner">
      <div class="page-header">
        <div>
          <div class="page-title">📈 التقارير</div>
          <div class="page-sub">تقارير وإحصائيات مالية شاملة</div>
        </div>
        <button class="btn btn-ghost" onclick="printReport()">
          <span>🖨️</span> طباعة
        </button>
      </div>
      
      <div class="stats-grid" style="margin-bottom:20px;">
        <div class="stat-card primary">
          <div class="stat-label">إجمالي الديون</div>
          <div class="stat-value">${clients.reduce((sum, c) => sum + (c.balance > 0 ? c.balance : 0), 0).toLocaleString()} ج</div>
          <div class="stat-sub">على العملاء</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label">إجمالي المستحقات</div>
          <div class="stat-value">${Math.abs(clients.reduce((sum, c) => sum + (c.balance < 0 ? c.balance : 0), 0)).toLocaleString()} ج</div>
          <div class="stat-sub">لصالح العملاء</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">متوسط المعاملة</div>
          <div class="stat-value">${transactions.length ? Math.round(transactions.reduce((sum, t) => sum + t.amount, 0) / transactions.length).toLocaleString() : 0} ج</div>
          <div class="stat-sub">لجميع المعاملات</div>
        </div>
        <div class="stat-card info">
          <div class="stat-label">عدد المعاملات</div>
          <div class="stat-value">${transactions.length}</div>
          <div class="stat-sub">إجمالي الحركات</div>
        </div>
      </div>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div class="card">
          <div class="section-title">📊 توزيع أرصدة العملاء</div>
          <div style="height:200px; display:flex; align-items:center; justify-content:center; background:var(--card2); border-radius:var(--radius-md);">
            <div style="text-align:center;">
              <div style="font-size:40px;">📊</div>
              <div>مدينون: ${clients.filter(c => c.balance > 0).length}</div>
              <div>دائنون: ${clients.filter(c => c.balance < 0).length}</div>
              <div>متوازن: ${clients.filter(c => c.balance === 0).length}</div>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="section-title">📊 توزيع المعاملات</div>
          <div style="height:200px; display:flex; align-items:center; justify-content:center; background:var(--card2); border-radius:var(--radius-md);">
            <div style="text-align:center;">
              <div style="font-size:40px;">💰</div>
              <div>وارد: ${transactions.filter(t => t.type === 'in').length}</div>
              <div>منصرف: ${transactions.filter(t => t.type === 'out').length}</div>
            </div>
          </div>
        </div>
        
        <div class="card" style="grid-column:span 2;">
          <div class="section-title">📋 ملخص مالي</div>
          <table style="width:100%;">
            <tr>
              <td style="padding:8px;">إجمالي الوارد</td>
              <td style="padding:8px; color:var(--success); font-weight:bold;">${transactions.filter(t => t.type === 'in').reduce((sum, t) => sum + t.amount, 0).toLocaleString()} ج</td>
            </tr>
            <tr>
              <td style="padding:8px;">إجمالي المنصرف</td>
              <td style="padding:8px; color:var(--danger); font-weight:bold;">${transactions.filter(t => t.type === 'out').reduce((sum, t) => sum + t.amount, 0).toLocaleString()} ج</td>
            </tr>
            <tr>
              <td style="padding:8px;">صافي الربح/الخسارة</td>

function addTransaction(event, clientId = null) {
  event.preventDefault();
  
  const selectedClientId = clientId || document.getElementById('transactionClient').value;
  const client = clients.find(c => c.id == selectedClientId);
  if (!client) return;
  
  const type = document.getElementById('transactionType').value;
  const amount = parseFloat(document.getElementById('transactionAmount').value);
  const date = document.getElementById('transactionDate').value || new Date().toISOString().split('T')[0];
  const notes = document.getElementById('transactionNotes').value;
  
  // تحديث رصيد العميل
  if (type === 'in') {
    client.balance -= amount; // قبض يعني تقليل الدين
  } else {
    client.balance += amount; // صرف يعني زيادة الدين
  }
  
  const newTransaction = {
    id: Date.now(),
    clientId: selectedClientId,
    type,
    amount,
    date,
    notes,
    runningBalance: client.balance
  };
  
  transactions.push(newTransaction);
  saveData();
  closeModal();
  
  if (currentView === 'transactions') {
    renderView('transactions');
  } else if (currentView === 'clients') {
    renderView('clients');
  } else if (selectedClientId && currentView !== 'dashboard') {
    viewClient(selectedClientId);
  } else {
    renderView(currentView);
  }
  
  showToast('تم إضافة المعاملة بنجاح', 'success');
}

// ============================================================
// حذف معاملة
// ============================================================
function deleteTransaction(transactionId) {
  if (!confirm('هل أنت متأكد من حذف هذه المعاملة؟')) return;
  
  const transaction = transactions.find(t => t.id === transactionId);
  if (!transaction) return;
  
  const client = clients.find(c => c.id === transaction.clientId);
  if (client) {
    // عكس تأثير المعاملة على رصيد العميل
    if (transaction.type === 'in') {
      client.balance += transaction.amount;
    } else {
      client.balance -= transaction.amount;
    }
  }
  
  transactions = transactions.filter(t => t.id !== transactionId);
  saveData();
  
  if (currentView === 'transactions') {
    renderView('transactions');
  } else if (selectedClientId) {
    viewClient(selectedClientId);
  } else {
    renderView(currentView);
  }
  
  showToast('تم حذف المعاملة', 'success');
}

  const filteredClients = clients.filter(client => 
    client.name.toLowerCase().includes(searchTerm) ||
    (client.phone && client.phone.includes(searchTerm)) ||
    (client.address && client.address.toLowerCase().includes(searchTerm))
  );
  
  const tbody = document.getElementById('clientsTableBody');
  if (filteredClients.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="6">
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">لا توجد نتائج</div>
            <div class="empty-sub">لم يتم العثور على عملاء مطابقين للبحث</div>
          </div>
        </td>
      </tr>
    `;
  } else {
    tbody.innerHTML = filteredClients.map(client => {
      const lastTx = transactions
        .filter(t => t.clientId === client.id)
        .sort((a, b) => new Date(b.date) - new Date(a.date))[0];
      
      return `
        <tr>
          <td class="td-name" onclick="viewClient(${client.id})">${client.name}</td>
          <td>${client.phone || '—'}</td>
          <td>${client.address || '—'}</td>
          <td class="td-balance" style="color:${client.balance > 0 ? 'var(--danger)' : client.balance < 0 ? 'var(--success)' : 'var(--text2)'}">
            ${client.balance.toLocaleString()} ج
          </td>
          <td>${lastTx ? new Date(lastTx.date).toLocaleDateString('ar-EG') : '—'}</td>
          <td class="td-actions">
            <button class="btn btn-ghost btn-xs" onclick="showEditClientModal(${client.id})">✏️</button>
            <button class="btn btn-ghost btn-xs" onclick="showAddTransactionForClient(${client.id})">💰</button>
            <button class="btn btn-ghost btn-xs" onclick="viewClient(${client.id})">👁️</button>
            <button class="btn btn-ghost btn-xs" onclick="deleteClient(${client.id})">🗑️</button>
          </td>
        </tr>
      `;
    }).join('');
  }
}

function clearClientSearch() {
  document.getElementById('clientSearch').value = '';
  document.getElementById('clientSearchClear').style.display = 'none';
  searchClients();
}

function searchTransactions() {
  const searchTerm = document.getElementById('transactionSearch').value.toLowerCase();
  const searchClear = document.getElementById('transactionSearchClear');
  
  if (searchTerm) {
    searchClear.style.display = 'flex';
  } else {
    searchClear.style.display = 'none';
  }
  
  const filteredTransactions = transactions.filter(tx => {
    const client = clients.find(c => c.id === tx.clientId);
    return (
      (client && client.name.toLowerCase().includes(searchTerm)) ||
      (tx.notes && tx.notes.toLowerCase().includes(searchTerm)) ||
      tx.amount.toString().includes(searchTerm)
    );
  });
  
  const tbody = document.getElementById('transactionsTableBody');
  if (filteredTransactions.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="6">
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">لا توجد نتائج</div>
            <div class="empty-sub">لم يتم العثور على معاملات مطابقة للبحث</div>
          </div>
        </td>
      </tr>
    `;
  } else {
    tbody.innerHTML = filteredTransactions.map(tx => {
      const client = clients.find(c => c.id === tx.clientId);
      return `
        <tr>
          <td>${new Date(tx.date).toLocaleDateString('ar-EG')}</td>
          <td class="td-name" onclick="viewClient(${tx.clientId})">${client ? client.name : 'عميل غير معروف'}</td>
          <td>
            <span class="badge ${tx.type === 'in' ? 'badge-success' : 'badge-danger'}">
              ${tx.type === 'in' ? '↑ قبض' : '↓ صرف'}
            </span>
          </td>
          <td class="td-balance" style="color:${tx.type === 'in' ? 'var(--success)' : 'var(--danger)'}">
            ${tx.amount.toLocaleString()} ج
          </td>
          <td>${tx.notes || '—'}</td>
          <td class="td-actions">
            <button class="btn btn-ghost btn-xs" onclick="deleteTransaction(${tx.id})">🗑️</button>
          </td>
        </tr>
      `;
    }).join('');
  }
}

function clearTransactionSearch() {
  document.getElementById('transactionSearch').value = '';
  document.getElementById('transactionSearchClear').style.display = 'none';
  searchTransactions();
}

// ============================================================
// إدارة السمات (الثيمات)
// ============================================================
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('finance_theme', theme);
  
  document.getElementById('theme-dark').classList.toggle('active', theme === 'dark');
  document.getElementById('theme-light').classList.toggle('active', theme === 'light');
}

function loadTheme() {
  const savedTheme = localStorage.getItem('finance_theme') || 'dark';
  setTheme(savedTheme);
}

// ============================================================
// إدارة النسخ الاحتياطي
// ============================================================
function createBackup() {
  const backup = {
    clients,
    transactions,
    date: new Date().toISOString()
  };
  
  const dataStr = JSON.stringify(backup, null, 2);
  const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
  
  const exportFileDefaultName = `finance_backup_${new Date().toISOString().split('T')[0]}.json`;
  
  const linkElement = document.createElement('a');
  linkElement.setAttribute('href', dataUri);
  linkElement.setAttribute('download', exportFileDefaultName);
  linkElement.click();
  
  localStorage.setItem('finance_last_backup', new Date().toISOString());
  
  if (currentView === 'backup') {
    renderView('backup');
  }
  
  showToast('تم إنشاء النسخة الاحتياطية', 'success');
}

function restoreBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      
      if (backup.clients && Array.isArray(backup.clients)) {
        clients = backup.clients;
      }
      if (backup.transactions && Array.isArray(backup.transactions)) {
        transactions = backup.transactions;
      }
      
      saveData();
      renderView(currentView);
      showToast('تم استعادة البيانات بنجاح', 'success');
    } catch (err) {
      showToast('فشل استعادة البيانات: الملف غير صالح', 'error');
    }
  };
  reader.readAsText(file);
  
  // إعادة تعيين حقل الملف
  event.target.value = '';
}

function exportData() {
  createBackup();
}

function importData() {
  document.getElementById('backupFile').click();
}

function clearAllData() {
  if (!confirm('⚠️ تحذير: هذا سيقوم بحذف جميع العملاء والمعاملات بشكل نهائي. هل أنت متأكد؟')) return;
  
  if (!confirm('تأكيد نهائي: هل أنت متأكد من رغبتك في مسح جميع البيانات؟')) return;
  
  clients = [];
  transactions = [];
  saveData();
  renderView(currentView);
  showToast('تم مسح جميع البيانات', 'success');
}

// ============================================================
// تحديث البيانات
// ============================================================
function refreshData() {
  loadData();
  renderView(currentView);
  showToast('تم تحديث البيانات', 'info');
}

// ============================================================
// طباعة التقرير
// ============================================================
function printReport() {
  window.print();
}

// ============================================================
// إظهار Toast
// ============================================================
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast-item ${type}`;
  toast.innerHTML = `
    <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️'}</span>
    <span>${message}</span>
  `;
  
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.remove();
  }, 3000);
}

// ============================================================
// تهيئة التطبيق
// ============================================================
window.onload = function() {
  loadData();
  loadTheme();
  renderView('dashboard');
  
  // مراقبة تغيير حجم الشاشة لإخفاء السايدبار في الموبايل
  window.addEventListener('resize', function() {
    if (window.innerWidth > 900) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').style.display = 'none';
    }
  });
};
</script>
