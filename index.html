<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>النظام المالي المتكامل - النسخة النهائية</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Excel & PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* جميع الأنماط السابقة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-tertiary: #1e1e2d;
            --text-primary: #f0f0ff;
            --text-secondary: #a0a0c0;
            --border-color: #2a2a3a;
            --accent-primary: #22c55e;
            --accent-secondary: #16a34a;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --whatsapp: #25D366;
            --gold: #fbbf24;
            --gold-dark: #b45309;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
        }

        body.light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
        }

        /* الأرقام بالإنجليزية */
        .numbers, input, .money-value, .gold-value {
            font-family: 'IBM Plex Sans Arabic', 'Courier New', monospace !important;
            direction: ltr !important;
            text-align: left !important;
        }

        /* Developer Info */
        .developer-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .developer-info:hover {
            background: var(--bg-tertiary);
            transform: scale(1.05);
        }

        .developer-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .developer-details {
            display: none;
        }

        .developer-info:hover .developer-details {
            display: block;
        }

        .developer-name {
            font-weight: 600;
            font-size: 14px;
        }

        .developer-whatsapp {
            font-size: 12px;
            color: var(--whatsapp);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--whatsapp);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            border: none;
        }

        .whatsapp-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.4);
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { background: linear-gradient(135deg, var(--success), #15803d); }
        .toast.error { background: linear-gradient(135deg, var(--danger), #b91c1c); }
        .toast.info { background: linear-gradient(135deg, var(--info), #1d4ed8); }
        .toast.warning { background: linear-gradient(135deg, var(--warning), #b45309); }

        /* Loading Spinner */
        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading-spinner.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Auto Backup Indicator */
        .auto-backup-indicator {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--accent-primary);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 99;
            font-size: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            padding: 20px;
        }

        .login-card {
            background: rgba(20, 20, 31, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: clamp(24px, 5vw, 48px);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            width: clamp(60px, 15vw, 100px);
            height: clamp(60px, 15vw, 100px);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: clamp(24px, 6vw, 40px);
            color: white;
        }

        .login-title {
            font-size: clamp(20px, 5vw, 28px);
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--info));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .input-field {
            width: 100%;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0a0a0f;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(251, 191, 36, 0.4);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-icon:hover {
            background: var(--accent-primary);
            color: white;
        }

        /* الشريط الجانبي المحسّن */
        .nav-sidebar {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 60px;
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 15px 0;
            border: 1px solid var(--border-color);
            z-index: 1000;
            transition: width 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .nav-sidebar:hover {
            width: 220px;
            box-shadow: 0 20px 40px -10px rgba(34, 197, 94, 0.3);
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
            position: relative;
        }

        .nav-item i {
            font-size: 20px;
            min-width: 20px;
            transition: transform 0.3s ease;
        }

        .nav-item span {
            margin-right: 20px;
            opacity: 0;
            transition: opacity 0.3s ease, margin-right 0.3s ease;
            font-size: 14px;
        }

        .nav-sidebar:hover .nav-item span {
            opacity: 1;
            margin-right: 20px;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
        }

        .nav-item:hover i {
            transform: scale(1.1);
            color: var(--accent-primary);
        }

        .nav-item.active {
            color: var(--accent-primary);
            background: rgba(34, 197, 94, 0.1);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent-primary);
            border-radius: 0 3px 3px 0;
            animation: pulse 2s infinite;
        }

        /* للهواتف - شريط سفلي */
        @media (max-width: 768px) {
            .nav-sidebar {
                top: auto;
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
                width: auto;
                display: flex;
                padding: 8px;
                border-radius: 50px;
                background: var(--bg-secondary);
                backdrop-filter: blur(10px);
                border: 1px solid var(--border-color);
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
                transition: all 0.3s ease;
            }

            .nav-sidebar:hover {
                width: auto;
            }

            .nav-sidebar.collapsed {
                width: 60px;
                overflow: hidden;
            }

            .nav-sidebar.collapsed .nav-item span {
                display: none;
            }

            .nav-sidebar:not(.collapsed) {
                width: auto;
                max-width: 90vw;
                overflow-x: auto;
            }

            .nav-sidebar:not(.collapsed) .nav-item {
                padding: 12px;
            }

            .nav-sidebar:not(.collapsed) .nav-item span {
                display: inline-block;
                font-size: 12px;
                margin-right: 8px;
            }

            .nav-item {
                padding: 12px;
            }

            .nav-item i {
                font-size: 18px;
            }

            .nav-item span {
                display: none;
            }

            /* زر التبديل للهاتف */
            .nav-toggle {
                display: flex !important;
                position: fixed;
                bottom: 90px;
                right: 50%;
                transform: translateX(50%);
                background: var(--accent-primary);
                color: white;
                border: none;
                border-radius: 50px;
                padding: 8px 16px;
                font-size: 12px;
                z-index: 1001;
                cursor: pointer;
                box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
            }
        }

        .nav-toggle {
            display: none;
        }

        .main-content {
            margin-right: 80px;
            padding: 20px;
            transition: margin-right 0.3s ease;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-right: 0;
                margin-bottom: 100px;
            }
        }

        /* User Menu */
        .user-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .user-menu:hover {
            background: var(--bg-tertiary);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        /* Cards */
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: clamp(16px, 3vw, 24px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .client-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: clamp(16px, 2.5vw, 20px);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .client-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.2);
            border-color: var(--accent-primary);
        }

        /* Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 350px), 1fr));
            gap: clamp(12px, 2vw, 20px);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: clamp(20px, 4vw, 32px);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        /* Table */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        .table th {
            text-align: right;
            padding: 16px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
        }

        .table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-item
