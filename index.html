<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الخبير المحاسبي - الإصدار الاحترافي v11.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ========== نظام الألوان العصري والمحسن ========== */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-soft: #dbeafe;
            --primary-bg: rgba(37, 99, 235, 0.1);
            
            --secondary: #7c3aed;
            --secondary-dark: #6d28d9;
            --secondary-light: #8b5cf6;
            --secondary-soft: #ede9fe;
            
            --success: #059669;
            --success-dark: #047857;
            --success-light: #10b981;
            --success-soft: #d1fae5;
            
            --danger: #dc2626;
            --danger-dark: #b91c1c;
            --danger-light: #ef4444;
            --danger-soft: #fee2e2;
            
            --warning: #d97706;
            --warning-soft: #fef3c7;
            
            --info: #0891b2;
            --info-soft: #cffafe;
            
            /* الألوان المحايدة - محسنة للقراءة */
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-tertiary: #e2e8f0;
            --bg-card: #ffffff;
            --bg-card-alt: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-hover: #f1f5f9;
            --bg-print: #ffffff;
            
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --text-light: #f8fafc;
            
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --border-focus: var(--primary);
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            
            --radius-sm: 6px;
            --radius: 8px;
            --radius-md: 10px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            
            --sidebar-width: 280px;
            --header-height: 64px;
            
            --font: 'Cairo', sans-serif;
            --font-number: 'Courier New', 'Consolas', monospace;
            
            --transition: all 0.2s ease;
        }

        /* الوضع الداكن - محسن */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-card: #1e293b;
            --bg-card-alt: #334155;
            --bg-sidebar: #0f172a;
            --bg-hover: #2d3a4f;
            --bg-print: #1e293b;
            
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            
            --border-color: #334155;
            --border-hover: #475569;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
            transition: var(--transition);
            font-size: 14px;
        }

        /* سكرول محسن */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* ========== القائمة الجانبية المحسنة ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1100;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow);
        }

        .sidebar-brand {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .brand-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        .sidebar-nav {
            flex: 1;
            padding: 15px 8px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 16px;
        }

        .nav-section-title {
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin: 2px 4px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary-soft);
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item i {
            width: 18px;
            font-size: 14px;
        }

        .nav-badge {
            margin-right: auto;
            background: var(--primary);
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 600;
            min-width: 18px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .developer-card {
            background: var(--bg-card-alt);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
        }

        .dev-name {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
            font-size: 13px;
        }

        .dev-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #25D366;
            color: white;
            padding: 8px;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            width: 100%;
        }

        .dev-contact:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px;
            background: var(--bg-card-alt);
            border-radius: var(--radius);
        }

        .theme-toggle button {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .theme-toggle button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ========== المحتوى الرئيسي المحسن ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: var(--header-height);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
        }

        .menu-toggle {
            display: none;
            width: 36px;
            height: 36px;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
        }

        .menu-toggle:hover {
            background: var(--primary);
            color: white;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-box {
            position: relative;
            width: 220px;
        }

        .search-box i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 30px 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 12px;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* ========== الأزرار المحسنة ========== */
        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            border: 1px solid transparent;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-excel {
            background: #059669;
            color: white;
        }

        .btn-excel:hover {
            background: #047857;
        }

        .btn-print {
            background: #4b5563;
            color: white;
        }

        .btn-print:hover {
            background: #374151;
        }

        .btn-ghost {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 11px;
        }

        /* ========== البطاقات الإحصائية المحسنة ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-soft);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            font-family: var(--font-number);
        }

        .stat-change {
            font-size: 10px;
            color: var(--success);
            margin-top: 4px;
        }

        /* ========== البطاقات والجداول المحسنة ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
            background: var(--bg-card-alt);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            padding: 12px;
            text-align: right;
            background: var(--primary-soft);
            color: var(--primary-dark);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
        }

        tr:hover td {
            background: var(--bg-hover);
        }

        .clickable {
            cursor: pointer;
            color: var(--primary);
            font-weight: 600;
        }

        .clickable:hover {
            text-decoration: underline;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 700;
        }

        .badge-success {
            background: var(--success-soft);
            color: var(--success-dark);
        }

        .badge-danger {
            background: var(--danger-soft);
            color: var(--danger-dark);
        }

        /* ========== النوافذ المنبثقة المحسنة ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }

        .modal-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-xl);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        /* ========== النماذج المحسنة ========== */
        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 12px;
            transition: var(--transition);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        /* ========== الإشعارات المحسنة ========== */
        .toast-container {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast-item {
            padding: 12px 18px;
            border-radius: 24px;
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 250px;
            font-size: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast-item.success { background: var(--success); }
        .toast-item.error { background: var(--danger); }
        .toast-item.info { background: var(--primary); }

        /* ========== شاشة الدخول المحسنة ========== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 16px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 30px;
            width: 100%;
            max-width: 350px;
            box-shadow: var(--shadow-xl);
        }

        .login-logo {
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin: 0 auto 16px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .login-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            margin-bottom: 12px;
            font-size: 13px;
        }

        .login-input:focus {
            border-color: var(--primary);
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .login-error {
            background: var(--danger-soft);
            color: var(--danger-dark);
            padding: 10px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
            font-size: 12px;
        }

        /* ========== معاينة الطباعة ========== */
        .print-preview-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
        }

        .print-preview-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 20px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-xl);
        }

        .print-preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .print-preview-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .print-preview-actions {
            display: flex;
            gap: 8px;
        }

        .print-preview-content {
            background: var(--bg-print);
            border-radius: var(--radius);
            padding: 20px;
            min-height: 400px;
            overflow-y: auto;
        }

        /* تنسيقات خاصة للطباعة */
        .print-content {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 8px;
        }

        .print-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .print-content th {
            background: #2563eb;
            color: white;
            padding: 10px;
            font-size: 12px;
        }

        .print-content td {
            padding: 8px 10px;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }

        .print-content .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .print-content .header h1 {
            color: #2563eb;

<script>
// ========== تهيئة المتغيرات العامة ==========
let App = {
    clients: [],
    settings: {
        username: 'admin',
        password: 'admin123',
        theme: 'dark',
        companyName: 'شركتي'
    }
};

// ========== نظام التخزين المحسن ==========
const Storage = {
    load() {
        try {
            const saved = localStorage.getItem('elite_accounting_v11');
            if (saved) {
                const data = JSON.parse(saved);
                App.clients = Array.isArray(data.clients) ? data.clients : [];
                App.settings = { ...App.settings, ...(data.settings || {}) };
            }
        } catch (e) {
            console.error('خطأ في تحميل البيانات');
            App.clients = [];
        }
        this.updateBadges();
    },

    save() {
        try {
            localStorage.setItem('elite_accounting_v11', JSON.stringify({
                clients: App.clients,
                settings: App.settings
            }));
            this.updateBadges();
        } catch (e) {
            UI.toast('خطأ في حفظ البيانات', 'error');
        }
    },

    updateBadges() {
        const dashboardBadge = document.getElementById('dashboardBadge');
        const clientsBadge = document.getElementById('clientsBadge');
        const transactionsBadge = document.getElementById('transactionsBadge');
        
        if (dashboardBadge) dashboardBadge.textContent = App.clients.length;
        if (clientsBadge) clientsBadge.textContent = App.clients.length;
        
        const totalTx = App.clients.reduce((sum, c) => sum + (c.transactions?.length || 0), 0);
        if (transactionsBadge) transactionsBadge.textContent = totalTx;
    }
};

// ========== دوال العملاء المحسنة ==========
const ClientHelper = {
    getClient(id) {
        return App.clients.find(c => c.id === id);
    },

    addClient(data) {
        const client = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 4),
            name: data.name || '',
            phone: data.phone || '',
            address: data.address || '',
            notes: data.notes || '',
            transactions: [],
            balance: 0,
            totalFor: 0,
            totalAgainst: 0,
            createdAt: new Date().toISOString()
        };
        
        if (Array.isArray(data.transactions)) {
            data.transactions.forEach(tx => {
                if (tx.amount && parseFloat(tx.amount) > 0) {
                    const amount = parseFloat(tx.amount);
                    const transaction = {
                        id: Date.now() + Math.random().toString(36).substr(2, 6),
                        type: tx.type === 'له' ? 'له' : 'عليه',
                        amount,
                        date: tx.date || new Date().toISOString().split('T')[0],
                        notes: tx.notes || '',
                        createdAt: new Date().toISOString()
                    };
                    client.transactions.push(transaction);
                    
                    if (tx.type === 'له') client.totalFor += amount;
                    else client.totalAgainst += amount;
                }
            });
        }
        
        client.balance = client.totalFor - client.totalAgainst;
        App.clients.push(client);
        Storage.save();
        return client;
    },

    updateClient(id, updates) {
        const client = this.getClient(id);
        if (client) {
            Object.assign(client, updates);
            Storage.save();
            return true;
        }
        return false;
    },

    deleteClient(id) {
        App.clients = App.clients.filter(c => c.id !== id);
        Storage.save();
        return true;
    },

    addTransaction(clientId, transaction) {
        const client = this.getClient(clientId);
        if (!client) return false;

        const amount = parseFloat(transaction.amount);
        if (!amount || amount <= 0) return false;

        const tx = {
            id: Date.now() + Math.random().toString(36).substr(2, 8),
            type: transaction.type === 'له' ? 'له' : 'عليه',
            amount,
            date: transaction.date || new Date().toISOString().split('T')[0],
            notes: transaction.notes || '',
            createdAt: new Date().toISOString()
        };

        client.transactions = client.transactions || [];
        client.transactions.push(tx);
        
        if (tx.type === 'له') client.totalFor += amount;
        else client.totalAgainst += amount;
        
        client.balance = client.totalFor - client.totalAgainst;
        Storage.save();
        return true;
    },

    deleteTransaction(clientId, txId) {
        const client = this.getClient(clientId);
        if (!client) return false;

        const tx = client.transactions.find(t => t.id === txId);
        if (tx) {
            if (tx.type === 'له') client.totalFor -= tx.amount;
            else client.totalAgainst -= tx.amount;
        }

        client.transactions = client.transactions.filter(t => t.id !== txId);
        client.balance = client.totalFor - client.totalAgainst;
        Storage.save();
        return true;
    },

    getClientSummary(id) {
        const client = this.getClient(id);
        if (!client) return { balance: 0, totalFor: 0, totalAgainst: 0, count: 0 };
        return {
            balance: client.balance || 0,
            totalFor: client.totalFor || 0,
            totalAgainst: client.totalAgainst || 0,
            count: client.transactions?.length || 0
        };
    },

    getRunningBalance(id) {
        const client = this.getClient(id);
        if (!client || !client.transactions) return [];
        
        const sorted = [...client.transactions].sort((a, b) => 
            new Date(a.date) - new Date(b.date) || a.createdAt.localeCompare(b.createdAt)
        );
        
        let running = 0;
        return sorted.map(t => {
            if (t.type === 'له') running += t.amount;
            else running -= t.amount;
            return { ...t, running };
        });
    },

    getAllTransactions() {
        const txs = [];
        App.clients.forEach(c => {
            (c.transactions || []).forEach(t => {
                txs.push({ 
                    ...t, 
                    clientName: c.name, 
                    clientId: c.id,
                    clientPhone: c.phone 
                });
            });
        });
        return txs.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt.localeCompare(a.createdAt));
    },

    getStatistics() {
        const stats = {
            totalClients: App.clients.length,
            totalTransactions: 0,
            totalFor: 0,
            totalAgainst: 0,
            netBalance: 0,
            debtors: 0,
            creditors: 0
        };

        App.clients.forEach(c => {
            const s = this.getClientSummary(c.id);
            stats.totalTransactions += s.count;
            stats.totalFor += s.totalFor;
            stats.totalAgainst += s.totalAgainst;
            if (s.balance > 0) stats.creditors++;
            else if (s.balance < 0) stats.debtors++;
        });

        stats.netBalance = stats.totalFor - stats.totalAgainst;
        return stats;
    }
};

// ========== نظام الطباعة كصورة ==========
const Print = {
    showPrintOptions() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'printOptionsModal';
        modal.innerHTML = `
            <div class="modal-card" style="max-width: 400px;">
                <div class="modal-header">
                    <div class="modal-title"><i class="fas fa-print" style="color: #4b5563;"></i> خيارات الطباعة</div>
                    <button class="modal-close" onclick="document.getElementById('printOptionsModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                
                <div style="margin-bottom: 16px;">
                    <p style="color: var(--text-muted); font-size: 12px; margin-bottom: 12px;">
                        <i class="fas fa-info-circle"></i> سيتم تحويل الصفحة الحالية إلى صورة عالية الجودة وطباعتها.
                    </p>
                    
                    <div class="form-group">
                        <label class="form-label">جودة الطباعة</label>
                        <select id="printQuality" class="form-select">
                            <option value="2">عالية جداً</option>
                            <option value="1.5" selected>عالية</option>
                            <option value="1">متوسطة</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">نوع الطباعة</label>
                        <select id="printType" class="form-select">
                            <option value="full" selected>الصفحة كاملة</option>
                            <option value="content">المحتوى فقط</option>
                        </select>
                    </div>
                </div>
                
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-print" style="flex: 1;" onclick="Print.captureAndPrint()">
                        <i class="fas fa-print"></i> طباعة
                    </button>
                    <button class="btn btn-ghost" style="flex: 1;" onclick="document.getElementById('printOptionsModal').remove()">
                        إلغاء
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    },

    async captureAndPrint() {
        const qualitySelect = document.getElementById('printQuality');
        const typeSelect = document.getElementById('printType');
        
        const scale = qualitySelect ? parseFloat(qualitySelect.value) : 1.5;
        const printType = typeSelect ? typeSelect.value : 'full';
        
        // إغلاق نافذة الخيارات
        const optionsModal = document.getElementById('printOptionsModal');
        if (optionsModal) optionsModal.remove();
        
        UI.toast('جاري تجهيز الصفحة للطباعة...', 'info');
        
        try {
            const element = printType === 'full' 
                ? document.querySelector('.main-content')
                : document.getElementById('viewArea');
            
            if (!element) {
                UI.toast('حدث خطأ في تحديد المحتوى', 'error');
                return;
            }
            
            // إنشاء معاينة الطباعة
            const previewModal = document.createElement('div');
            previewModal.className = 'print-preview-overlay';
            previewModal.id = 'printPreviewModal';
            previewModal.innerHTML = `
                <div class="print-preview-card">
                    <div class="print-preview-header">
                        <div class="print-preview-title">
                            <i class="fas fa-print"></i> معاينة الطباعة
                        </div>
                        <div class="print-preview-actions">
                            <button class="btn btn-print btn-sm" onclick="Print.downloadImage()">
                                <i class="fas fa-download"></i> تحميل
                            </button>
                            <button class="btn btn-primary btn-sm" onclick="window.print()">
                                <i class="fas fa-print"></i> طباعة
                            </button>
                            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('printPreviewModal').remove()">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <div class="print-preview-content" id="printPreviewContent">
                        <div style="text-align: center; padding: 50px;">
                            <i class="fas fa-spinner fa-spin" style="font-size: 40px; color: var(--primary);"></i>
                            <p style="margin-top: 16px;">جاري تحميل المعاينة...</p>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(previewModal);
            
            // التقاط الصورة
            const canvas = await html2canvas(element, {
                scale: scale,
                backgroundColor: getComputedStyle(element).backgroundColor || '#ffffff',
                logging: false,
                allowTaint: true,
                useCORS: true
            });
            
            // تحويل الصورة إلى رابط
            const imageData = canvas.toDataURL('image/png');
            
            // تخزين الصورة للتحميل
            window.printImageData = imageData;
            
            // عرض المعاينة
            const previewContent = document.getElementById('printPreviewContent');
            previewContent.innerHTML = `
                <div style="text-align: center;">
                    <img src="${imageData}" style="max-width: 100%; max-height: 500px; border: 1px solid var(--border-color); border-radius: 8px; box-shadow: var(--shadow);">
                    <p style="margin-top: 12px; color: var(--text-muted); font-size: 12px;">
                        <i class="fas fa-check-circle" style="color: var(--success);"></i> 
                        تم تجهيز الصورة بنجاح - يمكنك الآن الطباعة أو التحميل
                    </p>
                </div>
            `;
            
            UI.toast('تم تجهيز الصورة للطباعة', 'success');
            
        } catch (error) {
            console.error('خطأ في الطباعة:', error);
            UI.toast('حدث خطأ أثناء تجهيز الصورة', 'error');
        }
    },

    downloadImage() {
        if (window.printImageData) {
            const link = document.createElement('a');
            link.download = `طباعة_${new Date().toISOString().split('T')[0]}.png`;
            link.href = window.printImageData;
            link.click();
            UI.toast('تم تحميل الصورة', 'success');
        } else {
            UI.toast('لا توجد صورة للتحميل', 'error');
        }
    },

    printFullPage() {
        window.print();
    }
};

// ========== نظام تصدير إكسل المحسن ==========
const Excel = {
    formatNumber(cell, value) {
        if (cell) {
            cell.t = 'n';
            cell.v = value;
            cell.z = '#,##0.00 "ج.م"';
        }
        return cell;
    },

    styleCell(cell, options = {}) {
        if (!cell) return cell;
        cell.s = {
            font: { 
                bold: options.bold || false,
                sz: options.size || 11,
                color: { rgb: options.color || '000000' }
            },
            alignment: { 
                horizontal: options.align || 'right',
                vertical: 'center'
            },
            fill: options.bgColor ? { fgColor: { rgb: options.bgColor } } : undefined,
            border: options.border ? {
                top: { style: 'thin', color: { rgb: 'E2E8F0' } },
                bottom: { style: 'thin', color: { rgb: 'E2E8F0' } },
                left: { style: 'thin', color: { rgb: 'E2E8F0' } },
                right: { style: 'thin', color: { rgb: 'E2E8F0' } }
            } : undefined
        };
        return cell;
    },

    exportFullReport() {
        try {
            const wb = XLSX.utils.book_new();
            const date = Utils.formatDate(new Date()).replace(/\//g, '-');
            const company = App.settings.companyName || 'شركتي';
            
            // صفحة ملخص العملاء
            const summarySheet = XLSX.utils.aoa_to_sheet([]);
            let row = 0;
            
            XLSX.utils.sheet_add_aoa(summarySheet, [[company]], { origin: `A${row+1}` });
            row++;
            XLSX.utils.sheet_add_aoa(summarySheet, [['تقرير شامل - ملخص العملاء']], { origin: `A${row+1}` });
            row++;
            XLSX.utils.sheet_add_aoa(summarySheet, [[`تاريخ التقرير: ${date}`]], { origin: `A${row+1}` });
            row += 2;
            
            const headers = ['م', 'الاسم', 'الهاتف', 'المعاملات', 'له', 'عليه', 'الرصيد', 'الحالة'];
            XLSX.utils.sheet_add_aoa(summarySheet, [headers], { origin: `A${row+1}` });
            row++;
            
            App.clients.forEach((client, i) => {
                const s = ClientHelper.getClientSummary(client.id);
                XLSX.utils.sheet_add_aoa(summarySheet, [[
                    i + 1,
                    client.name,
                    client.phone || '—',
                    s.count,
                    s.totalFor,
                    s.totalAgainst,
                    s.balance,
                    s.balance > 0 ? 'دائن' : s.balance < 0 ? 'مدين' : 'متوازن'
                ]], { origin: `A${row+1}` });
                row++;
            });
            
            summarySheet['!cols'] = [
                { wch: 5 }, { wch: 25 }, { wch: 15 }, { wch: 10 }, 
                { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 8 }
            ];
            
            XLSX.utils.book_append_sheet(wb, summarySheet, 'ملخص العملاء');
            
            XLSX.writeFile(wb, `تقرير_شامل_${date}.xlsx`);
            UI.toast('تم تصدير التقرير', 'success');
        } catch (error) {
            UI.toast('خطأ في التصدير', 'error');
        }
    },

    exportAllClientsSeparate() {
        try {
            const wb = XLSX.utils.book_new();
            const date = Utils.formatDate(new Date()).replace(/\//g, '-');
            
            App.clients.forEach(client => {

const Auth = {
    checkLogin() {
        return sessionStorage.getItem('logged_in') === 'true';
    },

    login(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (username === App.settings.username && password === App.settings.password) {
            sessionStorage.setItem('logged_in', 'true');
            UI.initApp();
            UI.toast('مرحباً بك', 'success');
        } else {
            const err = document.getElementById('loginError');
            err.style.display = 'block';
            err.textContent = 'بيانات غير صحيحة';
            setTimeout(() => err.style.display = 'none', 3000);
        }
    },

    logout() {
        if (confirm('تسجيل الخروج؟')) {
            sessionStorage.removeItem('logged_in');
            location.reload();
        }
    }
};

// ========== نظام التوجيه المحسن ==========
const Router = {
    currentView: 'dashboard',
    params: null,

    navigate(view, params) {
        this.currentView = view;
        this.params = params;
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const nav = document.getElementById(`nav-${view}`);
        if (nav) nav.classList.add('active');
        
        if (window.innerWidth <= 1024) UI.toggleSidebar(false);
        this.render();
    },

    render() {
        const area = document.getElementById('viewArea');
        const title = document.getElementById('viewTitle');
        if (!area) return;
        
        const titles = {
            'dashboard': 'لوحة التحكم',
            'clients': 'العملاء',
            'transactions': 'المعاملات'
        };
        
        title.textContent = titles[this.currentView] || 'الخبير المحاسبي';
        
        if (this.currentView === 'dashboard') Views.dashboard(area);
        else if (this.currentView === 'clients') Views.clients(area);
        else if (this.currentView === 'transactions') Views.transactions(area);
    }
};

        s.classList.toggle('open', show);
        o.classList.toggle('active', show);

    toast(m, t = 'success') {

        const toast = document.createElement('div');
        toast.className = `toast-item ${t}`;
        toast.innerHTML = `<i class="fas ${t === 'success' ? 'fa-check-circle' : t === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${m}`;
        c.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    },

    setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        App.settings.theme = theme;
        Storage.save();
        
        const d = document.getElementById('themeDarkBtn');
        const l = document.getElementById('themeLightBtn');
        if (d && l) {
            d.classList.toggle('active', theme === 'dark');
            l.classList.toggle('active', theme === 'light');

        this.toast('تم التحديث', 'info');

            const tb = document.getElementById('transactions-tbody');

            let html = '';

                if (tx.type === 'له') tf += amt;

                html += `

                        <td>

                    <div style="display: flex; justify-content: space-between; font-size: 12px;">
                        <span>له:</span>
                        <span class="text-success" id="total-for">0.00 EGP</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px;">
                        <span>عليه:</span>
                        <span class="text-danger" id="total-against">0.00 EGP</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: bold;">
                        <span>الرصيد:</span>
                        <span id="total-balance">0.00 EGP</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">ملاحظات</label>
                    <textarea id="clientNotes" class="form-control" rows="2"></textarea>
                </div>
                
                <button class="btn btn-primary w-100" onclick="UI.saveClient()">حفظ</button>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        setTimeout(() => {
            this.txs = txs;
            this.addTransactionRow();
        }, 100);
    },

    txs: [],

    addTransactionRow() {
        if (!this.txs) this.txs = [];
        this.txs.push({
            type: 'له',
            amount: '',
            date: new Date().toISOString().split('T')[0],
            notes: ''
        });
        this.renderTransactions();
    },

    removeTransaction(index) {
        if (this.txs) {
            this.txs.splice(index, 1);
            this.renderTransactions();
        }
    },

    renderTransactions() {
        const tb = document.getElementById('transactions-tbody');
        if (!tb) return;
        
        let html = '';
        let tf = 0, ta = 0;
        
        this.txs.forEach((tx, i) => {
            const amt = parseFloat(tx.amount) || 0;
            if (tx.type === 'له') tf += amt;
            else ta += amt;
            
            html += `
                <tr>
                    <td>
                        <select class="form-select tx-type" data-index="${i}" style="width:100%;">
                            <option value="له" ${tx.type === 'له' ? 'selected' : ''}>له</option>
                            <option value="عليه" ${tx.type === 'عليه' ? 'selected' : ''}>عليه</option>
                        </select>
                    </td>
                    <td>
                        <input type="number" class="form-control tx-amount" data-index="${i}" value="${tx.amount || ''}" step="0.01" min="0" placeholder="المبلغ">
                    </td>
                    <td>
                        <input type="date" class="form-control tx-date" data-index="${i}" value="${tx.date || new Date().toISOString().split('T')[0]}">
                    </td>
                    <td>
                        <input type="text" class="form-control tx-notes" data-index="${i}" value="${tx.notes || ''}" placeholder="البيان">
                    </td>
                    <td>
                        <button type="button" class="btn btn-icon btn-sm btn-danger" onclick="UI.removeTransaction(${i})">
                            <i class="fas fa-times"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        tb.innerHTML = html;
        
        document.getElementById('total-for').textContent = Utils.formatMoney(tf);
        document.getElementById('total-against').textContent = Utils.formatMoney(ta);
        document.getElementById('total-balance').textContent = Utils.formatMoney(tf - ta);
        
        document.querySelectorAll('.tx-type').forEach(s => {
            s.addEventListener('change', (e) => {
                const i = e.target.dataset.index;
                this.txs[i].type = e.target.value;
                this.renderTransactions();
            });
        });
        
        document.querySelectorAll('.tx-amount').forEach(i => {
            i.addEventListener('input', (e) => {
                const idx = e.target.dataset.index;
                this.txs[idx].amount = e.target.value;
                this.renderTransactions();
            });
        });
        
        document.querySelectorAll('.tx-date').forEach(i => {
            i.addEventListener('change', (e) => {
                const idx = e.target.dataset.index;
                this.txs[idx].date = e.target.value;
            });
        });
        
        document.querySelectorAll('.tx-notes').forEach(i => {
            i.addEventListener('input', (e) => {
                const idx = e.target.dataset.index;
                this.txs[idx].notes = e.target.value;
            });
        });
    },

    saveClient() {
        const name = document.getElementById('clientName').value.trim();
        if (!name) {
            this.toast('الرجاء إدخال الاسم', 'error');
            return;
        }
        
        const valid = (this.txs || []).filter(tx => tx.amount && parseFloat(tx.amount) > 0);
        
        ClientHelper.addClient({
            name,
            phone: document.getElementById('clientPhone').value,
            address: document.getElementById('clientAddress').value,
            notes: document.getElementById('clientNotes').value,
            transactions: valid
        });
        
        this.txs = [];
        document.getElementById('addClientModal').remove();
        this.toast('تم إضافة العميل', 'success');
        Router.render();
    },

    showAddTransaction(clientId) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'addTxModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">💰 إضافة معاملة</div>
                    <button class="modal-close" onclick="document.getElementById('addTxModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">العميل</label>
                    <select id="txClient" class="form-select" ${clientId ? 'disabled' : ''}>
                        <option value="">اختر عميل</option>
                        ${App.clients.map(c => `<option value="${c.id}" ${clientId === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">النوع</label>
                    <select id="txType" class="form-select">
                        <option value="له">له</option>
                        <option value="عليه">عليه</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">المبلغ</label>
                    <input type="number" id="txAmount" class="form-control" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">التاريخ</label>
                    <input type="date" id="txDate" class="form-control" value="${new Date().toISOString().split('T')[0]}">
                </div>
                <div class="form-group">
                    <label class="form-label">البيان</label>
                    <input type="text" id="txNotes" class="form-control">
                </div>
                <button class="btn btn-primary w-100" onclick="UI.saveTransaction()">حفظ</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveTransaction() {
        const cid = document.getElementById('txClient').value;
        if (!cid) return this.toast('اختر العميل', 'error');
        
        const amt = parseFloat(document.getElementById('txAmount').value);
        if (!amt || amt <= 0) return this.toast('أدخل مبلغ صحيح', 'error');
        
        ClientHelper.addTransaction(cid, {
            type: document.getElementById('txType').value,
            amount: amt,
            date: document.getElementById('txDate').value,
            notes: document.getElementById('txNotes').value
        });
        
        document.getElementById('addTxModal').remove();
        this.toast('تمت الإضافة', 'success');
        Router.render();
    },

    showEditClient(cid) {
        const c = ClientHelper.getClient(cid);
        if (!c) return;
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'editClientModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">✏️ تعديل عميل</div>
                    <button class="modal-close" onclick="document.getElementById('editClientModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">الاسم</label>
                    <input type="text" id="editName" class="form-control" value="${c.name}">
                </div>
                <div class="form-group">
                    <label class="form-label">الهاتف</label>
                    <input type="text" id="editPhone" class="form-control" value="${c.phone || ''}">
                </div>
                <div class="form-group">
                    <label class="form-label">العنوان</label>
                    <input type="text" id="editAddress" class="form-control" value="${c.address || ''}">
                </div>
                <div class="form-group">
                    <label class="form-label">ملاحظات</label>
                    <textarea id="editNotes" class="form-control">${c.notes || ''}</textarea>
                </div>
                <button class="btn btn-primary w-100" onclick="UI.updateClient('${cid}')">تحديث</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    updateClient(cid) {
        ClientHelper.updateClient(cid, {
            name: document.getElementById('editName').value,
            phone: document.getElementById('editPhone').value,
            address: document.getElementById('editAddress').value,
            notes: document.getElementById('editNotes').value
        });
        document.getElementById('editClientModal').remove();
        this.toast('تم التحديث', 'success');
        Router.render();
    },

    deleteClient(cid) {
        if (confirm('حذف العميل؟')) {
            ClientHelper.deleteClient(cid);
            this.toast('تم الحذف', 'success');
            Router.render();
        }
    },

    deleteTransaction(cid, tid) {
        if (confirm('حذف المعاملة؟')) {
            ClientHelper.deleteTransaction(cid, tid);
            this.toast('تم الحذف', 'success');
            Router.render();
        }
    },

    showSettings() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'settingsModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">⚙️ الإعدادات</div>
                    <button class="modal-close" onclick="document.getElementById('settingsModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">اسم الشركة</label>
                    <input type="text" id="companyName" class="form-control" value="${App.settings.companyName}">
                </div>
                <div class="form-group">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" id="newUsername" class="form-control" value="${App.settings.username}">
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="text" id="newPassword" class="form-control" value="${App.settings.password}">
                </div>
                <button class="btn btn-primary w-100" onclick="UI.saveSettings()">حفظ</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveSettings() {
        App.settings.companyName = document.getElementById('companyName').value;
        App.settings.username = document.getElementById('newUsername').value;
        App.settings.password = document.getElementById('newPassword').value;
        Storage.save();
        document.getElementById('settingsModal').remove();
        this.toast('تم الحفظ', 'success');
    },

    showDeveloperInfo() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'devModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">👨‍💻 المطور</div>
                    <button class="modal-close" onclick="document.getElementById('devModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="text-center">
                    <div style="width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
                        <i class="fas fa-user-cog" style="font-size: 30px; color: white;"></i>
                    </div>
                    <h3 style="font-size: 18px;">محمد أحمد فؤاد</h3>
                    <p style="color: var(--text-muted); font-size: 12px;">مطور برمجيات</p>
                    <p style="font-size: 13px; margin: 8px 0;"><i class="fas fa-phone" style="color: var(--success);"></i> 01010421571</p>
                    <p style="font-size: 13px; margin-bottom: 8px;"><i class="fab fa-whatsapp" style="color: #25D366;"></i> 01010421571</p>
                    <p style="font-size: 11px; color: var(--text-muted);"><i class="fas fa-code"></i> الإصدار: 11.0</p>
                    <button class="btn btn-success w-100" style="margin-top: 12px;" onclick="Utils.contactDev()">
                        <i class="fab fa-whatsapp"></i> تواصل
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    },

    showBackupOptions() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'backupModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">💾 النسخ الاحتياطي</div>
                    <button class="modal-close" onclick="document.getElementById('backupModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <button class="btn btn-primary w-100 mb-2" onclick="UI.createBackup(); document.getElementById('backupModal').remove()">
                    <i class="fas fa-download"></i> إنشاء نسخة
                </button>
                <button class="btn btn-success w-100" onclick="UI.restoreBackup()">
                    <i class="fas fa-upload"></i> استعادة نسخة
                </button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    createBackup() {
        try {
            const data = JSON.stringify(App, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `نسخة_احتياطية_${Utils.formatDate(new Date()).replace(/\//g, '-')}.json`;
            a.click();
            this.toast('تم إنشاء النسخة', 'success');
        } catch (error) {
            this.toast('خطأ في إنشاء النسخة', 'error');
        }
    },

    restoreBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.clients) {
                        App = data;
                        Storage.save();
                        document.getElementById('backupModal')?.remove();
                        this.toast('تمت الاستعادة', 'success');
                        Router.render();
                    }
                } catch {
                    this.toast('ملف غير صالح', 'error');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }
};

// ========== أدوات مساعدة محسنة ==========
const Utils = {
    formatMoney(amt) {
        return (parseFloat(amt) || 0).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }) + ' EGP';
    },

    formatDate(d) {
        try {
            return new Date(d).toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        } catch {
            return d;
        }
    },

    contactDev() {
        window.open('https://wa.me/201010421571', '_blank');
    }
};

// ========== دوال عامة ==========
function viewClient(id) {
    const c = ClientHelper.getClient(id);
    if (!c) return;
    
    const s = ClientHelper.getClientSummary(id);
    const r = ClientHelper.getRunningBalance(id).reverse();
    
    const area = document.getElementById('viewArea');
    area.innerHTML = `
        <div style="margin-bottom: 8px;">
            <button class="btn btn-ghost btn-sm" onclick="Router.navigate('clients')">
                <i class="fas fa-arrow-right"></i> عودة
            </button>
        </div>
        
        <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user"></i></div>
                <div class="stat-label">${c.name}</div>
                <div class="stat-value" style="font-size: 13px;">${c.phone || '—'}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-down" style="color: var(--success)"></i></div>
                <div class="stat-label">له</div>
                <div class="stat-value" style="color: var(--success)">${Utils.formatMoney(s.totalFor)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-up" style="color: var(--danger)"></i></div>
                <div class="stat-label">عليه</div>
                <div class="stat-value" style="color: var(--danger)">${Utils.formatMoney(s.totalAgainst)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-balance-scale"></i></div>
                <div class="stat-label">الرصيد</div>
                <div class="stat-value" style="color: ${s.balance >= 0 ? 'var(--success)' : 'var(--danger)'}">${Utils.formatMoney(Math.abs(s.balance))}</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title"><i class="fas fa-history"></i> المعاملات</div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-excel btn-sm" onclick="Excel.exportSingleClient('${c.id}')">
                        <i class="fas fa-file-excel"></i> تصدير
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="UI.showAddTransaction('${c.id}')">
                        <i class="fas fa-plus"></i> إضافة
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>التاريخ</th><th>البيان</th><th>له</th><th>عليه</th><th>الرصيد</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${r.map(t => `
                            <tr>
                                <td>${Utils.formatDate(t.date)}</td>
                                <td>${t.notes || '—'}</td>
                                <td class="text-success">${t.type === 'له' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td class="text-danger">${t.type === 'عليه' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td>${Utils.formatMoney(t.running)}</td>
                                <td>
                                    <button class="btn btn-icon btn-sm btn-danger" onclick="UI.deleteTransaction('${c.id}', '${t.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `).join('') || '<tr><td colspan="6" class="text-center">لا توجد معاملات</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

// ========== تهيئة التطبيق ==========
window.onload = () => {
    if (Auth.checkLogin()) {
        UI.initApp();
    } else {
        document.getElementById('loginForm').addEventListener('submit', Auth.login);
    }
    
    const theme = localStorage.getItem('theme');
    if (theme) UI.setTheme(theme);
};
</script>
