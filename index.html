<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الخبير المحاسبي - الإصدار الاحترافي v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ========== نظام الألوان العصري ========== */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-soft: #dbeafe;
            --primary-bg: rgba(37, 99, 235, 0.1);
            
            --secondary: #7c3aed;
            --secondary-dark: #6d28d9;
            --secondary-light: #8b5cf6;
            --secondary-soft: #ede9fe;
            
            --success: #059669;
            --success-dark: #047857;
            --success-light: #10b981;
            --success-soft: #d1fae5;
            
            --danger: #dc2626;
            --danger-dark: #b91c1c;
            --danger-light: #ef4444;
            --danger-soft: #fee2e2;
            
            --warning: #d97706;
            --warning-soft: #fef3c7;
            
            --info: #0891b2;
            --info-soft: #cffafe;
            
            /* الألوان المحايدة - تصميم عصري */
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-tertiary: #e2e8f0;
            --bg-card: #ffffff;
            --bg-card-alt: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-hover: #f1f5f9;
            
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --text-light: #f8fafc;
            
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            --border-focus: var(--primary);
            
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.25);
            
            --radius-sm: 6px;
            --radius: 10px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            
            --sidebar-width: 280px;
            --header-height: 70px;
            
            --font: 'Cairo', sans-serif;
            --font-number: 'Courier New', 'Consolas', monospace;
        }

        /* الوضع الداكن - ألوان عصرية */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-card: #1e293b;
            --bg-card-alt: #334155;
            --bg-sidebar: #0f172a;
            --bg-hover: #2d3a4f;
            
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            
            --border-color: #334155;
            --border-hover: #475569;
            
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow: 0 4px 6px rgba(0,0,0,0.4);
            --shadow-md: 0 10px 15px rgba(0,0,0,0.5);
            --shadow-lg: 0 20px 25px rgba(0,0,0,0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.2s, color 0.2s;
        }

        /* سكرول عصري */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* ========== القائمة الجانبية العصرية ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1100;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow);
        }

        .sidebar-brand {
            padding: 25px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .brand-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 10px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 20px;
        }

        .nav-section-title {
            padding: 8px 15px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 2px 5px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary-soft);
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item i {
            width: 20px;
            font-size: 16px;
        }

        .nav-badge {
            margin-right: auto;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .developer-card {
            background: var(--bg-card-alt);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 15px;
        }

        .dev-name {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .dev-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #25D366;
            color: white;
            padding: 10px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            width: 100%;
        }

        .dev-contact:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background: var(--bg-card-alt);
            border-radius: var(--radius);
        }

        .theme-toggle button {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        .theme-toggle button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ========== المحتوى الرئيسي العصري ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: var(--header-height);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
        }

        .menu-toggle:hover {
            background: var(--primary);
            color: white;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            position: relative;
            width: 250px;
        }

        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            padding: 10px 35px 10px 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 13px;
            transition: 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* ========== الأزرار العصرية ========== */
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            border: 1px solid transparent;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-excel {
            background: #059669;
            color: white;
        }

        .btn-excel:hover {
            background: #047857;
        }

        .btn-ghost {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* ========== البطاقات الإحصائية العصرية ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-soft);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-primary);
            font-family: var(--font-number);
        }

        .stat-change {
            font-size: 11px;
            color: var(--success);
            margin-top: 5px;
        }

        /* ========== البطاقات والجداول العصرية ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
            background: var(--bg-card-alt);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th {
            padding: 15px;
            text-align: right;
            background: var(--primary-soft);
            color: var(--primary-dark);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        tr:hover td {
            background: var(--bg-hover);
        }

        .clickable {
            cursor: pointer;
            color: var(--primary);
            font-weight: 600;
        }

        .clickable:hover {
            text-decoration: underline;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-success {
            background: var(--success-soft);
            color: var(--success-dark);
        }

        .badge-danger {
            background: var(--danger-soft);
            color: var(--danger-dark);
        }

        /* ========== النوافذ المنبثقة العصرية ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 25px;
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-xl);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        /* ========== النماذج ========== */
        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 13px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        /* ========== الإشعارات ========== */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast-item {
            padding: 14px 22px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
            font-size: 13px;
        }

        .toast-item.success { background: var(--success); }
        .toast-item.error { background: var(--danger); }
        .toast-item.info { background: var(--primary); }

        /* ========== شاشة الدخول ========== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 35px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow-xl);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin: 0 auto 20px;
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-input:focus {
            border-color: var(--primary);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .login-error {
            background: var(--danger-soft);
            color: var(--danger-dark);
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        /* ========== التجاوب ========== */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                transform: translateX(100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 1050;
            }
            
            .sidebar-overlay.active {
                display: block;
            }
            
            .menu-toggle {
                display: flex;
            }
            
            .search-box {
                width: 180px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
            }
            
            .header-title {
                font-size: 16px;
            }
            
            .scroll-area {
                padding: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-card {
                padding: 20px;
            }
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .font-mono { font-family: var(--font-number); }
        .w-100 { width: 100%; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-crown"></i>
        </div>
        <h1 class="login-title">الخبير المحاسبي</h1>
        <div id="loginError" class="login-error"></div>
        <form onsubmit="Auth.login(event)">
            <input type="text" id="username" class="login-input" placeholder="اسم المستخدم" value="admin">
            <input type="password" id="password" class="login-input" placeholder="كلمة المرور" value="admin123">
            <button type="submit" class="login-button">
                <i class="fas fa-lock-open"></i> دخول
            </button>
        </form>
        <div class="text-center" style="margin-top: 15px; color: var(--text-muted); font-size: 12px;">
            <i class="fas fa-code"></i> محمد أحمد فؤاد | 
            <i class="fab fa-whatsapp"></i> 01010421571
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" class="app-container" style="display: none;">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="UI.toggleSidebar(false)"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-title">الخبير المحاسبي</div>
            <div class="brand-sub">إصدار احترافي v10.0</div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">الرئيسية</div>
                <div class="nav-item" id="nav-dashboard" onclick="Router.navigate('dashboard')">
                    <i class="fas fa-home"></i> لوحة التحكم
                    <span class="nav-badge" id="dashboardBadge">0</span>
                </div>

<script>
// ========== البيانات الأساسية ==========
let App = {
    clients: [],
    settings: {
        username: 'admin',
        password: 'admin123',
        theme: 'dark',
        companyName: 'شركتي'
    }
};

// ========== نظام التخزين ==========
const Storage = {
    load() {
        const saved = localStorage.getItem('elite_accounting');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                App.clients = data.clients || [];
                App.settings = { ...App.settings, ...(data.settings || {}) };
            } catch (e) {}
        }
        this.updateBadges();
    },

    save() {
        localStorage.setItem('elite_accounting', JSON.stringify({
            clients: App.clients,
            settings: App.settings
        }));
        this.updateBadges();
    },

    updateBadges() {
        document.getElementById('dashboardBadge').textContent = App.clients.length;
        document.getElementById('clientsBadge').textContent = App.clients.length;
        const totalTx = App.clients.reduce((s, c) => s + (c.transactions?.length || 0), 0);
        document.getElementById('transactionsBadge').textContent = totalTx;
    }
};

// ========== دوال العملاء ==========
const ClientHelper = {
    getClient(id) {
        return App.clients.find(c => c.id === id);
    },

    addClient(data) {
        const client = {
            id: Date.now().toString(),
            name: data.name,
            phone: data.phone || '',
            address: data.address || '',
            notes: data.notes || '',
            transactions: [],
            balance: 0,
            totalFor: 0,
            totalAgainst: 0,
            createdAt: new Date().toISOString()
        };
        
        if (data.transactions?.length) {
            data.transactions.forEach(tx => {
                if (tx.amount && parseFloat(tx.amount) > 0) {
                    const amount = parseFloat(tx.amount);
                    const transaction = {
                        id: Date.now() + Math.random().toString(36),
                        type: tx.type,
                        amount,
                        date: tx.date || new Date().toISOString().split('T')[0],
                        notes: tx.notes || '',
                        createdAt: new Date().toISOString()
                    };
                    client.transactions.push(transaction);
                    
                    if (tx.type === 'له') client.totalFor += amount;
                    else client.totalAgainst += amount;
                }
            });
        }
        
        client.balance = client.totalFor - client.totalAgainst;
        App.clients.push(client);
        Storage.save();
        return client;
    },

    updateClient(id, updates) {
        const client = this.getClient(id);
        if (client) {
            Object.assign(client, updates);
            Storage.save();
            return true;
        }
        return false;
    },

    deleteClient(id) {
        App.clients = App.clients.filter(c => c.id !== id);
        Storage.save();
    },

    addTransaction(clientId, transaction) {
        const client = this.getClient(clientId);
        if (!client) return false;

        const amount = parseFloat(transaction.amount);
        if (!amount || amount <= 0) return false;

        const tx = {
            id: Date.now() + Math.random().toString(36),
            type: transaction.type,
            amount,
            date: transaction.date || new Date().toISOString().split('T')[0],
            notes: transaction.notes || '',
            createdAt: new Date().toISOString()
        };

        client.transactions.push(tx);
        
        if (tx.type === 'له') client.totalFor += amount;
        else client.totalAgainst += amount;
        
        client.balance = client.totalFor - client.totalAgainst;
        Storage.save();
        return true;
    },

    deleteTransaction(clientId, txId) {
        const client = this.getClient(clientId);
        if (!client) return false;

        const tx = client.transactions.find(t => t.id === txId);
        if (tx) {
            if (tx.type === 'له') client.totalFor -= tx.amount;
            else client.totalAgainst -= tx.amount;
        }

        client.transactions = client.transactions.filter(t => t.id !== txId);
        client.balance = client.totalFor - client.totalAgainst;
        Storage.save();
        return true;
    },

    getClientSummary(id) {
        const client = this.getClient(id);
        if (!client) return { balance: 0, totalFor: 0, totalAgainst: 0, count: 0 };
        return {
            balance: client.balance,
            totalFor: client.totalFor,
            totalAgainst: client.totalAgainst,
            count: client.transactions?.length || 0
        };
    },

    getRunningBalance(id) {
        const client = this.getClient(id);
        if (!client) return [];
        
        let running = 0;
        return (client.transactions || [])
            .slice()
            .sort((a, b) => new Date(a.date) - new Date(b.date))
            .map(t => {
                if (t.type === 'له') running += t.amount;
                else running -= t.amount;
                return { ...t, running };
            });
    },

    getAllTransactions() {
        const txs = [];
        App.clients.forEach(c => {
            (c.transactions || []).forEach(t => {
                txs.push({ ...t, clientName: c.name, clientId: c.id });
            });
        });
        return txs.sort((a, b) => new Date(b.date) - new Date(a.date));
    },

    getStatistics() {
        const stats = {
            totalClients: App.clients.length,
            totalTransactions: 0,
            totalFor: 0,
            totalAgainst: 0,
            netBalance: 0,
            debtors: 0,
            creditors: 0
        };

        App.clients.forEach(c => {
            const s = this.getClientSummary(c.id);
            stats.totalTransactions += s.count;
            stats.totalFor += s.totalFor;
            stats.totalAgainst += s.totalAgainst;
            if (s.balance > 0) stats.creditors++;
            else if (s.balance < 0) stats.debtors++;
        });

        stats.netBalance = stats.totalFor - stats.totalAgainst;
        return stats;
    }
};

const Auth = {

            setTimeout(() => err.style.display = 'none', 3000);

    logout() {
        if (confirm('تسجيل الخروج؟')) {

};

// ========== نظام تصدير إكسل احترافي ==========
const Excel = {
    // تنسيق الأرقام في إكسل
    formatNumber(cell, value) {
        cell.t = 'n';
        cell.v = value;
        cell.z = '#,##0.00 "ج.م"';
        return cell;
    },

    // تنسيق الخلايا
    styleCell(cell, options = {}) {
        cell.s = {
            font: { 
                bold: options.bold || false,
                sz: options.size || 11,
                color: { rgb: options.color || '000000' }
            },
            alignment: { 
                horizontal: options.align || 'right',
                vertical: 'center'
            },
            fill: options.bgColor ? { fgColor: { rgb: options.bgColor } } : undefined,
            border: options.border ? {
                top: { style: 'thin', color: { rgb: 'E2E8F0' } },
                bottom: { style: 'thin', color: { rgb: 'E2E8F0' } },
                left: { style: 'thin', color: { rgb: 'E2E8F0' } },
                right: { style: 'thin', color: { rgb: 'E2E8F0' } }
            } : undefined
        };
        return cell;
    },

    // تقرير شامل - منظم وجميل
    exportFullReport() {
        const wb = XLSX.utils.book_new();
        const date = Utils.formatDate(new Date());
        const company = App.settings.companyName || 'شركتي';
        
        // صفحة ملخص العملاء
        const summarySheet = XLSX.utils.aoa_to_sheet([]);
        let row = 0;
        
        // ترويسة
        XLSX.utils.sheet_add_aoa(summarySheet, [[company]], { origin: `A${row+1}` });
        this.styleCell(summarySheet[`A${row+1}`], { bold: true, size: 16, color: '2563EB' });
        row++;
        
        XLSX.utils.sheet_add_aoa(summarySheet, [['تقرير شامل - ملخص العملاء']], { origin: `A${row+1}` });
        this.styleCell(summarySheet[`A${row+1}`], { bold: true, size: 14, color: '1E293B' });
        row++;
        
        XLSX.utils.sheet_add_aoa(summarySheet, [[`تاريخ التقرير: ${date}`]], { origin: `A${row+1}` });
        row += 2;
        
        // جدول العملاء
        const headers = ['م', 'الاسم', 'الهاتف', 'عدد المعاملات', 'له', 'عليه', 'الرصيد', 'الحالة'];
        XLSX.utils.sheet_add_aoa(summarySheet, [headers], { origin: `A${row+1}` });
        
        // تنسيق الهيدر
        headers.forEach((_, i) => {
            const cell = summarySheet[`${String.fromCharCode(65 + i)}${row+1}`];
            this.styleCell(cell, { bold: true, color: 'FFFFFF', bgColor: '2563EB', align: 'center' });
        });
        row++;
        
        // بيانات العملاء
        App.clients.forEach((client, i) => {
            const s = ClientHelper.getClientSummary(client.id);
            const data = [
                i + 1,
                client.name,
                client.phone || '—',
                s.count,
                s.totalFor,
                s.totalAgainst,
                s.balance,
                s.balance > 0 ? 'دائن' : s.balance < 0 ? 'مدين' : 'متوازن'
            ];
            XLSX.utils.sheet_add_aoa(summarySheet, [data], { origin: `A${row+1}` });
            
            // تنسيق الصف
            data.forEach((_, j) => {
                const cell = summarySheet[`${String.fromCharCode(65 + j)}${row+1}`];
                if (j >= 4 && j <= 6) { // أعمدة المبالغ
                    this.formatNumber(cell, data[j]);
                    if (data[j] > 0 && j === 6) this.styleCell(cell, { color: '059669' });
                    else if (data[j] < 0 && j === 6) this.styleCell(cell, { color: 'DC2626' });
                }
            });
            row++;
        });
        
        // إجمالي
        const stats = ClientHelper.getStatistics();
        row++;
        XLSX.utils.sheet_add_aoa(summarySheet, [['الإجمالي', '', '', stats.totalTransactions, stats.totalFor, stats.totalAgainst, stats.netBalance, '']], { origin: `A${row+1}` });
        
        // تنسيق الإجمالي
        ['D', 'E', 'F', 'G'].forEach((col, i) => {
            const cell = summarySheet[`${col}${row+1}`];
            if (cell) {
                this.formatNumber(cell, [stats.totalTransactions, stats.totalFor, stats.totalAgainst, stats.netBalance][i]);
                this.styleCell(cell, { bold: true });
            }
        });
        
        // ضبط عرض الأعمدة
        summarySheet['!cols'] = [
            { wch: 5 }, { wch: 25 }, { wch: 15 }, { wch: 12 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 10 }
        ];
        
        XLSX.utils.book_append_sheet(wb, summarySheet, 'ملخص العملاء');
        
        // صفحة جميع المعاملات
        const txSheet = XLSX.utils.aoa_to_sheet([]);
        row = 0;
        
        XLSX.utils.sheet_add_aoa(txSheet, [[company]], { origin: `A${row+1}` });
        this.styleCell(txSheet[`A${row+1}`], { bold: true, size: 16, color: '2563EB' });
        row++;
        
        XLSX.utils.sheet_add_aoa(txSheet, [['جميع المعاملات']], { origin: `A${row+1}` });
        this.styleCell(txSheet[`A${row+1}`], { bold: true, size: 14 });
        row++;
        
        XLSX.utils.sheet_add_aoa(txSheet, [[`تاريخ التقرير: ${date}`]], { origin: `A${row+1}` });
        row += 2;
        
        const txHeaders = ['م', 'التاريخ', 'العميل', 'النوع', 'المبلغ', 'البيان'];

// ========== نظام الواجهة ==========
const UI = {
    initApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        Storage.load();
        Router.navigate('dashboard');
    },

    toggleSidebar(show) {
        const s = document.getElementById('sidebar');
        const o = document.getElementById('sidebarOverlay');
        s.classList.toggle('open', show);
        o.classList.toggle('active', show);
    },

    toast(m, t = 'success') {
        const c = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast-item ${t}`;
        toast.innerHTML = `<i class="fas ${t === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${m}`;
        c.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    },

    setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        App.settings.theme = theme;
        Storage.save();
        
        const d = document.getElementById('themeDarkBtn');
        const l = document.getElementById('themeLightBtn');
        if (d && l) {
            d.classList.toggle('active', theme === 'dark');
            l.classList.toggle('active', theme === 'light');
        }
    },

    refresh() {
        Storage.load();
        Router.render();
        this.toast('تم التحديث', 'info');
    },

    handleGlobalSearch() {
        const term = document.getElementById('globalSearch').value.toLowerCase();
        document.querySelectorAll('#clientsTableBody tr').forEach(r => {
            r.style.display = r.textContent.toLowerCase().includes(term) ? '' : 'none';
        });
    },

    showAddClient() {
        let txs = [];
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'addClientModal';
        
        const render = () => {
            const tb = document.getElementById('transactions-tbody');
            if (!tb) return;
            
            let html = '';
            let tf = 0, ta = 0;
            
            txs.forEach((tx, i) => {
                const amt = parseFloat(tx.amount) || 0;
                if (tx.type === 'له') tf += amt;
                else ta += amt;
                
                html += `
                    <tr>
                        <td>
                            <select class="form-select tx-type" data-index="${i}" style="width:100%;">
                                <option value="له" ${tx.type === 'له' ? 'selected' : ''}>له</option>
                                <option value="عليه" ${tx.type === 'عليه' ? 'selected' : ''}>عليه</option>
                            </select>
                        </td>
                        <td>
                            <input type="number" class="form-control tx-amount" data-index="${i}" value="${tx.amount || ''}" step="0.01" min="0" placeholder="المبلغ">
                        </td>
                        <td>
                            <input type="date" class="form-control tx-date" data-index="${i}" value="${tx.date || new Date().toISOString().split('T')[0]}">
                        </td>
                        <td>
                            <input type="text" class="form-control tx-notes" data-index="${i}" value="${tx.notes || ''}" placeholder="ملاحظات">
                        </td>
                        <td>
                            <button type="button" class="btn btn-icon btn-sm btn-danger" onclick="UI.removeTransaction(${i})">
                                <i class="fas fa-times"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            tb.innerHTML = html;
            
            document.getElementById('total-for').textContent = Utils.formatMoney(tf);
            document.getElementById('total-against').textContent = Utils.formatMoney(ta);
            document.getElementById('total-balance').textContent = Utils.formatMoney(tf - ta);
            
            document.querySelectorAll('.tx-type').forEach(s => {
                s.addEventListener('change', (e) => {
                    const idx = e.target.dataset.index;
                    txs[idx].type = e.target.value;
                    render();
                });
            });
            
            document.querySelectorAll('.tx-amount').forEach(i => {
                i.addEventListener('input', (e) => {
                    const idx = e.target.dataset.index;
                    txs[idx].amount = e.target.value;
                    render();
                });
            });
            
            document.querySelectorAll('.tx-date').forEach(i => {
                i.addEventListener('change', (e) => {
                    const idx = e.target.dataset.index;
                    txs[idx].date = e.target.value;
                });
            });
            
            document.querySelectorAll('.tx-notes').forEach(i => {
                i.addEventListener('input', (e) => {
                    const idx = e.target.dataset.index;
                    txs[idx].notes = e.target.value;
                });
            });
        };
        
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">➕ إضافة عميل</div>
                    <button class="modal-close" onclick="document.getElementById('addClientModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="form-group">
                    <label class="form-label">الاسم</label>
                    <input type="text" id="clientName" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="text" id="clientPhone" class="form-control">
                </div>
                
                <div class="form-group">
                    <label class="form-label">العنوان</label>
                    <input type="text" id="clientAddress" class="form-control">
                </div>
                
                <div style="margin: 15px 0; border-top: 1px solid var(--border-color);"></div>
                
                <h4 style="margin-bottom: 10px; font-size: 14px;">المعاملات المالية</h4>
                
                <div class="table-container" style="margin-bottom: 10px;">
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th>النوع</th>
                                <th>المبلغ</th>
                                <th>التاريخ</th>
                                <th>البيان</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="transactions-tbody"></tbody>
                    </table>
                </div>
                
                <button type="button" class="btn btn-sm btn-ghost" onclick="UI.addTransactionRow()" style="width:100%; margin-bottom: 15px;">
                    <i class="fas fa-plus"></i> إضافة معاملة
                </button>
                
                <div style="background: var(--bg-tertiary); padding: 10px; border-radius: var(--radius); margin-bottom: 15px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>إجمالي له:</span>
                        <span class="text-success" id="total-for">0.00 EGP</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>إجمالي عليه:</span>
                        <span class="text-danger" id="total-against">0.00 EGP</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-weight: bold;">
                        <span>صافي الرصيد:</span>
                        <span id="total-balance">0.00 EGP</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">ملاحظات</label>
                    <textarea id="clientNotes" class="form-control" rows="2"></textarea>
                </div>
                
                <button class="btn btn-primary w-100" onclick="UI.saveClient()">حفظ</button>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        setTimeout(() => {
            this.txs = txs;
            this.addTransactionRow();
        }, 100);
    },

    txs: [],

    addTransactionRow() {
        if (!this.txs) this.txs = [];
        this.txs.push({
            type: 'له',
            amount: '',
            date: new Date().toISOString().split('T')[0],
            notes: ''
        });
        this.renderTransactions();
    },

    removeTransaction(index) {
        if (this.txs) {
            this.txs.splice(index, 1);
            this.renderTransactions();
        }
    },

    renderTransactions() {
        const tb = document.getElementById('transactions-tbody');
        if (!tb) return;
        
        let html = '';
        let tf = 0, ta = 0;
        
        this.txs.forEach((tx, i) => {
            const amt = parseFloat(tx.amount) || 0;
            if (tx.type === 'له') tf += amt;
            else ta += amt;
            
            html += `
                <tr>
                    <td>
                        <select class="form-select tx-type" data-index="${i}" style="width:100%;">
                            <option value="له" ${tx.type === 'له' ? 'selected' : ''}>له</option>
                            <option value="عليه" ${tx.type === 'عليه' ? 'selected' : ''}>عليه</option>
                        </select>
                    </td>
                    <td>
                        <input type="number" class="form-control tx-amount" data-index="${i}" value="${tx.amount || ''}" step="0.01" min="0" placeholder="المبلغ">
                    </td>
                    <td>
                        <input type="date" class="form-control tx-date" data-index="${i}" value="${tx.date || new Date().toISOString().split('T')[0]}">
                    </td>
                    <td>
                        <input type="text" class="form-control tx-notes" data-index="${i}" value="${tx.notes || ''}" placeholder="ملاحظات">
                    </td>
                    <td>
                        <button type="button" class="btn btn-icon btn-sm btn-danger" onclick="UI.removeTransaction(${i})">
                            <i class="fas fa-times"></i>
                        </button>
                    </td>
                </tr>
            `;
        });
        
        tb.innerHTML = html;
        
        document.getElementById('total-for').textContent = Utils.formatMoney(tf);
        document.getElementById('total-against').textContent = Utils.formatMoney(ta);
        document.getElementById('total-balance').textContent = Utils.formatMoney(tf - ta);
        
        document.querySelectorAll('.tx-type').forEach(s => {
            s.addEventListener('change', (e) => {
                const i = e.target.dataset.index;
                this.txs[i].type = e.target.value;
                this.renderTransactions();
            });
        });
        
        document.querySelectorAll('.tx-amount').forEach(i => {
            i.addEventListener('input', (e) => {
                const idx = e.target.dataset.index;
                this.txs[idx].amount = e.target.value;
                this.renderTransactions();
            });
        });
        
        document.querySelectorAll('.tx-date').forEach(i => {
            i.addEventListener('change', (e) => {
                const idx = e.target.dataset.index;
                this.txs[idx].date = e.target.value;
            });
        });
        
        document.querySelectorAll('.tx-notes').forEach(i => {
            i.addEventListener('input', (e) => {
                const idx = e.target.dataset.index;
                this.txs[idx].notes = e.target.value;
            });
        });
    },

    saveClient() {
        const name = document.getElementById('clientName').value.trim();
        if (!name) {
            this.toast('الرجاء إدخال الاسم', 'error');
            return;
        }
        
        const valid = (this.txs || []).filter(tx => tx.amount && parseFloat(tx.amount) > 0);
        
        ClientHelper.addClient({
            name,
            phone: document.getElementById('clientPhone').value,
            address: document.getElementById('clientAddress').value,
            notes: document.getElementById('clientNotes').value,
            transactions: valid
        });
        
        this.txs = [];
        document.getElementById('addClientModal').remove();
        this.toast('تم إضافة العميل', 'success');
        Router.render();
    },

    showAddTransaction(clientId) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'addTxModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">💰 إضافة معاملة</div>
                    <button class="modal-close" onclick="document.getElementById('addTxModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">العميل</label>
                    <select id="txClient" class="form-select" ${clientId ? 'disabled' : ''}>
                        <option value="">اختر عميل</option>
                        ${App.clients.map(c => `<option value="${c.id}" ${clientId === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">النوع</label>
                    <select id="txType" class="form-select">
                        <option value="له">له</option>
                        <option value="عليه">عليه</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">المبلغ</label>
                    <input type="number" id="txAmount" class="form-control" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">التاريخ</label>
                    <input type="date" id="txDate" class="form-control" value="${new Date().toISOString().split('T')[0]}">
                </div>
                <div class="form-group">
                    <label class="form-label">البيان</label>
                    <input type="text" id="txNotes" class="form-control">
                </div>
                <button class="btn btn-primary w-100" onclick="UI.saveTransaction()">حفظ</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveTransaction() {
        const cid = document.getElementById('txClient').value;
        if (!cid) return this.toast('اختر العميل', 'error');
        
        const amt = parseFloat(document.getElementById('txAmount').value);
        if (!amt || amt <= 0) return this.toast('أدخل مبلغ صحيح', 'error');
        
        ClientHelper.addTransaction(cid, {
            type: document.getElementById('txType').value,
            amount: amt,
            date: document.getElementById('txDate').value,
            notes: document.getElementById('txNotes').value
        });
        
        document.getElementById('addTxModal').remove();
        this.toast('تمت الإضافة', 'success');
        Router.render();
    },

    showEditClient(cid) {
        const c = ClientHelper.getClient(cid);
        if (!c) return;
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'editClientModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">✏️ تعديل عميل</div>
                    <button class="modal-close" onclick="document.getElementById('editClientModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">الاسم</label>
                    <input type="text" id="editName" class="form-control" value="${c.name}">
                </div>
                <div class="form-group">
                    <label class="form-label">الهاتف</label>
                    <input type="text" id="editPhone" class="form-control" value="${c.phone || ''}">
                </div>
                <div class="form-group">
                    <label class="form-label">العنوان</label>
                    <input type="text" id="editAddress" class="form-control" value="${c.address || ''}">
                </div>
                <div class="form-group">
                    <label class="form-label">ملاحظات</label>
                    <textarea id="editNotes" class="form-control">${c.notes || ''}</textarea>
                </div>
                <button class="btn btn-primary w-100" onclick="UI.updateClient('${cid}')">تحديث</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    updateClient(cid) {
        ClientHelper.updateClient(cid, {
            name: document.getElementById('editName').value,
            phone: document.getElementById('editPhone').value,
            address: document.getElementById('editAddress').value,
            notes: document.getElementById('editNotes').value
        });
        document.getElementById('editClientModal').remove();
        this.toast('تم التحديث', 'success');
        Router.render();
    },

    deleteClient(cid) {
        if (confirm('حذف العميل؟')) {
            ClientHelper.deleteClient(cid);
            this.toast('تم الحذف', 'success');
            Router.render();
        }
    },

    deleteTransaction(cid, tid) {
        if (confirm('حذف المعاملة؟')) {
            ClientHelper.deleteTransaction(cid, tid);
            this.toast('تم الحذف', 'success');
            Router.render();
        }
    },

    showSettings() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'settingsModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">⚙️ الإعدادات</div>
                    <button class="modal-close" onclick="document.getElementById('settingsModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">اسم الشركة</label>
                    <input type="text" id="companyName" class="form-control" value="${App.settings.companyName}">
                </div>
                <div class="form-group">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" id="newUsername" class="form-control" value="${App.settings.username}">
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="text" id="newPassword" class="form-control" value="${App.settings.password}">
                </div>
                <button class="btn btn-primary w-100" onclick="UI.saveSettings()">حفظ</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveSettings() {
        App.settings.companyName = document.getElementById('companyName').value;
        App.settings.username = document.getElementById('newUsername').value;
        App.settings.password = document.getElementById('newPassword').value;
        Storage.save();
        document.getElementById('settingsModal').remove();
        this.toast('تم الحفظ', 'success');
    },

    showDeveloperInfo() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'devModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">👨‍💻 المطور</div>
                    <button class="modal-close" onclick="document.getElementById('devModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="text-center">
                    <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                        <i class="fas fa-user-cog" style="font-size: 36px; color: white;"></i>
                    </div>
                    <h3>محمد أحمد فؤاد</h3>
                    <p style="color: var(--text-muted);">مطور برمجيات</p>
                    <p><i class="fas fa-phone" style="color: var(--success);"></i> 01010421571</p>
                    <p><i class="fab fa-whatsapp" style="color: #25D366;"></i> 01010421571</p>
                    <p><i class="fas fa-code"></i> الإصدار: 10.0</p>
                    <button class="btn btn-success w-100" onclick="Utils.contactDev()">
                        <i class="fab fa-whatsapp"></i> تواصل
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    },

    showBackupOptions() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'backupModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">💾 النسخ الاحتياطي</div>
                    <button class="modal-close" onclick="document.getElementById('backupModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <button class="btn btn-primary w-100 mb-2" onclick="UI.createBackup(); document.getElementById('backupModal').remove()">
                    <i class="fas fa-download"></i> إنشاء نسخة
                </button>
                <button class="btn btn-success w-100" onclick="UI.restoreBackup()">
                    <i class="fas fa-upload"></i> استعادة نسخة
                </button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    createBackup() {
        const data = JSON.stringify(App, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `نسخة_احتياطية_${Utils.formatDate(new Date()).replace(/\//g, '-')}.json`;
        a.click();
        this.toast('تم إنشاء النسخة', 'success');
    },

    restoreBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.clients) {
                        App = data;
                        Storage.save();
                        document.getElementById('backupModal')?.remove();
                        this.toast('تمت الاستعادة', 'success');
                        Router.render();
                    }
                } catch {
                    this.toast('ملف غير صالح', 'error');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }
};

// ========== أدوات مساعدة ==========
const Utils = {
    formatMoney(amt) {
        return (amt || 0).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }) + ' EGP';
    },

    formatDate(d) {
        try {
            return new Date(d).toLocaleDateString('ar-EG');
        } catch {
            return d;
        }
    },

    contactDev() {
        window.open('https://wa.me/201010421571', '_blank');
    }
};

// ========== دوال عامة ==========
function viewClient(id) {
    const c = ClientHelper.getClient(id);
    if (!c) return;
    
    const s = ClientHelper.getClientSummary(id);
    const r = ClientHelper.getRunningBalance(id).reverse();
    
    const area = document.getElementById('viewArea');
    area.innerHTML = `
        <div style="margin-bottom: 10px;">
            <button class="btn btn-ghost btn-sm" onclick="Router.navigate('clients')">
                <i class="fas fa-arrow-right"></i> عودة
            </button>
        </div>
        
        <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user"></i></div>
                <div class="stat-label">${c.name}</div>
                <div class="stat-value" style="font-size: 14px;">${c.phone || '—'}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-down" style="color: var(--success)"></i></div>
                <div class="stat-label">له</div>
                <div class="stat-value" style="color: var(--success)">${Utils.formatMoney(s.totalFor)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-up" style="color: var(--danger)"></i></div>
                <div class="stat-label">عليه</div>
                <div class="stat-value" style="color: var(--danger)">${Utils.formatMoney(s.totalAgainst)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-balance-scale"></i></div>
                <div class="stat-label">الرصيد</div>
                <div class="stat-value" style="color: ${s.balance >= 0 ? 'var(--success)' : 'var(--danger)'}">${Utils.formatMoney(Math.abs(s.balance))}</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title"><i class="fas fa-history"></i> المعاملات</div>
                <div>
                    <button class="btn btn-excel btn-sm" onclick="Excel.exportSingleClient('${c.id}')">
                        <i class="fas fa-file-excel"></i> تصدير
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="UI.showAddTransaction('${c.id}')">
                        <i class="fas fa-plus"></i> إضافة
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>التاريخ</th><th>البيان</th><th>له</th><th>عليه</th><th>الرصيد</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${r.map(t => `
                            <tr>
                                <td>${Utils.formatDate(t.date)}</td>
                                <td>${t.notes || '—'}</td>
                                <td class="text-success">${t.type === 'له' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td class="text-danger">${t.type === 'عليه' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td>${Utils.formatMoney(t.running)}</td>
                                <td>
                                    <button class="btn btn-icon btn-sm btn-danger" onclick="UI.deleteTransaction('${c.id}', '${t.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `).join('') || '<tr><td colspan="6" class="text-center">لا توجد معاملات</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

// ========== تهيئة التطبيق ==========
window.onload = () => {
    if (Auth.checkLogin()) UI.initApp();
    const theme = localStorage.getItem('theme');
    if (theme) UI.setTheme(theme);
};
</script>
