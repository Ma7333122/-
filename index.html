<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الخبير المحاسبي - النسخة النهائية v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ========== المتغيرات المحسنة بألوان مريحة ========== */
        :root {
            --primary: #2b6c94;
            --primary-dark: #1e4f6e;
            --primary-light: #4a8ab0;
            --primary-bg: rgba(43, 108, 148, 0.15);
            
            --secondary: #4a6b7a;
            --secondary-bg: rgba(74, 107, 122, 0.15);
            
            --success: #1e7e5a;
            --success-light: #2a9d7a;
            --success-bg: rgba(30, 126, 90, 0.15);
            
            --danger: #b13e3e;
            --danger-light: #c55a5a;
            --danger-bg: rgba(177, 62, 62, 0.15);
            
            --warning: #b37b2e;
            --warning-bg: rgba(179, 123, 46, 0.15);
            
            --info: #2f7c9c;
            --info-bg: rgba(47, 124, 156, 0.15);
            
            /* ألوان الخلفية - مريحة جداً للعين */
            --bg-primary: #1a242b;
            --bg-secondary: #1f2a33;
            --bg-tertiary: #25323d;
            --bg-card: #26323d;
            --bg-card-alt: #2d3a47;
            --bg-sidebar: #1e2933;
            --bg-hover: #334257;
            
            /* ألوان النصوص - متباينة بشكل مريح */
            --text-primary: #e6edf3;
            --text-secondary: #cbd5e0;
            --text-muted: #9aa9b9;
            --text-dim: #7c8b9c;
            
            --border-color: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.1);
            
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 8px var(--shadow-color);
            --shadow: 0 8px 24px var(--shadow-color);
            --shadow-lg: 0 16px 48px var(--shadow-color);
            
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 22px;
            
            --sidebar-width: 290px;
            --header-height: 80px;
            
            --font: 'Cairo', sans-serif;
            --font-mono: 'Courier New', monospace;
        }

        /* الوضع الفاتح - ألوان مريحة أيضاً */
        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e6ecf3;
            --bg-tertiary: #dde4ed;
            --bg-card: #ffffff;
            --bg-card-alt: #f5f9ff;
            --bg-sidebar: #ffffff;
            --bg-hover: #e1e8f0;
            
            --text-primary: #1e2b3c;
            --text-secondary: #2c3e50;
            --text-muted: #4a5f73;
            --text-dim: #6b7f94;
            
            --border-color: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(0, 0, 0, 0.12);
            
            --shadow-color: rgba(0, 0, 0, 0.05);
            --primary: #2b6c94;
            --primary-dark: #1e4f6e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* سكرول مخصص */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            width: 100%;
        }

        /* ========== القائمة الجانبية ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1100;
            transition: transform 0.3s ease;
            box-shadow: 2px 0 10px var(--shadow-color);
        }

        .sidebar-brand {
            padding: 30px 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .brand-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 10px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            padding: 8px 15px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 2px 5px;
            border-radius: var(--radius);
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--primary-bg);
            color: var(--primary);
            font-weight: 700;
        }

        .nav-item i {
            width: 20px;
            font-size: 16px;
        }

        .nav-badge {
            margin-right: auto;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .developer-card {
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 15px;
        }

        .dev-name {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .dev-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #25D366;
            color: white;
            padding: 10px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            width: 100%;
        }

        .dev-contact:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
        }

        .theme-toggle button {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        .theme-toggle button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: var(--header-height);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000;
        }

        .menu-toggle {
            display: none;
            width: 45px;
            height: 45px;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 20px;
        }

        .menu-toggle:hover {
            background: var(--primary);
            color: white;
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            position: relative;
            width: 260px;
        }

        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            padding: 10px 35px 10px 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 13px;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        .btn-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
        }

        /* ========== الأزرار ========== */
        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-ghost {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        /* ========== البطاقات الإحصائية ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 22px;
            transition: 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: var(--primary-bg);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            font-family: var(--font-mono);
            direction: ltr;
            display: inline-block;
        }

        .stat-change {
            font-size: 11px;
            color: var(--success);
            margin-top: 5px;
        }

        /* ========== البطاقات والجداول ========== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 25px;
            margin-bottom: 25px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th {
            padding: 15px 18px;
            text-align: right;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        tr:hover td {
            background: var(--bg-hover);
        }

        .clickable {
            cursor: pointer;
            color: var(--primary);
            font-weight: 600;
        }

        .clickable:hover {
            text-decoration: underline;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* ========== النماذج ========== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 13px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        /* ========== جدول المعاملات الديناميكي ========== */
        .transactions-table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        .transactions-table th {
            padding: 10px;
            background: var(--bg-card);
            font-size: 11px;
        }

        .transactions-table td {
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .transactions-table input,
        .transactions-table select {
            width: 100%;
            padding: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
        }

        .remove-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--danger-bg);
            color: var(--danger);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .remove-btn:hover {
            background: var(--danger);
            color: white;
        }

        .add-transaction-btn {
            background: var(--success-bg);
            color: var(--success);
            border: 1px dashed var(--success);
            padding: 10px;
            border-radius: var(--radius);
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin: 10px 0;
            transition: 0.2s;
        }

        .add-transaction-btn:hover {
            background: var(--success);
            color: white;
        }

        .summary-box {
            background: var(--bg-tertiary);
            padding: 15px;
            border-radius: var(--radius);
            margin: 15px 0;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        /* ========== النوافذ المنبثقة ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        /* ========== الإشعارات ========== */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast-item {
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 250px;
        }

        .toast-item.success { background: var(--success); }
        .toast-item.error { background: var(--danger); }
        .toast-item.info { background: var(--primary); }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ========== شاشة الدخول ========== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .login-logo {
            width: 90px;
            height: 90px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: white;
            margin: 0 auto 25px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-input:focus {
            border-color: var(--primary);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .login-button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .login-error {
            background: var(--danger-bg);
            color: var(--danger);
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        /* ========== التجاوب مع الشاشات ========== */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                transform: translateX(100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1050;
            }
            
            .sidebar-overlay.active {
                display: block;
            }
            
            .menu-toggle {
                display: flex;
            }
            
            .search-box {
                width: 180px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
            }
            
            .header-title {
                font-size: 18px;
            }
            
            .scroll-area {
                padding: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-card {
                padding: 20px;
            }
        }

        /* ========== أدوات مساعدة ========== */
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .font-mono { font-family: var(--font-mono); }
        .direction-ltr { direction: ltr; display: inline-block; }
        .w-100 { width: 100%; }
        .text-center { text-align: center; }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-crown"></i>
        </div>

<script>
// ========== تهيئة المتغيرات العامة ==========
let App = {
    clients: [],
    settings: {
        username: 'admin',
        password: 'admin123',
        theme: 'dark',
        companyName: 'شركتي'
    },
    statistics: {
        lastBackup: null,
        totalTransactions: 0
    }
};

// ========== نظام التخزين ==========
const Storage = {
    load() {
        try {
            const saved = localStorage.getItem('elite_accounting');
            if (saved) {
                const data = JSON.parse(saved);
                App.clients = data.clients || [];
                App.settings = { ...App.settings, ...(data.settings || {}) };
                App.statistics = { ...App.statistics, ...(data.statistics || {}) };
            }
        } catch (e) {
            console.error('خطأ في تحميل البيانات');
        }
        this.updateBadges();
    },

    save() {
        const data = {
            clients: App.clients,
            settings: App.settings,
            statistics: App.statistics
        };
        localStorage.setItem('elite_accounting', JSON.stringify(data));
        this.updateBadges();
    },

    updateBadges() {
        const dashboardBadge = document.getElementById('dashboardBadge');
        const clientsBadge = document.getElementById('clientsBadge');
        const transactionsBadge = document.getElementById('transactionsBadge');
        
        if (dashboardBadge) dashboardBadge.textContent = App.clients.length;
        if (clientsBadge) clientsBadge.textContent = App.clients.length;
        
        const totalTx = App.clients.reduce((sum, c) => sum + (c.transactions?.length || 0), 0);
        if (transactionsBadge) transactionsBadge.textContent = totalTx;
    }
};

// ========== دوال مساعدة للعملاء ==========
const ClientHelper = {
    getClient(id) {
        return App.clients.find(c => c.id === id);
    },

    addClient(clientData) {
        const newClient = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 6),
            name: clientData.name || '',
            phone: clientData.phone || '',
            address: clientData.address || '',
            notes: clientData.notes || '',
            transactions: [],
            createdAt: new Date().toISOString(),
            balance: 0,
            totalFor: 0,
            totalAgainst: 0
        };
        
        // إضافة المعاملات
        if (clientData.transactions && clientData.transactions.length > 0) {
            clientData.transactions.forEach(tx => {
                if (tx.amount && parseFloat(tx.amount) > 0) {
                    const amount = parseFloat(tx.amount);
                    const transaction = {
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 8),
                        type: tx.type,
                        amount: amount,
                        date: tx.date || new Date().toISOString().split('T')[0],
                        notes: tx.notes || 'رصيد افتتاحي',
                        createdAt: new Date().toISOString()
                    };
                    newClient.transactions.push(transaction);
                    
                    if (tx.type === 'له') {
                        newClient.totalFor += amount;
                    } else {
                        newClient.totalAgainst += amount;
                    }
                }
            });
        }
        
        newClient.balance = newClient.totalFor - newClient.totalAgainst;
        App.clients.push(newClient);
        Storage.save();
        return newClient;
    },

    updateClient(id, updates) {
        const client = this.getClient(id);
        if (client) {
            Object.assign(client, updates);
            Storage.save();
            return true;
        }
        return false;
    },

    deleteClient(id) {
        App.clients = App.clients.filter(c => c.id !== id);
        Storage.save();
    },

    addTransaction(clientId, transaction) {
        const client = this.getClient(clientId);
        if (!client) return false;

        const amount = parseFloat(transaction.amount) || 0;
        if (amount <= 0) return false;

        const tx = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 8),
            type: transaction.type,
            amount: amount,
            date: transaction.date || new Date().toISOString().split('T')[0],
            notes: transaction.notes || '',
            createdAt: new Date().toISOString()
        };

        client.transactions = client.transactions || [];
        client.transactions.push(tx);
        
        this.updateClientBalance(clientId);
        Storage.save();
        return true;
    },

    deleteTransaction(clientId, transactionId) {
        const client = this.getClient(clientId);
        if (!client) return false;

        client.transactions = (client.transactions || []).filter(t => t.id !== transactionId);
        this.updateClientBalance(clientId);
        Storage.save();
        return true;
    },

    updateClientBalance(clientId) {
        const client = this.getClient(clientId);
        if (!client || !client.transactions) return;

        let totalFor = 0, totalAgainst = 0;
        
        client.transactions.forEach(t => {
            const amount = parseFloat(t.amount) || 0;
            if (t.type === 'له') totalFor += amount;
            else totalAgainst += amount;
        });

        client.totalFor = totalFor;
        client.totalAgainst = totalAgainst;
        client.balance = totalFor - totalAgainst;
    },

    getClientSummary(clientId) {
        const client = this.getClient(clientId);
        if (!client) return { balance: 0, totalFor: 0, totalAgainst: 0, count: 0 };

        return {
            balance: client.balance || 0,
            totalFor: client.totalFor || 0,
            totalAgainst: client.totalAgainst || 0,
            count: client.transactions?.length || 0
        };
    },

    getRunningBalance(clientId) {
        const client = this.getClient(clientId);
        if (!client || !client.transactions) return [];

        let running = 0;
        return (client.transactions || [])
            .slice()
            .sort((a, b) => new Date(a.date) - new Date(b.date) || a.createdAt.localeCompare(b.createdAt))
            .map(t => {
                const amount = parseFloat(t.amount) || 0;
                if (t.type === 'له') running += amount;
                else running -= amount;
                return { ...t, running };
            });
    },

    getAllTransactions() {
        const transactions = [];
        App.clients.forEach(client => {
            (client.transactions || []).forEach(tx => {
                transactions.push({
                    ...tx,
                    clientName: client.name,
                    clientId: client.id,
                    clientPhone: client.phone
                });
            });
        });
        return transactions.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt.localeCompare(a.createdAt));
    },

    getStatistics() {
        const stats = {
            totalClients: App.clients.length,
            totalTransactions: 0,
            totalFor: 0,
            totalAgainst: 0,
            netBalance: 0,
            debtors: 0,
            creditors: 0
        };

        App.clients.forEach(client => {
            const summary = this.getClientSummary(client.id);
            stats.totalTransactions += summary.count;
            stats.totalFor += summary.totalFor;
            stats.totalAgainst += summary.totalAgainst;
            if (summary.balance > 0) stats.creditors++;
            else if (summary.balance < 0) stats.debtors++;
        });

        stats.netBalance = stats.totalFor - stats.totalAgainst;
        return stats;
    }
};

// ========== نظام المصادقة ==========
const Auth = {
    checkLogin() {
        return sessionStorage.getItem('logged_in') === 'true';
    },

    login(event) {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (username === App.settings.username && password === App.settings.password) {
            sessionStorage.setItem('logged_in', 'true');
            UI.initApp();
            UI.toast('مرحباً بك في النظام', 'success');
        } else {
            const errorEl = document.getElementById('loginError');
            errorEl.style.display = 'block';
            errorEl.textContent = 'بيانات الدخول غير صحيحة';
            setTimeout(() => errorEl.style.display = 'none', 3000);
        }
    },

    logout() {
        if (confirm('تسجيل الخروج؟')) {
            sessionStorage.removeItem('logged_in');
            location.reload();
        }
    }
};

// ========== نظام التوجيه ==========
const Router = {
    currentView: 'dashboard',

    navigate(view, params = null) {
        this.currentView = view;
        this.params = params;
        
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        const navItem = document.getElementById(`nav-${view}`);
        if (navItem) navItem.classList.add('active');
        
        if (window.innerWidth <= 1024) UI.toggleSidebar(false);
        this.render();
    },

    render() {
        const area = document.getElementById('viewArea');
        const title = document.getElementById('viewTitle');
        if (!area) return;
        
        area.innerHTML = '';
        
        const titles = {
            'dashboard': 'لوحة التحكم',
            'clients': 'العملاء',
            'transactions': 'المعاملات',
            'reports': 'التقارير'
        };
        
        title.textContent = titles[this.currentView] || 'الخبير المحاسبي';
        
        switch(this.currentView) {
            case 'dashboard':
                Views.dashboard(area);
                break;
            case 'clients':
                Views.clients(area);
                break;
            case 'transactions':
                Views.transactions(area);
                break;
            case 'reports':
                Views.reports(area);
                break;
            default:
                Views.dashboard(area);
        }
    }
};

// ========== نظام العرض ==========
const Views = {
    dashboard(area) {
        const stats = ClientHelper.getStatistics();

        area.innerHTML = `

                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-label">إجمالي العملاء</div>
                    <div class="stat-value">${stats.totalClients.toLocaleString('en-US')}</div>
                    <div class="stat-change">عميل نشط</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-arrow-down" style="color: var(--success)"></i></div>
                    <div class="stat-label">إجمالي (له)</div>
                    <div class="stat-value">${Utils.formatMoney(stats.totalFor)}</div>
                    <div class="stat-change" style="color: var(--success)">دائن</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-arrow-up" style="color: var(--danger)"></i></div>
                    <div class="stat-label">إجمالي (عليه)</div>
                    <div class="stat-value">${Utils.formatMoney(stats.totalAgainst)}</div>
                    <div class="stat-change" style="color: var(--danger)">مدين</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-balance-scale"></i></div>
                    <div class="stat-label">صافي الرصيد</div>
                    <div class="stat-value">${Utils.formatMoney(stats.netBalance)}</div>
                    <div class="stat-change">${stats.netBalance >= 0 ? 'دائن' : 'مدين'}</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-exclamation-triangle" style="color: var(--danger)"></i> أكبر المديونيات</div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>العميل</th><th>المبلغ</th><th></th></tr></thead>
                            <tbody>
                                ${App.clients
                                    .map(c => ({ ...c, summary: ClientHelper.getClientSummary(c.id) }))
                                    .filter(c => c.summary.balance < 0)

                                            <td class="text-danger font-mono">${Utils.formatMoney(Math.abs(c.summary.balance))}</td>
                                            <td><span class="badge badge-danger">مدين</span></td>

                                }
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-gem" style="color: var(--success)"></i> أكبر الدائنين</div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>العميل</th><th>المبلغ</th><th></th></tr></thead>
                            <tbody>
                                ${App.clients
                                    .map(c => ({ ...c, summary: ClientHelper.getClientSummary(c.id) }))
                                    .filter(c => c.summary.balance > 0)
                                    .sort((a, b) => b.summary.balance - a.summary.balance)
                                    .slice(0, 5)
                                    .map(c => `
                                        <tr>
                                            <td class="clickable" onclick="Router.navigate('clients'); viewClient('${c.id}')">${c.name}</td>
                                            <td class="text-success font-mono">${Utils.formatMoney(c.summary.balance)}</td>
                                            <td><span class="badge badge-success">دائن</span></td>
                                        </tr>
                                    `).join('') || '<tr><td colspan="3" class="text-center">لا توجد بيانات</td></tr>'
                                }
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-history"></i> آخر المعاملات</div>
                </div>

                        </tbody>

    clients(area) {

const Excel = {
    formatWorksheet(ws) {
        if (!ws['!ref']) return;
        const range = XLSX.utils.decode_range(ws['!ref']);
        for (let R = range.s.r; R <= range.e.r; ++R) {
            for (let C = range.s.c; C <= range.e.c; ++C) {
                const cell = ws[XLSX.utils.encode_cell({ r: R, c: C })];
                if (cell && cell.t === 'n') {
                    cell.z = '#,##0.00 ج.م';
                }
            }
        }
    },

    exportFullReport() {
        const wb = XLSX.utils.book_new();
        const date = Utils.formatDate(new Date()).replace(/\//g, '-');
        const company = App.settings.companyName || 'الخبير المحاسبي';
        
        // ملخص العملاء
        const summaryData = [
            [company], ['تقرير ملخص العملاء'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'الاسم', 'الهاتف', 'المعاملات', 'له', 'عليه', 'الرصيد', 'الحالة']
        ];
        
        App.clients.forEach((client, index) => {
            const s = ClientHelper.getClientSummary(client.id);
            summaryData.push([
                index + 1, client.name, client.phone || '—', s.count,
                s.totalFor, s.totalAgainst, s.balance,
                s.balance > 0 ? 'دائن' : s.balance < 0 ? 'مدين' : 'متوازن'
            ]);
        });
        
        const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
        this.formatWorksheet(wsSummary);
        XLSX.utils.book_append_sheet(wb, wsSummary, 'ملخص العملاء');
        
        // جميع المعاملات
        const txData = [
            [company], ['تقرير جميع المعاملات'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'التاريخ', 'العميل', 'النوع', 'المبلغ', 'البيان']
        ];
        
        ClientHelper.getAllTransactions().forEach((tx, index) => {
            txData.push([
                index + 1, tx.date, tx.clientName, tx.type, tx.amount, tx.notes || '—'
            ]);
        });
        
        const wsTx = XLSX.utils.aoa_to_sheet(txData);
        this.formatWorksheet(wsTx);
        XLSX.utils.book_append_sheet(wb, wsTx, 'المعاملات');
        
        XLSX.writeFile(wb, `تقرير_شامل_${date}.xlsx`);
        UI.toast('تم تصدير التقرير', 'success');
    },

    exportClientSummary() {
        const data = [[App.settings.companyName], ['ملخص العملاء'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'الاسم', 'الهاتف', 'له', 'عليه', 'الرصيد', 'الحالة']];
        
        App.clients.forEach((c, i) => {
            const s = ClientHelper.getClientSummary(c.id);
            data.push([i + 1, c.name, c.phone || '—', s.totalFor, s.totalAgainst, s.balance,
                s.balance > 0 ? 'دائن' : s.balance < 0 ? 'مدين' : 'متوازن']);
        });
        
        const ws = XLSX.utils.aoa_to_sheet(data);
        this.formatWorksheet(ws);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'ملخص العملاء');
        XLSX.writeFile(wb, `ملخص_العملاء_${Utils.formatDate(new Date()).replace(/\//g, '-')}.xlsx`);
        UI.toast('تم تصدير الملخص', 'success');
    },

    exportAllTransactions() {
        const txs = ClientHelper.getAllTransactions();
        const data = [[App.settings.companyName], ['جميع المعاملات'], [`تاريخ: ${Utils.formatDate(new Date())}`], [],
            ['م', 'التاريخ', 'العميل', 'النوع', 'المبلغ', 'البيان']];
        
        txs.forEach((tx, i) => {
            data.push([i + 1, tx.date, tx.clientName, tx.type, tx.amount, tx.notes || '—']);
        });
        
        const ws = XLSX.utils.aoa_to_sheet(data);

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'المعاملات');
        XLSX.writeFile(wb, `جميع_المعاملات_${Utils.formatDate(new Date()).replace(/\//g, '-')}.xlsx`);
        UI.toast('تم تصدير المعاملات', 'success');

    showExportOptions() {
        const modal = document.createElement('div');

                <button class="btn btn-primary w-100" onclick="UI.updateClient('${clientId}')">تحديث</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    updateClient(clientId) {
        ClientHelper.updateClient(clientId, {
            name: document.getElementById('editName').value,
            phone: document.getElementById('editPhone').value,
            address: document.getElementById('editAddress').value,
            notes: document.getElementById('editNotes').value
        });
        document.getElementById('editClientModal').remove();
        this.toast('تم التحديث', 'success');
        Router.render();
    },

    deleteClient(clientId) {
        if (confirm('حذف العميل نهائياً؟')) {
            ClientHelper.deleteClient(clientId);
            this.toast('تم الحذف', 'success');
            Router.render();
        }
    },

    deleteTransaction(clientId, txId) {
        if (confirm('حذف المعاملة؟')) {
            ClientHelper.deleteTransaction(clientId, txId);
            this.toast('تم الحذف', 'success');
            Router.render();
        }
    },

    showSettings() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'settingsModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">⚙️ الإعدادات</div>
                    <button class="modal-close" onclick="document.getElementById('settingsModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group">
                    <label class="form-label">اسم الشركة</label>
                    <input type="text" id="companyName" class="form-control" value="${App.settings.companyName}">
                </div>
                <div class="form-group">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" id="newUsername" class="form-control" value="${App.settings.username}">
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="text" id="newPassword" class="form-control" value="${App.settings.password}">
                </div>
                <button class="btn btn-primary w-100" onclick="UI.saveSettings()">حفظ</button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    saveSettings() {
        App.settings.companyName = document.getElementById('companyName').value;
        App.settings.username = document.getElementById('newUsername').value;
        App.settings.password = document.getElementById('newPassword').value;
        Storage.save();
        document.getElementById('settingsModal').remove();
        this.toast('تم حفظ الإعدادات', 'success');
    },

    showDeveloperInfo() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'devModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">👨‍💻 المطور</div>
                    <button class="modal-close" onclick="document.getElementById('devModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <div class="text-center">
                    <div style="width: 90px; height: 90px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                        <i class="fas fa-user-cog" style="font-size: 45px; color: white;"></i>
                    </div>
                    <h3>محمد أحمد فؤاد</h3>
                    <p style="color: var(--text-muted); margin: 10px 0;">مطور برمجيات</p>
                    <p><i class="fas fa-phone" style="color: var(--success);"></i> 01010421571</p>
                    <p><i class="fab fa-whatsapp" style="color: #25D366;"></i> 01010421571</p>
                    <p><i class="fas fa-code"></i> الإصدار: 10.0</p>
                    <button class="btn btn-success w-100 mt-3" onclick="Utils.contactDev()">
                        <i class="fab fa-whatsapp"></i> تواصل عبر واتساب
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    },

    showBackupOptions() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.id = 'backupModal';
        modal.innerHTML = `
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title">💾 النسخ الاحتياطي</div>
                    <button class="modal-close" onclick="document.getElementById('backupModal').remove()"><i class="fas fa-times"></i></button>
                </div>
                <button class="btn btn-primary w-100 mb-2" onclick="UI.createBackup(); document.getElementById('backupModal').remove()">
                    <i class="fas fa-download"></i> إنشاء نسخة
                </button>
                <button class="btn btn-success w-100 mb-2" onclick="UI.restoreBackup()">
                    <i class="fas fa-upload"></i> استعادة نسخة
                </button>
                <button class="btn btn-danger w-100" onclick="UI.resetData(); document.getElementById('backupModal').remove()">
                    <i class="fas fa-trash"></i> إعادة تعيين
                </button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    createBackup() {
        const data = JSON.stringify(App, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `نسخة_احتياطية_${Utils.formatDate(new Date()).replace(/\//g, '-')}.json`;
        a.click();
        App.statistics.lastBackup = new Date().toISOString();
        Storage.save();
        this.toast('تم إنشاء النسخة', 'success');
    },

    restoreBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.clients) {
                        App = data;
                        Storage.save();
                        document.getElementById('backupModal')?.remove();
                        this.toast('تمت الاستعادة', 'success');
                        Router.render();
                    }
                } catch {
                    this.toast('ملف غير صالح', 'error');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    },

    resetData() {
        if (confirm('⚠️ حذف كل البيانات نهائياً؟')) {
            App.clients = [];
            App.settings = {
                username: 'admin',
                password: 'admin123',
                theme: 'dark',
                companyName: 'شركتي'
            };
            App.statistics = { lastBackup: null, totalTransactions: 0 };
            Storage.save();
            this.toast('تم إعادة التعيين', 'success');
            Router.render();
        }
    }
};

// ========== دوال مساعدة عامة ==========
const Utils = {
    formatMoney(amount) {
        return parseFloat(amount || 0).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }) + ' EGP';
    },

    formatDate(date) {
        try {
            return new Date(date).toLocaleDateString('ar-EG');
        } catch {
            return date;
        }
    },

    contactDev() {
        window.open('https://wa.me/201010421571', '_blank');
    }
};

// ========== دوال عامة للاستخدام في HTML ==========
function viewClient(clientId) {
    const client = ClientHelper.getClient(clientId);
    if (!client) return;
    
    const summary = ClientHelper.getClientSummary(clientId);
    const running = ClientHelper.getRunningBalance(clientId).reverse();
    
    const area = document.getElementById('viewArea');
    area.innerHTML = `
        <div style="margin-bottom: 15px;">
            <button class="btn btn-ghost btn-sm" onclick="Router.navigate('clients')">
                <i class="fas fa-arrow-right"></i> عودة
            </button>
        </div>
        
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user"></i></div>
                <div class="stat-label">${client.name}</div>
                <div class="stat-value" style="font-size: 16px;">${client.phone || 'لا يوجد رقم'}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-down" style="color: var(--success)"></i></div>
                <div class="stat-label">له</div>
                <div class="stat-value" style="color: var(--success)">${Utils.formatMoney(summary.totalFor)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-up" style="color: var(--danger)"></i></div>
                <div class="stat-label">عليه</div>
                <div class="stat-value" style="color: var(--danger)">${Utils.formatMoney(summary.totalAgainst)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-balance-scale"></i></div>
                <div class="stat-label">الرصيد</div>
                <div class="stat-value" style="color: ${summary.balance >= 0 ? 'var(--success)' : 'var(--danger)'}">${Utils.formatMoney(Math.abs(summary.balance))}</div>
                <div class="stat-change">${summary.balance >= 0 ? 'دائن' : 'مدين'}</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title"><i class="fas fa-history"></i> سجل المعاملات</div>
                <button class="btn btn-primary btn-sm" onclick="UI.showAddTransaction('${client.id}')">
                    <i class="fas fa-plus"></i> إضافة معاملة
                </button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>التاريخ</th><th>البيان</th><th>له</th><th>عليه</th><th>الرصيد</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${running.map(t => `
                            <tr>
                                <td>${Utils.formatDate(t.date)}</td>
                                <td>${t.notes || '—'}</td>
                                <td class="text-success font-mono">${t.type === 'له' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td class="text-danger font-mono">${t.type === 'عليه' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td class="font-mono">${Utils.formatMoney(t.running)}</td>
                                <td>
                                    <button class="btn btn-icon btn-sm btn-danger" onclick="UI.deleteTransaction('${client.id}', '${t.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `).join('') || '<tr><td colspan="6" class="text-center">لا توجد معاملات</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

// ========== تهيئة التطبيق ==========
window.onload = () => {
    if (Auth.checkLogin()) {
        UI.initApp();
    }
    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) UI.setTheme(savedTheme);
};
</script>
