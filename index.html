<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الخبير المحاسبي - النسخة النهائية v10.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* ========== المتغيرات المحسنة بألوان ثقيلة وواضحة ========== */
        :root {
            --primary: #1a4b7a;
            --primary-dark: #0e3252;
            --primary-light: #2d6ba0;
            --primary-bg: rgba(26, 75, 122, 0.2);
            
            --secondary: #2c3e50;
            --secondary-bg: rgba(44, 62, 80, 0.2);
            
            --success: #0f6b4a;
            --success-light: #1a8f63;
            --success-bg: rgba(15, 107, 74, 0.2);
            
            --danger: #a13131;
            --danger-light: #c44545;
            --danger-bg: rgba(161, 49, 49, 0.2);
            
            --warning: #b36b1e;
            --warning-bg: rgba(179, 107, 30, 0.2);
            
            --info: #1e6b8a;
            --info-bg: rgba(30, 107, 138, 0.2);
            
            --bg-primary: #0f1a24;
            --bg-secondary: #16232e;
            --bg-tertiary: #1e2d3a;
            --bg-card: #1f2f3d;
            --bg-card-alt: #263947;
            --bg-sidebar: #16232e;
            --bg-hover: #2a3f50;
            --bg-highlight: #2d4457;
            
            --text-primary: #ffffff;
            --text-secondary: #e9ecef;
            --text-muted: #cbd5e0;
            --text-dim: #a0b3c9;
            
            --number-positive: #2ecc71;
            --number-negative: #e74c3c;
            --number-neutral: #f1c40f;
            --number-default: #ffffff;
            
            --border-color: rgba(255, 255, 255, 0.15);
            --border-hover: rgba(255, 255, 255, 0.25);
            --border-focus: var(--primary-light);
            
            --shadow-color: rgba(0, 0, 0, 0.5);
            --shadow-sm: 0 4px 12px var(--shadow-color);
            --shadow: 0 8px 24px var(--shadow-color);
            --shadow-lg: 0 16px 48px var(--shadow-color);
            
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 22px;
            
            --sidebar-width: 290px;
            --header-height: 80px;
            
            --font: 'Cairo', sans-serif;
            --font-mono: 'Courier New', 'Consolas', monospace;
            --font-number: 'Courier New', 'Consolas', monospace;
        }

        [data-theme="light"] {
            --bg-primary: #e8f0fe;
            --bg-secondary: #d8e4f5;
            --bg-tertiary: #c9d9f0;
            --bg-card: #ffffff;
            --bg-card-alt: #f5faff;
            --bg-sidebar: #ffffff;
            --bg-hover: #e1eaf5;
            --bg-highlight: #d1def0;
            
            --text-primary: #0a1a2a;
            --text-secondary: #1f2e42;
            --text-muted: #2e405b;
            --text-dim: #3f5575;
            
            --border-color: rgba(0, 0, 0, 0.15);
            --border-hover: rgba(0, 0, 0, 0.25);
            
            --shadow-color: rgba(0, 0, 0, 0.1);
            --primary: #1a4b7a;
            --primary-dark: #0e3252;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
            font-weight: 500;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; border: 2px solid var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
            width: 100%;
        }

        /* ========== القائمة الجانبية ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-left: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 1100;
            transition: transform 0.3s ease;
            box-shadow: 4px 0 20px var(--shadow-color);
        }

        .sidebar-brand {
            padding: 30px 25px;
            border-bottom: 2px solid var(--border-color);
            background: var(--bg-tertiary);
        }

        .brand-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .brand-sub {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 10px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 25px;
        }

        .nav-section-title {
            padding: 8px 15px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 15px;
            margin: 4px 5px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-hover);
            transform: translateX(-3px);
        }

        .nav-item.active {
            background: var(--primary-bg);
            color: var(--primary);
            border: 1px solid var(--primary);
            font-weight: 800;
        }

        .nav-item i {
            width: 24px;
            font-size: 18px;
            text-align: center;
        }

        .nav-badge {
            margin-right: auto;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 2px solid var(--border-color);
            background: var(--bg-tertiary);
        }

        .developer-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .dev-name {
            font-weight: 800;
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .dev-contact {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            width: 100%;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        .dev-contact:hover {
            opacity: 0.95;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }

        .theme-toggle span {
            font-weight: 700;
            color: var(--text-muted);
        }

        .theme-toggle button {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card-alt);
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
        }

        .theme-toggle button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ========== المحتوى الرئيسي ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: var(--header-height);
            background: var(--bg-card);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 1000;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .menu-toggle {
            display: none;
            width: 45px;
            height: 45px;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 20px;
            border: 1px solid var(--border-color);
        }

        .menu-toggle:hover {
            background: var(--primary);
            color: white;
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            position: relative;
            width: 280px;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px var(--primary-bg);
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: rotate(180deg);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            border: 2px solid transparent;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-excel {
            background: #1e6f3f;
            color: white;
        }

        .btn-excel:hover {
            background: #155a32;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 25px;
            transition: 0.2s;
            box-shadow: var(--shadow);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-bg);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 15px;
            border: 1px solid var(--primary);
        }

        .card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .card-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th {
            padding: 18px 20px;
            text-align: right;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            font-weight: 600;
        }

        .text-success { color: var(--number-positive) !important; }
        .text-danger { color: var(--number-negative) !important; }
        .font-mono { font-family: var(--font-number) !important; }
        .direction-ltr { direction: ltr; display: inline-block; }
        .w-100 { width: 100%; }
        .text-center { text-align: center; }
        .mt-3 { margin-top: 15px; }
        .mb-2 { margin-bottom: 10px; }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-container" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-primary); padding:20px;">
    <div class="login-card" style="background:var(--bg-card); border-radius:var(--radius-lg); padding:45px; width:100%; max-width:420px; border:2px solid var(--border-color); box-shadow:var(--shadow-lg);">
        <div class="login-logo" style="width:100px; height:100px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:50px; color:white; margin:0 auto 25px; border:3px solid var(--border-color); box-shadow:var(--shadow);">
            <i class="fas fa-crown"></i>
        </div>
        <h1 class="login-title" style="font-size:32px; font-weight:900; text-align:center; margin-bottom:30px; color:var(--primary); text-shadow:0 2px 4px rgba(0,0,0,0.3);">الخبير المحاسبي</h1>
        <div id="loginError" class="login-error" style="background:var(--danger-bg); color:var(--danger); padding:15px; border-radius:50px; text-align:center; margin-bottom:15px; border:2px solid var(--danger); font-weight:700; display:none;"></div>
        <form onsubmit="Auth.login(event)">
            <input type="text" id="username" class="login-input" placeholder="اسم المستخدم" value="admin" autofocus style="width:100%; padding:16px 20px; background:var(--bg-tertiary); border:2px solid var(--border-color); border-radius:50px; color:var(--text-primary); margin-bottom:15px; font-size:15px; font-weight:600;">
            <input type="password" id="password" class="login-input" placeholder="كلمة المرور" value="admin123" style="width:100%; padding:16px 20px; background:var(--bg-tertiary); border:2px solid var(--border-color); border-radius:50px; color:var(--text-primary); margin-bottom:15px; font-size:15px; font-weight:600;">
            <button type="submit" class="login-button" style="width:100%; padding:16px; background:var(--primary); color:white; border:none; border-radius:50px; font-weight:800; font-size:18px; cursor:pointer; transition:0.2s; margin-top:15px; border:2px solid transparent; box-shadow:0 4px 10px rgba(0,0,0,0.3);">
                <i class="fas fa-lock-open"></i> دخول آمن
            </button>
        </form>
        <div class="text-center" style="margin-top:20px; color:var(--text-muted); font-weight:600;">
            <i class="fas fa-code"></i> مطور: محمد أحمد فؤاد | 
            <i class="fab fa-whatsapp"></i> 01010421571
        </div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp" class="app-container" style="display: none;">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="UI.toggleSidebar(false)" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1050; backdrop-filter:blur(4px);"></div>

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-title">الخبير المحاسبي</div>
            <div class="brand-sub">نسخة احترافية v10.0</div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">القائمة الرئيسية</div>
                <div class="nav-item" id="nav-dashboard" onclick="Router.navigate('dashboard')">
                    <i class="fas fa-home"></i> لوحة التحكم
                    <span class="nav-badge" id="dashboardBadge">0</span>
                </div>
                <div class="nav-item" id="nav-clients" onclick="Router.navigate('clients')">
                    <i class="fas fa-users"></i> العملاء
                    <span class="nav-badge" id="clientsBadge">0</span>
                </div>
                <div class="nav-item" id="nav-transactions" onclick="Router.navigate('transactions')">
                    <i class="fas fa-exchange-alt"></i> المعاملات
                    <span class="nav-badge" id="transactionsBadge">0</span>
                </div>
                <div class="nav-item" id="nav-reports" onclick="Router.navigate('reports')">
                    <i class="fas fa-chart-pie"></i> التقارير
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">الإضافات</div>
                <div class="nav-item" onclick="Excel.showExportOptions()">
                    <i class="fas fa-file-excel" style="color: #1e6f3f;"></i> تصدير إكسل متقدم
                </div>
                <div class="nav-item" onclick="UI.showBackupOptions()">
                    <i class="fas fa-database"></i> نسخ احتياطي
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">الإعدادات</div>
                <div class="nav-item" onclick="UI.showSettings()">
                    <i class="fas fa-cog"></i> إعدادات النظام
                </div>
                <div class="nav-item" onclick="UI.showDeveloperInfo()">
                    <i class="fas fa-info-circle"></i> معلومات المطور
                </div>
                <div class="nav-item" onclick="Auth.logout()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </div>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="developer-card">
                <div class="dev-name">
                    <i class="fas fa-user-cog"></i> محمد أحمد فؤاد
                </div>
                <button class="dev-contact" onclick="Utils.contactDev()">
                    <i class="fab fa-whatsapp"></i> 01010421571
                </button>
            </div>
            <div class="theme-toggle">
                <span>الوضع</span>
                <div style="display: flex; gap: 5px;">
                    <button onclick="UI.setTheme('dark')" id="themeDarkBtn" class="active">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button onclick="UI.setTheme('light')" id="themeLightBtn">
                        <i class="fas fa-sun"></i>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- المحتوى الرئيسي -->
    <main class="main-content">
        <header class="header no-print">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="menu-toggle" onclick="UI.toggleSidebar(true)">
                    <i class="fas fa-bars"></i>
                </div>
                <h2 class="header-title" id="viewTitle">لوحة التحكم</h2>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="globalSearch" placeholder="بحث..." onkeyup="UI.handleGlobalSearch()">
                </div>
                <button class="btn-icon" onclick="UI.refresh()" title="تحديث">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <div class="scroll-area" id="viewArea"></div>
    </main>
</div>

<!-- حاوية الإشعارات -->
<div class="toast-container" id="toastContainer" style="position:fixed; bottom:25px; left:25px; z-index:10000; display:flex; flex-direction:column; gap:12px;"></div>

<script>
// ========== تهيئة المتغيرات العامة ==========
let App = {
    clients: [],
    settings: {
        username: 'admin',
        password: 'admin123',
        theme: 'dark',
        companyName: 'شركتي'
    },
    statistics: {
        lastBackup: null,
        totalTransactions: 0
    }
};

// ========== نظام التخزين ==========
const Storage = {
    load() {
        try {
            const saved = localStorage.getItem('elite_accounting_v10');
            if (saved) {
                const data = JSON.parse(saved);
                App.clients = data.clients || [];
                App.settings = { ...App.settings, ...(data.settings || {}) };
                App.statistics = { ...App.statistics, ...(data.statistics || {}) };
            }
        } catch (e) {
            console.error('خطأ في تحميل البيانات');
        }
        this.updateBadges();
    },

    save() {
        const data = {
            clients: App.clients,
            settings: App.settings,
            statistics: App.statistics
        };
        localStorage.setItem('elite_accounting_v10', JSON.stringify(data));
        this.updateBadges();
    },

    updateBadges() {
        const dashboardBadge = document.getElementById('dashboardBadge');
        const clientsBadge = document.getElementById('clientsBadge');
        const transactionsBadge = document.getElementById('transactionsBadge');
        
        if (dashboardBadge) dashboardBadge.textContent = App.clients.length;
        if (clientsBadge) clientsBadge.textContent = App.clients.length;
        
        const totalTx = App.clients.reduce((sum, c) => sum + (c.transactions?.length || 0), 0);
        if (transactionsBadge) transactionsBadge.textContent = totalTx;
    }
};

// ========== دوال مساعدة للعملاء ==========
const ClientHelper = {
    getClient(id) {
        return App.clients.find(c => c.id === id);
    },

    addClient(clientData) {
        const newClient = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 6),
            name: clientData.name || '',
            phone: clientData.phone || '',
            address: clientData.address || '',
            notes: clientData.notes || '',
            transactions: [],
            createdAt: new Date().toISOString(),
            balance: 0,
            totalFor: 0,
            totalAgainst: 0
        };
        
        if (clientData.transactions && clientData.transactions.length > 0) {
            clientData.transactions.forEach(tx => {
                if (tx.amount && parseFloat(tx.amount) > 0) {
                    const amount = parseFloat(tx.amount);
                    const transaction = {
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 8),
                        type: tx.type,
                        amount: amount,
                        date: tx.date || new Date().toISOString().split('T')[0],
                        notes: tx.notes || 'رصيد افتتاحي',
                        createdAt: new Date().toISOString()
                    };
                    newClient.transactions.push(transaction);
                    
                    if (tx.type === 'له') {
                        newClient.totalFor += amount;
                    } else {
                        newClient.totalAgainst += amount;
                    }
                }
            });
        }
        
        newClient.balance = newClient.totalFor - newClient.totalAgainst;
        App.clients.push(newClient);
        Storage.save();
        return newClient;
    },

    updateClient(id, updates) {
        const client = this.getClient(id);
        if (client) {
            Object.assign(client, updates);
            Storage.save();
            return true;
        }
        return false;
    },

    deleteClient(id) {
        App.clients = App.clients.filter(c => c.id !== id);
        Storage.save();
    },

    addTransaction(clientId, transaction) {
        const client = this.getClient(clientId);
        if (!client) return false;

        const amount = parseFloat(transaction.amount) || 0;
        if (amount <= 0) return false;

        const tx = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 8),
            type: transaction.type,
            amount: amount,
            date: transaction.date || new Date().toISOString().split('T')[0],
            notes: transaction.notes || '',
            createdAt: new Date().toISOString()
        };

        client.transactions = client.transactions || [];
        client.transactions.push(tx);
        
        this.updateClientBalance(clientId);
        Storage.save();
        return true;
    },

    deleteTransaction(clientId, transactionId) {
        const client = this.getClient(clientId);
        if (!client) return false;

        client.transactions = (client.transactions || []).filter(t => t.id !== transactionId);
        this.updateClientBalance(clientId);
        Storage.save();
        return true;
    },

    updateClientBalance(clientId) {
        const client = this.getClient(clientId);
        if (!client || !client.transactions) return;

        let totalFor = 0, totalAgainst = 0;
        
        client.transactions.forEach(t => {
            const amount = parseFloat(t.amount) || 0;
            if (t.type === 'له') totalFor += amount;
            else totalAgainst += amount;
        });

        client.totalFor = totalFor;
        client.totalAgainst = totalAgainst;
        client.balance = totalFor - totalAgainst;
    },

    getClientSummary(clientId) {
        const client = this.getClient(clientId);
        if (!client) return { balance: 0, totalFor: 0, totalAgainst: 0, count: 0 };

        return {
            balance: client.balance || 0,
            totalFor: client.totalFor || 0,
            totalAgainst: client.totalAgainst || 0,
            count: client.transactions?.length || 0
        };
    },

    getRunningBalance(clientId) {
        const client = this.getClient(clientId);
        if (!client || !client.transactions) return [];

        let running = 0;
        return (client.transactions || [])
            .slice()
            .sort((a, b) => new Date(a.date) - new Date(b.date) || a.createdAt.localeCompare(b.createdAt))
            .map(t => {
                const amount = parseFloat(t.amount) || 0;
                if (t.type === 'له') running += amount;
                else running -= amount;
                return { ...t, running };
            });
    },

    getAllTransactions() {
        const transactions = [];
        App.clients.forEach(client => {
            (client.transactions || []).forEach(tx => {
                transactions.push({
                    ...tx,
                    clientName: client.name,
                    clientId: client.id,
                    clientPhone: client.phone,
                    clientAddress: client.address
                });
            });
        });
        return transactions.sort((a, b) => new Date(b.date) - new Date(a.date) || b.createdAt.localeCompare(a.createdAt));
    },

    getStatistics() {
        const stats = {
            totalClients: App.clients.length,
            totalTransactions: 0,
            totalFor: 0,
            totalAgainst: 0,
            netBalance: 0,
            debtors: 0,
            creditors: 0
        };

        App.clients.forEach(client => {
            const summary = this.getClientSummary(client.id);
            stats.totalTransactions += summary.count;
            stats.totalFor += summary.totalFor;
            stats.totalAgainst += summary.totalAgainst;
            if (summary.balance > 0) stats.creditors++;
            else if (summary.balance < 0) stats.debtors++;
        });

        stats.netBalance = stats.totalFor - stats.totalAgainst;
        return stats;
    }
};

// ========== نظام التصدير المتطور لإكسل ==========
const Excel = {
    // تنسيق الخلايا
    formatCell(cell, value, isNumber = false) {
        if (isNumber) {
            cell.t = 'n';
            cell.v = value;
            cell.z = '#,##0.00 "ج.م"';
        } else {
            cell.t = 's';
            cell.v = value;
        }
        return cell;
    },

    // إنشاء ترويسة جذابة
    createHeader(ws, title, company, date, startRow = 0) {
        // شعار الشركة والنص الرئيسي
        XLSX.utils.sheet_add_aoa(ws, [[company]], { origin: `A${startRow + 1}` });
        XLSX.utils.sheet_add_aoa(ws, [[title]], { origin: `A${startRow + 2}` });
        XLSX.utils.sheet_add_aoa(ws, [[`تاريخ التقرير: ${date}`]], { origin: `A${startRow + 3}` });
        
        // تنسيق العناوين
        for (let i = 1; i <= 3; i++) {
            const cell = ws[`A${startRow + i}`];
            if (cell) {
                cell.s = {
                    font: { bold: true, sz: i === 1 ? 18 : i === 2 ? 16 : 12, color: { rgb: i === 1 ? "1A4B7A" : "2C3E50" } },
                    alignment: { horizontal: "right", vertical: "center" }
                };
            }
        }
        
        // سطر فارغ
        XLSX.utils.sheet_add_aoa(ws, [[]], { origin: `A${startRow + 4}` });
        
        return startRow + 5;
    },

    // إنشاء ملخص العميل
    createClientSummary(ws, client, startRow) {
        const summary = ClientHelper.getClientSummary(client.id);
        const running = ClientHelper.getRunningBalance(client.id);
        
        // معلومات العميل
        XLSX.utils.sheet_add_aoa(ws, [["معلومات العميل"]], { origin: `A${startRow}` });
        XLSX.utils.sheet_add_aoa(ws, [
            ["الاسم", client.name],
            ["رقم الهاتف", client.phone || '—'],
            ["العنوان", client.address || '—'],
            ["ملاحظات", client.notes || '—']
        ], { origin: `A${startRow + 1}` });
        
        // تنسيق عنوان معلومات العميل
        const titleCell = ws[`A${startRow}`];
        if (titleCell) {
            titleCell.s = { font: { bold: true, sz: 14, color: { rgb: "1A4B7A" } } };
        }
        
        // ملخص الحساب
        const summaryRow = startRow + 6;
        XLSX.utils.sheet_add_aoa(ws, [["ملخص الحساب"]], { origin: `A${summaryRow}` });
        XLSX.utils.sheet_add_aoa(ws, [
            ["إجمالي له", "إجمالي عليه", "الرصيد", "عدد المعاملات"]
        ], { origin: `A${summaryRow + 1}` });
        
        // الأرقام مع التنسيق
        XLSX.utils.sheet_add_aoa(ws, [[
            summary.totalFor,
            summary.totalAgainst,
            summary.balance,
            summary.count
        ]], { origin: `A${summaryRow + 2}` });
        
        // تنسيق الأرقام
        for (let i = 0; i < 3; i++) {
            const cell = ws[String.fromCharCode(65 + i) + (summaryRow + 2)];
            if (cell) {
                cell.z = '#,##0.00 "ج.م"';
                cell.s = { font: { bold: true, color: { rgb: i === 0 ? "2ECC71" : i === 1 ? "E74C3C" : i === 2 ? (summary.balance >= 0 ? "2ECC71" : "E74C3C") : "000000" } } };
            }
        }
        
        return summaryRow + 4;
    },

    // إنشاء جدول المعاملات
    createTransactionsTable(ws, transactions, startRow, title = "تفاصيل المعاملات") {
        if (!transactions || transactions.length === 0) return startRow;
        
        XLSX.utils.sheet_add_aoa(ws, [[title]], { origin: `A${startRow}` });
        
        // ترويسة الجدول
        XLSX.utils.sheet_add_aoa(ws, [[
            "م", "التاريخ", "النوع", "المبلغ", "البيان", "الرصيد التراكمي"
        ]], { origin: `A${startRow + 1}` });
        
        // تنسيق الترويسة
        for (let i = 0; i < 6; i++) {
            const cell = ws[String.fromCharCode(65 + i) + (startRow + 1)];
            if (cell) {
                cell.s = {
                    font: { bold: true, color: { rgb: "FFFFFF" } },
                    fill: { fgColor: { rgb: "1A4B7A" } },
                    alignment: { horizontal: "center", vertical: "center" }
                };
            }
        }
        
        // البيانات
        let running = 0;
        transactions.forEach((tx, index) => {
            const amount = parseFloat(tx.amount) || 0;
            if (tx.type === 'له') running += amount;
            else running -= amount;
            
            XLSX.utils.sheet_add_aoa(ws, [[
                index + 1,
                tx.date,
                tx.type,
                amount,
                tx.notes || '—',
                running
            ]], { origin: `A${startRow + 2 + index}` });
            
            // تنسيق الصف
            for (let i = 0; i < 6; i++) {
                const cell = ws[String.fromCharCode(65 + i) + (startRow + 2 + index)];
                if (cell) {
                    if (i === 2) { // عمود النوع
                        cell.s = {
                            font: { bold: true, color: { rgb: tx.type === 'له' ? "2ECC71" : "E74C3C" } }
                        };
                    } else if (i === 3 || i === 5) { // أعمدة المبالغ
                        cell.z = '#,##0.00 "ج.م"';
                        cell.s = { font: { bold: true } };
                    }
                }
            }
        });
        
        // إجمالي
        const totalRow = startRow + 2 + transactions.length;
        XLSX.utils.sheet_add_aoa(ws, [[
            "الإجمالي", "", "", "", "", running
        ]], { origin: `A${totalRow}` });
        
        // تنسيق الإجمالي
        for (let i = 0; i < 6; i++) {
            const cell = ws[String.fromCharCode(65 + i) + totalRow];
            if (cell) {
                if (i === 5) {
                    cell.z = '#,##0.00 "ج.م"';
                }
                cell.s = { font: { bold: true, sz: 12 } };
            }
        }
        
        return totalRow + 2;
    },

    // تنسيق متقدم للورقة
    formatWorksheet(ws, totalRows) {
        if (!ws['!ref']) return;
        
        const range = XLSX.utils.decode_range(ws['!ref']);
        
        for (let R = range.s.r; R <= range.e.r; R++) {
            for (let C = range.s.c; C <= range.e.c; C++) {
                const cell = ws[XLSX.utils.encode_cell({ r: R, c: C })];
                if (!cell) continue;
                
                // تنسيق الأرقام
                if (cell.t === 'n') {
                    cell.z = '#,##0.00 "ج.م"';
                    
                    // تلوين الأرقام حسب قيمتها (للأعمدة المالية)
                    const colLetter = XLSX.utils.encode_col(C);
                    if (colLetter === 'E' || colLetter === 'F' || colLetter === 'G' || colLetter === 'D' && R > 5) {
                        if (cell.v > 0) {
                            cell.s = { font: { color: { rgb: "2ECC71" }, bold: true } };
                        } else if (cell.v < 0) {
                            cell.s = { font: { color: { rgb: "E74C3C" }, bold: true } };
                        }
                    }
                }
                
                // تنسيق الصف الأول (اسم الشركة)
                if (R === 0 && C === 0) {
                    cell.s = { font: { bold: true, sz: 18, color: { rgb: "1A4B7A" } } };
                }
                
                // تنسيق الصف الثاني (عنوان التقرير)
                if (R === 1 && C === 0) {
                    cell.s = { font: { bold: true, sz: 16, color: { rgb: "2C3E50" } } };
                }
                
                // تنسيق رؤوس الأقسام
                if (cell.t === 's' && typeof cell.v === 'string' && 
                    (cell.v.includes('معلومات') || cell.v.includes('ملخص') || cell.v.includes('تفاصيل'))) {
                    cell.s = {
                        font: { bold: true, sz: 14, color: { rgb: "1A4B7A" } },
                        fill: { fgColor: { rgb: "F0F8FF" } }
                    };
                }
                
                // تنسيق ترويسة الجداول
                if (R === 4 || (R > 4 && cell.t === 's' && 
                    (cell.v === 'م' || cell.v === 'الاسم' || cell.v === 'التاريخ' || cell.v === 'النوع'))) {
                    cell.s = {
                        font: { bold: true, color: { rgb: "FFFFFF" } },
                        fill: { fgColor: { rgb: "1A4B7A" } },
                        alignment: { horizontal: "center" }
                    };
                }
            }
        }
    },

        const validTransactions = (this.transactions || []).filter(tx =>

            return;

        const amount = parseFloat(document.getElementById('txAmount').value);
        if (!amount || amount <= 0) {
            this.toast('أدخل مبلغ صحيح', 'error');
            return;
        }
        
        ClientHelper.addTransaction(clientId, {
            type: document.getElementById('txType').value,
            amount,
            date: document.getElementById('txDate').value,
            notes: document.getElementById('txNotes').value
        });
        
        document.getElementById('addTxModal').remove();
        this.toast('تم إضافة المعاملة', 'success');

                    <i class="fas fa-download"></i> إنشاء نسخة احتياطية
                </button>
                <button class="btn btn-success w-100 mb-2" onclick="UI.restoreBackup()" style="font-size:16px; padding:15px;">
                    <i class="fas fa-upload"></i> استعادة نسخة احتياطية
                </button>
                <button class="btn btn-danger w-100" onclick="UI.resetData(); document.getElementById('backupModal').remove()" style="font-size:16px; padding:15px;">
                    <i class="fas fa-trash"></i> إعادة تعيين البيانات
                </button>
            </div>
        `;
        document.body.appendChild(modal);
    },

    createBackup() {
        const data = JSON.stringify(App, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `نسخة_احتياطية_${Utils.formatDate(new Date()).replace(/\//g, '-')}.json`;
        a.click();
        App.statistics.lastBackup = new Date().toISOString();
        Storage.save();
        this.toast('تم إنشاء النسخة', 'success');
    },

    restoreBackup() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.clients) {
                        App = data;
                        Storage.save();
                        document.getElementById('backupModal')?.remove();
                        this.toast('تمت الاستعادة', 'success');
                        Router.render();
                    }
                } catch {
                    this.toast('ملف غير صالح', 'error');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    },

    resetData() {
        if (confirm('⚠️ تحذير: هذا سيقوم بحذف جميع البيانات نهائياً. هل أنت متأكد؟')) {
            if (confirm('تأكيد نهائي: هل أنت متأكد من حذف كل البيانات؟')) {
                App.clients = [];
                App.settings = {
                    username: 'admin',
                    password: 'admin123',
                    theme: 'dark',
                    companyName: 'شركتي'
                };
                App.statistics = { lastBackup: null, totalTransactions: 0 };
                Storage.save();
                this.toast('تم إعادة تعيين البيانات', 'success');
                Router.render();
            }
        }
    }
};

// ========== دوال مساعدة عامة ==========
const Utils = {
    formatMoney(amount) {
        return parseFloat(amount || 0).toLocaleString('en-US', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }) + ' EGP';
    },

    formatDate(date) {
        try {
            return new Date(date).toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        } catch {
            return date;
        }
    },

    contactDev() {
        window.open('https://wa.me/201010421571', '_blank');
    }
};

// ========== دوال عامة للاستخدام في HTML ==========
function viewClient(clientId) {
    const client = ClientHelper.getClient(clientId);
    if (!client) return;
    
    const summary = ClientHelper.getClientSummary(clientId);
    const running = ClientHelper.getRunningBalance(clientId).reverse();
    
    const area = document.getElementById('viewArea');
    area.innerHTML = `
        <div style="margin-bottom:20px;">
            <button class="btn btn-ghost btn-sm" onclick="Router.navigate('clients')">
                <i class="fas fa-arrow-right"></i> عودة للقائمة
            </button>
        </div>
        
        <div class="stats-grid" style="grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user"></i></div>
                <div class="stat-label">${client.name}</div>
                <div class="stat-value" style="font-size:18px; background:transparent;">${client.phone || 'لا يوجد رقم'}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-down" style="color:var(--number-positive)"></i></div>
                <div class="stat-label">إجمالي له</div>
                <div class="stat-value" style="color:var(--number-positive)">${Utils.formatMoney(summary.totalFor)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-arrow-up" style="color:var(--number-negative)"></i></div>
                <div class="stat-label">إجمالي عليه</div>
                <div class="stat-value" style="color:var(--number-negative)">${Utils.formatMoney(summary.totalAgainst)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-balance-scale"></i></div>
                <div class="stat-label">الرصيد الحالي</div>
                <div class="stat-value" style="color:${summary.balance >= 0 ? 'var(--number-positive)' : 'var(--number-negative)'}">${Utils.formatMoney(Math.abs(summary.balance))}</div>
                <div class="stat-change" style="background:${summary.balance >= 0 ? 'var(--success-bg)' : 'var(--danger-bg)'}; color:${summary.balance >= 0 ? 'var(--success)' : 'var(--danger)'};">${summary.balance >= 0 ? 'دائن' : 'مدين'}</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title"><i class="fas fa-history"></i> سجل المعاملات</div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-excel btn-sm" onclick="Excel.exportSingleClient('${client.id}')">
                        <i class="fas fa-file-excel"></i> تصدير كشف حساب
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="UI.showAddTransaction('${client.id}')">
                        <i class="fas fa-plus"></i> إضافة معاملة
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>التاريخ</th><th>البيان</th><th>له</th><th>عليه</th><th>الرصيد</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${running.map(t => `
                            <tr>
                                <td style="font-weight:600;">${Utils.formatDate(t.date)}</td>
                                <td>${t.notes || '—'}</td>
                                <td class="text-success font-mono" style="font-size:16px; font-weight:800;">${t.type === 'له' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td class="text-danger font-mono" style="font-size:16px; font-weight:800;">${t.type === 'عليه' ? Utils.formatMoney(t.amount) : '—'}</td>
                                <td class="font-mono" style="font-size:16px; font-weight:800;">${Utils.formatMoney(t.running)}</td>
                                <td>
                                    <button class="btn btn-icon btn-sm btn-danger" onclick="UI.deleteTransaction('${client.id}', '${t.id}')" title="حذف">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `).join('') || '<tr><td colspan="6" class="text-center">لا توجد معاملات</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>
    `;
}

    if (Auth.checkLogin()) {
        UI.initApp();
    }
    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) UI.setTheme(savedTheme);
};
